<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drink POS & BOM System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 font-sans overscroll-none text-slate-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // ─── ICONS ────────────────────────────────────────────────────────────────────
        const Icon = {
          dashboard: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-5 h-5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>,
          pos: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-5 h-5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M7 8h2M7 12h2M11 8h6M11 12h3"/></svg>,
          stock: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-5 h-5"><path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 3H8L6 7h12l-2-4zM12 12v3M8 12v3M16 12v3"/></svg>,
          recipe: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-5 h-5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>,
          plus: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-4 h-4"><path d="M12 5v14M5 12h14"/></svg>,
          minus: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-4 h-4"><path d="M5 12h14"/></svg>,
          trash: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>,
          check: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-4 h-4"><polyline points="20 6 9 17 4 12"/></svg>,
        };

        const SIDEBAR_ITEMS = [
          { id: "dashboard", label: "Dashboard",   icon: Icon.dashboard },
          { id: "pos",       label: "ระบบ POS",    icon: Icon.pos },
          { id: "stock",     label: "จัดการสต็อก", icon: Icon.stock },
          { id: "recipe",    label: "สูตรอาหาร",   icon: Icon.recipe },
        ];

        // ─── MOCK DATA (จำลองฐานข้อมูล) ─────────────────────────────────────────────────
        const INIT_INGREDIENTS = [
          { id:1,  name:"ใบชาไทย",      type:"วัตถุดิบ", unit:"กรัม", stock:2000, costPerUnit:0.18, minStock:500  },
          { id:2,  name:"นมข้นหวาน",    type:"วัตถุดิบ", unit:"มล.",  stock:3500, costPerUnit:0.05, minStock:500  },
          { id:3,  name:"นมสด",         type:"วัตถุดิบ", unit:"มล.",  stock:8000, costPerUnit:0.04, minStock:1000 },
          { id:7,  name:"น้ำเชื่อม",    type:"วัตถุดิบ", unit:"มล.",  stock:5000, costPerUnit:0.02, minStock:500  },
          { id:8,  name:"แก้วพลาสติก",  type:"แพคเกจจิ้ง", unit:"ชิ้น", stock:450,  costPerUnit:2.00, minStock:100  },
          { id:9,  name:"หลอดดูด",      type:"แพคเกจจิ้ง", unit:"ชิ้น", stock:490,  costPerUnit:0.30, minStock:100  },
        ];

        const INIT_RECIPES = [
          { id:1, name:"ชาไทยเย็น", price: 45, lines:[{ingId:1,qty:15},{ingId:2,qty:30},{ingId:3,qty:60},{ingId:8,qty:1},{ingId:9,qty:1}] },
          { id:2, name:"ชาไทยปั่น", price: 55, lines:[{ingId:1,qty:18},{ingId:2,qty:40},{ingId:3,qty:80},{ingId:8,qty:1},{ingId:9,qty:1}] },
          { id:3, name:"นมสดคาราเมล", price: 50, lines:[{ingId:3,qty:150},{ingId:7,qty:20},{ingId:8,qty:1},{ingId:9,qty:1}] },
        ];

        // ─── HELPERS ─────────────────────────────────────────────────────────────────
        const fmtCost = (n) => `฿${Number(n).toLocaleString('th-TH', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        function useToast() {
          const [msg, setMsg] = useState("");
          const show = (m) => { setMsg(m); setTimeout(() => setMsg(""), 3000); };
          return [msg, show];
        }

        // ─── UI COMPONENTS ───────────────────────────────────────────────────────────
        const Card = ({ title, children, className="" }) => (
          <div className={`bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden ${className}`}>
            {title && <div className="px-4 py-3 border-b border-slate-800 font-bold text-white">{title}</div>}
            <div className="p-4">{children}</div>
          </div>
        );

        const Toast = ({ msg }) => msg ? (
          <div className="fixed top-6 right-6 z-50 bg-emerald-500 text-slate-950 px-4 py-3 rounded-xl shadow-2xl flex items-center gap-2 font-bold animate-bounce">
            {Icon.check} {msg}
          </div>
        ) : null;

        // ─── SPRINT 3: POS PAGE ──────────────────────────────────────────────────────
        function POSPage({ recipes, ingredients, setIngredients, onOrderComplete }) {
          const [orderType, setOrderType] = useState('storefront');
          const [cart, setCart] = useState([]);
          
          // ตัวแปรสำหรับ Delivery
          const [gpPercent, setGpPercent] = useState(30);
          const [adsDiscount, setAdsDiscount] = useState(0);

          // คำนวณยอดเงิน
          const grossTotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
          const gpDeduction = orderType === 'delivery' ? grossTotal * (gpPercent / 100) : 0;
          const netRevenue = orderType === 'delivery' ? grossTotal - gpDeduction - adsDiscount : grossTotal;

          const addToCart = (recipe) => {
            setCart(prev => {
              const ex = prev.find(i => i.id === recipe.id);
              if (ex) return prev.map(i => i.id === recipe.id ? { ...i, qty: i.qty + 1 } : i);
              return [...prev, { ...recipe, qty: 1 }];
            });
          };

          const updateQty = (id, delta) => {
            setCart(prev => prev.map(i => i.id === id ? { ...i, qty: Math.max(0, i.qty + delta) } : i).filter(i => i.qty > 0));
          };

          const checkout = () => {
            if (cart.length === 0) return;

            // 1. ตัดสต็อกวัตถุดิบ (Auto-Deduct)
            let stockDeductions = {};
            cart.forEach(cartItem => {
                const recipe = recipes.find(r => r.id === cartItem.id);
                if(recipe) {
                    recipe.lines.forEach(line => {
                        const totalRequired = line.qty * cartItem.qty;
                        stockDeductions[line.ingId] = (stockDeductions[line.ingId] || 0) + totalRequired;
                    });
                }
            });

            // อัปเดตคลังวัตถุดิบ
            setIngredients(prevIngs => prevIngs.map(ing => {
                if (stockDeductions[ing.id]) {
                    return { ...ing, stock: Math.max(0, ing.stock - stockDeductions[ing.id]) };
                }
                return ing;
            }));

            // 2. บันทึกออเดอร์
            onOrderComplete({
              id: `#${Math.floor(1000 + Math.random() * 9000)}`,
              type: orderType,
              items: cart.map(i => `${i.name} x${i.qty}`).join(', '),
              gross: grossTotal,
              net: netRevenue,
              time: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })
            });

            // 3. เคลียร์ตะกร้า
            setCart([]);
            setAdsDiscount(0);
          };

          return (
            <div className="flex flex-col lg:flex-row gap-4 h-full">
              {/* ซ้าย: โหมด และ เมนู */}
              <div className="flex-1 flex flex-col gap-4">
                {/* เลือกโหมด */}
                <div className="flex gap-2 bg-slate-900 p-2 rounded-2xl border border-slate-800">
                  <button onClick={() => setOrderType('storefront')} className={`flex-1 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all ${orderType==='storefront'?'bg-amber-500 text-slate-950':'text-slate-400 hover:bg-slate-800'}`}>
                    🏠 หน้าร้าน (Storefront)
                  </button>
                  <button onClick={() => setOrderType('delivery')} className={`flex-1 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all ${orderType==='delivery'?'bg-orange-500 text-white':'text-slate-400 hover:bg-slate-800'}`}>
                    🛵 เดลิเวอรี่ (Delivery)
                  </button>
                </div>

                {/* เมนูเครื่องดื่ม */}
                <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                  {recipes.map(r => (
                    <button key={r.id} onClick={() => addToCart(r)} className="bg-slate-900 border border-slate-800 hover:border-amber-500 rounded-2xl p-4 text-left transition-all active:scale-95">
                      <div className="text-3xl mb-2">🥤</div>
                      <p className="text-white font-bold truncate">{r.name}</p>
                      <p className="text-amber-400 text-sm">{fmtCost(r.price)}</p>
                    </button>
                  ))}
                  {recipes.length === 0 && <p className="col-span-full text-center py-10 text-slate-500">ยังไม่มีเมนู (กรุณาสร้างในเมนูสูตรอาหาร)</p>}
                </div>
              </div>

              {/* ขวา: ตะกร้าและคิดเงิน */}
              <div className="w-full lg:w-96 flex flex-col bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden flex-shrink-0 h-full max-h-[80vh]">
                <div className="p-4 border-b border-slate-800 bg-slate-800/50">
                  <h2 className="text-lg font-bold text-white">ออเดอร์ปัจจุบัน</h2>
                </div>
                
                {/* รายการในตะกร้า */}
                <div className="flex-1 overflow-y-auto p-2">
                  {cart.length === 0 ? (
                    <div className="text-center text-slate-500 py-10">ตะกร้าว่างเปล่า...<br/>คลิกที่เมนูเพื่อรับออเดอร์</div>
                  ) : (
                    <div className="flex flex-col gap-2">
                      {cart.map(item => (
                        <div key={item.id} className="flex items-center justify-between p-3 bg-slate-950 rounded-xl border border-slate-800">
                          <div className="min-w-0 flex-1">
                            <p className="text-white font-bold text-sm truncate">{item.name}</p>
                            <p className="text-slate-400 text-xs">{fmtCost(item.price)}</p>
                          </div>
                          <div className="flex items-center gap-3 bg-slate-900 rounded-lg p-1">
                            <button onClick={() => updateQty(item.id, -1)} className="p-1 text-slate-400 hover:text-rose-400">{item.qty===1 ? Icon.trash : Icon.minus}</button>
                            <span className="text-white font-bold w-4 text-center">{item.qty}</span>
                            <button onClick={() => updateQty(item.id, 1)} className="p-1 text-slate-400 hover:text-emerald-400">{Icon.plus}</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {/* สรุปยอด */}
                <div className="p-4 bg-slate-950 border-t border-slate-800 flex flex-col gap-3">
                  <div className="flex justify-between text-slate-400 text-sm">
                    <span>ยอดรวมปกติ (Gross)</span>
                    <span className="text-white">{fmtCost(grossTotal)}</span>
                  </div>

                  {orderType === 'delivery' && (
                    <div className="flex flex-col gap-2 bg-orange-500/10 border border-orange-500/30 p-3 rounded-xl">
                      <div className="flex items-center justify-between text-sm">
                        <span className="text-orange-400">หัก GP Platform (%)</span>
                        <input type="number" value={gpPercent} onChange={(e)=>setGpPercent(Number(e.target.value))} className="w-16 bg-slate-900 border border-slate-700 rounded text-right px-1 text-white" />
                      </div>
                      <div className="flex justify-between text-rose-400 text-xs">
                        <span>มูลค่าที่โดนหัก</span>
                        <span>-{fmtCost(gpDeduction)}</span>
                      </div>
                      <div className="flex items-center justify-between text-sm mt-1">
                        <span className="text-orange-400">หักส่วนลด/Ads (฿)</span>
                        <input type="number" value={adsDiscount} onChange={(e)=>setAdsDiscount(Number(e.target.value))} className="w-16 bg-slate-900 border border-slate-700 rounded text-right px-1 text-white" />
                      </div>
                    </div>
                  )}

                  <div className="flex justify-between items-center mt-2">
                    <span className="text-lg text-emerald-400 font-bold">ยอดรับสุทธิ (Net)</span>
                    <span className="text-3xl text-emerald-400 font-black">{fmtCost(netRevenue)}</span>
                  </div>

                  <button 
                    onClick={checkout}
                    disabled={cart.length === 0}
                    className="w-full py-4 mt-2 bg-emerald-500 hover:bg-emerald-400 disabled:opacity-50 disabled:bg-slate-800 text-slate-950 font-black text-lg rounded-xl transition-all shadow-lg shadow-emerald-900/20 active:scale-95"
                  >
                    ยืนยันออเดอร์ & ตัดสต็อก
                  </button>
                </div>
              </div>
            </div>
          );
        }

        // ─── DASHBOARD PAGE (Simplified for Demo) ────────────────────────────────────
        function Dashboard({ orders }) {
          const totalNet = orders.reduce((sum, o) => sum + o.net, 0);
          return (
            <div className="flex flex-col gap-4">
              <div className="grid grid-cols-2 gap-4">
                <Card className="bg-gradient-to-br from-emerald-600/20 to-teal-900/20 border-emerald-500/30">
                  <p className="text-emerald-400 text-sm">รายได้สุทธิวันนี้ (Net Revenue)</p>
                  <p className="text-3xl text-white font-black mt-1">{fmtCost(totalNet)}</p>
                </Card>
                <Card className="bg-gradient-to-br from-blue-600/20 to-sky-900/20 border-blue-500/30">
                  <p className="text-blue-400 text-sm">จำนวนออเดอร์</p>
                  <p className="text-3xl text-white font-black mt-1">{orders.length} บิล</p>
                </Card>
              </div>
              <Card title="ออเดอร์ล่าสุด">
                {orders.length === 0 ? <p className="text-slate-500 text-center py-4">ยังไม่มีออเดอร์วันนี้</p> : (
                  <table className="w-full text-left text-sm">
                    <thead><tr className="border-b border-slate-800 text-slate-400"><th className="pb-2">เวลา</th><th className="pb-2">โหมด</th><th className="pb-2">รายการ</th><th className="pb-2 text-right">ยอดรับสุทธิ</th></tr></thead>
                    <tbody>
                      {orders.map((o,i) => (
                        <tr key={i} className="border-b border-slate-800/50">
                          <td className="py-3 text-slate-400">{o.time}</td>
                          <td className="py-3"><span className={`text-xs px-2 py-1 rounded-md ${o.type==='storefront'?'bg-amber-500/20 text-amber-400':'bg-orange-500/20 text-orange-400'}`}>{o.type==='storefront'?'หน้าร้าน':'เดลิเวอรี่'}</span></td>
                          <td className="py-3 text-white">{o.items}</td>
                          <td className="py-3 text-right text-emerald-400 font-bold">{fmtCost(o.net)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
              </Card>
            </div>
          );
        }

        // ─── INVENTORY & RECIPE PAGES (Placeholder from Sprint 2) ───────────────────
        // (ย่อโค้ดส่วนนี้เพื่อโฟกัสที่ POS แต่ของจริงจะมีโค้ดเต็มเหมือนที่บอสเซฟไว้)
        function InventoryPage({ ingredients }) {
          return <Card title="สถานะคลังวัตถุดิบ (ดูการตัดสต็อกอัตโนมัติ)">
            <table className="w-full text-left text-sm mt-2">
              <thead><tr className="border-b border-slate-800 text-slate-400"><th className="pb-2">วัตถุดิบ</th><th className="pb-2 text-right">คงเหลือ</th></tr></thead>
              <tbody>
                {ingredients.map(ing => (
                  <tr key={ing.id} className="border-b border-slate-800/50">
                    <td className="py-3 text-white">{ing.name}</td>
                    <td className={`py-3 text-right font-bold ${ing.stock <= ing.minStock ? 'text-rose-400' : 'text-emerald-400'}`}>{ing.stock} {ing.unit}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </Card>;
        }

        // ─── ROOT APP ─────────────────────────────────────────────────────────────────
        function POSApp() {
          const [active, setActive] = useState("pos"); // เริ่มต้นที่หน้า POS
          const [sidebar, setSidebar] = useState(false); // ซ่อน Sidebar บนมือถือ
          const [ingredients, setIngredients] = useState(INIT_INGREDIENTS);
          const [recipes, setRecipes] = useState(INIT_RECIPES);
          const [orders, setOrders] = useState([]);
          const [toast, showToast] = useToast();

          const handleOrderComplete = (newOrder) => {
            setOrders(prev => [newOrder, ...prev]);
            showToast(`รับออเดอร์ ${newOrder.id} และตัดสต็อกสำเร็จ!`);
          };

          return (
            <div className="flex h-screen w-screen overflow-hidden bg-slate-950 font-sans">
              <Toast msg={toast} />
              
              <aside className={`flex flex-col bg-slate-900 border-r border-slate-800 z-20 w-16 md:w-56 transition-all`}>
                <div className="p-4 border-b border-slate-800 flex justify-center md:justify-start">🧋 <span className="hidden md:inline ml-2 font-bold text-white">ชามั้ยวิ POS</span></div>
                <nav className="flex-1 p-2 space-y-2 mt-2">
                  {SIDEBAR_ITEMS.map(item=>(
                    <button key={item.id} onClick={()=>setActive(item.id)} className={`w-full flex items-center justify-center md:justify-start gap-3 p-3 rounded-xl transition-all ${active===item.id?'bg-amber-500 text-slate-950 font-bold':'text-slate-400 hover:bg-slate-800'}`}>
                      {item.icon} <span className="hidden md:inline">{item.label}</span>
                    </button>
                  ))}
                </nav>
              </aside>

              <div className="flex-1 flex flex-col overflow-hidden relative">
                <header className="p-4 bg-slate-900 border-b border-slate-800 text-white font-bold flex justify-between">
                  <span>{SIDEBAR_ITEMS.find(i=>i.id===active)?.label}</span>
                  <span className="text-amber-400 text-sm">Sprint 3: POS Ready</span>
                </header>
                <main className="flex-1 overflow-y-auto p-4 md:p-5 pb-20">
                  {active==="pos" && <POSPage recipes={recipes} ingredients={ingredients} setIngredients={setIngredients} onOrderComplete={handleOrderComplete} />}
                  {active==="dashboard" && <Dashboard orders={orders} />}
                  {active==="stock" && <InventoryPage ingredients={ingredients} />}
                  {active==="recipe" && <div className="text-center py-10 text-slate-500">หน้าสูตรอาหาร (โค้ด Sprint 2 ทำงานอยู่เบื้องหลัง)</div>}
                </main>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<POSApp />);
    </script>
</body>
</html>
