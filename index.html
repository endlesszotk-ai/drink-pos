async function fetchCloudData(){
  try{
    var r1=await _sb.from('ingredients').select('*').order('id');

      id:i.id,name:i.name,type:i.type,unit:i.unit,

    }});

    var r2=await _sb.from('recipes').select('*').order('id');
    var r3=await _sb.from('recipe_lines').select('*');
    state.recipes=(r2.data||[]).map(function(r){return{
      id:r.id,name:r.name,price:Number(r.price),
      lines:(r3.data||[]).filter(function(l){return l.recipe_id===r.id}).map(function(l){return{ingId:l.ingredient_id,qty:Number(l.qty)}})
    }});
    if(state.recipes.length>0&&!state.selectedRecipeId)state.selectedRecipeId=state.recipes[0].id;

    var r4=await _sb.from('orders').select('*').order('created_at',{ascending:false}).limit(200);
    state.orders=(r4.data||[]).map(function(o){return{
      id:o.id,type:o.type,items:o.items,gross:Number(o.gross),net:Number(o.net),cogs:Number(o.cogs),
      gpPercent:Number(o.gp_percent||0),adsDiscount:Number(o.ads_discount||0),

      date:new Date(a.created_at).toLocaleDateString('th-TH')
    }});
  }catch(err){

}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function fmtCost(n){return '฿'+Number(n).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:4})}
function fmtDisplay(n){return '฿'+Number(n).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2})}
function calcRecipeCost(lines,ings){
  return lines.reduce(function(s,l){
    var i=ings.find(function(x){return x.id===l.ingId});
    return s+(i?i.costPerUnit*Number(l.qty):0);
  },0);
}

// Parse "ชาไทยเย็น x2, กาแฟเย็น x1" → [{name,qty}, ...]
function parseOrderItems(itemsStr){
  if(!itemsStr)return[];
  return itemsStr.split(',').map(function(seg){
    seg=seg.trim();
    var m=seg.match(/^(.+?)\s*x(\d+)$/i);
    return m?{name:m[1].trim(),qty:parseInt(m[2],10)}:{name:seg,qty:1};
  });
}

function el(tag,props){
  var e=document.createElement(tag);
  if(props)Object.keys(props).forEach(function(k){
    var v=props[k];
    if(k==='cls'){e.className=v}
    else if(k==='style'&&typeof v==='object'){Object.assign(e.style,v)}
    else if(k==='html'){e.innerHTML=v}
    else if(k==='txt'){e.textContent=v}
    else if(k.indexOf('on')===0){e.addEventListener(k.slice(2).toLowerCase(),v)}
    else{try{e.setAttribute(k,v)}catch(err){}}
  });
  for(var i=2;i<arguments.length;i++){
    var c=arguments[i];
    if(c==null||c===false)continue;
    if(typeof c==='string'||typeof c==='number'){e.appendChild(document.createTextNode(c))}
    else{e.appendChild(c)}
  }
  return e;
}
function mkField(labelTxt,inputEl,req){return el('div',{cls:'field'},el('label',{txt:labelTxt+(req?'*':'')}),inputEl)}
function mkInp(opts){
  var e=document.createElement('input');e.className='inp';
  if(opts){
    if(opts.type)e.type=opts.type;
    if(opts.placeholder)e.placeholder=opts.placeholder;
    if(opts.value!=null)e.value=opts.value;
    if(opts.style)Object.assign(e.style,opts.style);
  }
  return e;
}
function mkSel(options,value,onChange){
  var e=document.createElement('select');e.className='inp';
  options.forEach(function(opt){
    var o=document.createElement('option');
    o.value=opt.value!=null?opt.value:opt.label;
    o.textContent=opt.label;
    if(String(opt.value!=null?opt.value:opt.label)===String(value))o.selected=true;
    e.appendChild(o);
  });
  e.addEventListener('change',onChange);
  return e;
}

// ═══════════════════════════════════════════════════════════════════════════════
// ─── SPRINT 5 · PART 1 ── ADVANCED DASHBOARD ─────────────────────────────────
// ═══════════════════════════════════════════════════════════════════════════════
function renderDashboard(){
  var orders=state.orders;

  // ── Totals ──────────────────────────────────────────────
  var totalNet =orders.reduce(function(s,o){return s+o.net},0);
  var totalCogs=orders.reduce(function(s,o){return s+(o.cogs||0)},0);
  var netProfit=totalNet-totalCogs;
  var margin   =totalNet>0?(netProfit/totalNet)*100:0;
  var profit   =netProfit>=0;

  // ── Per-platform split ──────────────────────────────────
  var sfOrders=orders.filter(function(o){return o.type==='storefront'});
  var dvOrders=orders.filter(function(o){return o.type==='delivery'});
  function platformStats(arr){
    var net=arr.reduce(function(s,o){return s+o.net},0);
    var cogs=arr.reduce(function(s,o){return s+(o.cogs||0)},0);
    return{count:arr.length,net:net,profit:net-cogs,pct:totalNet>0?(net/totalNet*100):0};
  }
  var sf=platformStats(sfOrders);
  var dv=platformStats(dvOrders);

  // ── Best-selling items ──────────────────────────────────
  var itemMap={};
  orders.forEach(function(o){
    parseOrderItems(o.items).forEach(function(item){
      itemMap[item.name]=(itemMap[item.name]||0)+item.qty;
    });
  });
  var bestSelling=Object.keys(itemMap).map(function(name){
    return{name:name,qty:itemMap[name]};
  }).sort(function(a,b){return b.qty-a.qty}).slice(0,8);
  var maxQty=bestSelling.length>0?bestSelling[0].qty:1;

  // ── Build UI ────────────────────────────────────────────
  var wrap=el('div',{style:{display:'flex',flexDirection:'column',gap:'16px'}});

  // 1. Summary KPI row
  var grid=el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}});
  grid.appendChild(el('div',{cls:'card'},el('div',{style:{padding:'16px'}},
    el('p',{txt:'ยอดขายรับสุทธิ (Net Rev.)',style:{color:'#94a3b8',fontSize:'.75rem',margin:'0 0 4px'}}),
    el('p',{txt:fmtDisplay(totalNet),style:{color:'#fff',fontWeight:900,fontSize:'1.4rem',margin:'0 0 4px'}}),
    el('p',{txt:'หลังหัก GP/Ads แล้ว',style:{color:'#64748b',fontSize:'.7rem',margin:0}})
  )));
  grid.appendChild(el('div',{cls:'card',style:{borderColor:'rgba(159,18,57,.4)'}},el('div',{style:{padding:'16px'}},
    el('p',{txt:'ต้นทุนวัตถุดิบ (COGS)',style:{color:'#f87171',fontSize:'.75rem',margin:'0 0 4px'}}),
    el('p',{txt:'-'+fmtDisplay(totalCogs),style:{color:'#f87171',fontWeight:900,fontSize:'1.4rem',margin:'0 0 4px'}}),
    el('p',{txt:'Cost of Goods Sold',style:{color:'rgba(248,113,113,.5)',fontSize:'.7rem',margin:0}})
  )));
  grid.appendChild(el('div',{cls:'card',style:{gridColumn:'1/-1',borderColor:profit?'rgba(16,185,129,.4)':'rgba(239,68,68,.4)'}},
    el('div',{style:{padding:'16px',display:'flex',justifyContent:'space-between',alignItems:'flex-end'}},
      el('div',{},
        el('p',{txt:'กำไรสุทธิ (Net Profit)',style:{color:profit?'#10b981':'#f87171',fontSize:'.75rem',fontWeight:700,margin:'0 0 4px'}}),
        el('p',{txt:fmtDisplay(netProfit),style:{color:profit?'#10b981':'#f87171',fontWeight:900,fontSize:'2rem',margin:0}})
      ),
      el('div',{style:{textAlign:'right'}},
        el('p',{txt:'Margin',style:{color:profit?'rgba(16,185,129,.5)':'rgba(239,68,68,.5)',fontSize:'.7rem',margin:'0 0 2px'}}),
        el('p',{txt:margin.toFixed(1)+'%',style:{color:profit?'#10b981':'#f87171',fontWeight:700,fontSize:'1.1rem',margin:0}})
      )
    )
  ));
  wrap.appendChild(grid);

  // 2. Platform breakdown ─── NEW ───
  var platCard=el('div',{cls:'card'});
  platCard.appendChild(el('div',{cls:'card-head',txt:'📊 สรุปยอดขายตามแพลตฟอร์ม'}));
  var platGrid=el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0',padding:'16px',gap:'12px'}});

// Generate order number from timestamp
function genOrderNo(){
  var n=Date.now().toString().slice(-6);
  return '#'+n;
}

// Build HTML for thermal receipt and inject into #receipt-print-area
function buildReceipt(orderData){
  var s=state.settings;
  var orderNo=genOrderNo();
  var now=new Date();
  var timeStr=now.toLocaleString('th-TH',{hour:'2-digit',minute:'2-digit',day:'numeric',month:'short',year:'numeric'});

  var html='';

  // Logo
  if(s.logoUrl){
    html+='<div style="text-align:center;margin-bottom:6px"><img src="'+s.logoUrl+'" style="max-width:60px;max-height:60px;object-fit:contain"/></div>';
  }

  html+='<div class="rcpt-shop-name">'+escHtml(s.shopName)+'</div>';
  html+='<div class="rcpt-addr">'+escHtml(s.address).replace(/\n/g,'<br>')+'</div>';
  html+='<hr class="rcpt-divider">';
  html+='<div class="rcpt-order-no">ออเดอร์ '+orderNo+'</div>';
  html+='<div class="rcpt-row"><span>'+timeStr+'</span><span>'+(orderData.type==='storefront'?'🏠 หน้าร้าน':'🛵 เดลิเวอรี่')+'</span></div>';
  html+='<hr class="rcpt-divider">';

  // Items
  parseOrderItems(orderData.items).forEach(function(item){
    var recipe=state.recipes.find(function(r){return r.name===item.name});
    var price=recipe?recipe.price*item.qty:0;
    html+='<div class="rcpt-row">';
    html+='<span>'+escHtml(item.name)+' x'+item.qty+'</span>';
    html+='<span>'+(price>0?fmtDisplay(price):'')+'</span>';
    html+='</div>';
  });

  html+='<hr class="rcpt-divider">';

  // Totals
  html+='<div class="rcpt-row"><span>ยอดก่อนหัก</span><span>'+fmtDisplay(orderData.gross)+'</span></div>';
  if(orderData.type==='delivery'){
    var gpDed=orderData.gross-orderData.net-(orderData.adsDiscount||0);
    html+='<div class="rcpt-row" style="color:#d97706"><span>หัก GP ('+orderData.gpPercent+'%)</span><span>-'+fmtDisplay(gpDed)+'</span></div>';
    if(orderData.adsDiscount>0){
      html+='<div class="rcpt-row" style="color:#d97706"><span>หัก Ads/ส่วนลด</span><span>-'+fmtDisplay(orderData.adsDiscount)+'</span></div>';
    }
  }
  html+='<div class="rcpt-row bold"><span>ยอดรับสุทธิ</span><span>'+fmtDisplay(orderData.net)+'</span></div>';
  html+='<hr class="rcpt-divider">';
  html+='<div class="rcpt-center">'+escHtml(s.receiptFooter).replace(/\n/g,'<br>')+'</div>';

  document.getElementById('receipt-print-area').innerHTML=html;
}

// KOT slip — compact bar sheet
function buildKOT(orderData){
  var orderNo=genOrderNo();
  var now=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  var html='<div class="kot-title">KOT '+orderNo+'</div>';
  html+='<div style="text-align:center;font-size:11px;margin-bottom:8px">'+now+' — '+(orderData.type==='storefront'?'หน้าร้าน':'เดลิเวอรี่')+'</div>';
  html+='<hr class="rcpt-divider">';
  parseOrderItems(orderData.items).forEach(function(item){
    html+='<div class="kot-item">'+item.qty+' × '+escHtml(item.name)+'</div>';
  });
  document.getElementById('receipt-print-area').innerHTML=html;
}

function escHtml(str){
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function printReceipt(orderData){
  buildReceipt(orderData);
  setTimeout(function(){window.print()},120);
}
function printKOT(orderData){
  buildKOT(orderData);
  setTimeout(function(){window.print()},120);
}

function addToCart(recipe){
  var ex=state.cart.find(function(i){return i.id===recipe.id});
  if(ex)state.cart=state.cart.map(function(i){return i.id===recipe.id?Object.assign({},i,{qty:i.qty+1}):i});
  else state.cart=state.cart.concat([Object.assign({},recipe,{qty:1})]);
  render();
}
function updateQty(id,delta){
  state.cart=state.cart.map(function(i){return i.id===id?Object.assign({},i,{qty:Math.max(0,i.qty+delta)}):i}).filter(function(i){return i.qty>0});
  render();
}

// ── Checkout: save to cloud, deduct stock, then print ─────
async function checkoutLogic(e, grossTotal, netRevenue){
  if(state.cart.length===0)return;
  var btn=e.currentTarget;
  btn.disabled=true;btn.textContent='กำลังบันทึก...';
  var s=state;
  var stockDed={};var totalCogs=0;
  s.cart.forEach(function(cartItem){
    var recipe=s.recipes.find(function(r){return r.id===cartItem.id});
    if(recipe){
      totalCogs+=calcRecipeCost(recipe.lines,s.ingredients)*cartItem.qty;
      recipe.lines.forEach(function(line){stockDed[line.ingId]=(stockDed[line.ingId]||0)+(line.qty*cartItem.qty)});
    }
  });
  try{
    // Build order snapshot for receipt (before clearing cart)
    var orderSnapshot={
      type:s.orderType,
      items:s.cart.map(function(i){return i.name+' x'+i.qty}).join(', '),
      gross:grossTotal,
      net:netRevenue,
      cogs:totalCogs,
      gpPercent:s.gpPercent,
      adsDiscount:s.adsDiscount,
    };

    await _sb.from('orders').insert([{
      type:s.orderType,
      items:orderSnapshot.items,
      gross:grossTotal,
      net:netRevenue,
      cogs:totalCogs,
      gp_percent:s.gpPercent,
      ads_discount:s.adsDiscount,
    }]);

    for(var i=0;i<state.ingredients.length;i++){
      var ing=state.ingredients[i];
      if(stockDed[ing.id]){
        await _sb.from('ingredients').update({stock:Math.max(0,ing.stock-stockDed[ing.id])}).eq('id',ing.id);
      }
    }

    state.cart=[];state.adsDiscount=0;
    showToast('✓ รับออเดอร์และตัดสต็อกบน Cloud สำเร็จ');

    // Print receipt if setting is on
    if(s.settings.printOnCheckout){
      printReceipt(orderSnapshot);
    }

    await refreshView();
  }catch(err){
    console.error(err);
    alert('เกิดข้อผิดพลาด: '+err.message);
    btn.disabled=false;btn.textContent='✅ ยืนยัน & ตัดสต็อก';
  }
}

  var previewCard=el('div',{cls:'card'});
  previewCard.appendChild(el('div',{cls:'card-head',txt:'🧾 ทดสอบพิมพ์'}));
  var pb=el('div',{cls:'card-body',style:{display:'flex',flexDirection:'column',gap:'12px'}});
  pb.appendChild(el('p',{txt:'กด "ทดสอบใบเสร็จ" เพื่อดูหน้าตาใบเสร็จก่อนใช้จริง',style:{color:'#94a3b8',fontSize:'.875rem',margin:0}}));
  var testBtns=el('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap'}});
  testBtns.appendChild(el('button',{cls:'btn btn-ghost',txt:'🖨️ ทดสอบใบเสร็จ',onClick:function(){
    printReceipt({
      type:'storefront',
      items:'ชาไทยเย็น x2, กาแฟเย็น x1',
      gross:135,net:135,cogs:20,gpPercent:0,adsDiscount:0
    });
  }}));
  testBtns.appendChild(el('button',{cls:'btn btn-ghost',txt:'🍹 ทดสอบใบ KOT',onClick:function(){
    printKOT({type:'storefront',items:'ชาไทยเย็น x2, กาแฟเย็น x1'});
  }}));
  pb.appendChild(testBtns);

  // receipt preview box (inline mock)
  var mockBox=el('div',{style:{background:'#fff',color:'#000',borderRadius:'8px',padding:'16px',fontFamily:"'Courier New',monospace",fontSize:'11px',maxWidth:'280px',lineHeight:'1.6',marginTop:'4px'}});
  mockBox.innerHTML='<div style="text-align:center;font-weight:700;font-size:14px">'+escHtml(s.shopName)+'</div>'
    +'<div style="text-align:center;font-size:10px;margin-bottom:6px">'+escHtml(s.address).replace(/\n/g,'<br>')+'</div>'
    +'<div style="border-top:1px dashed #000;margin:4px 0"></div>'
    +'<div style="display:flex;justify-content:space-between"><span>ชาไทยเย็น x2</span><span>฿90</span></div>'
    +'<div style="display:flex;justify-content:space-between"><span>กาแฟเย็น x1</span><span>฿45</span></div>'
    +'<div style="border-top:1px dashed #000;margin:4px 0"></div>'
    +'<div style="display:flex;justify-content:space-between;font-weight:700"><span>ยอดรับสุทธิ</span><span>฿135</span></div>'
    +'<div style="border-top:1px dashed #000;margin:4px 0"></div>'
    +'<div style="text-align:center;font-size:10px">'+escHtml(s.receiptFooter).replace(/\n/g,'<br>')+'</div>';
  pb.appendChild(el('div',{style:{marginTop:'4px'}},el('p',{txt:'ตัวอย่างใบเสร็จ:',style:{color:'#64748b',fontSize:'.75rem',marginBottom:'6px'}}),mockBox));

  previewCard.appendChild(pb);
  wrap.appendChild(previewCard);
  return wrap;
}
