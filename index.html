<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drink POS & BOM System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 font-sans overscroll-none text-slate-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // ─── ICONS ────────────────────────────────────────────────────────────────────
        const Icon = {
          dashboard: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-5 h-5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>,
          pos: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-5 h-5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M7 8h2M7 12h2M11 8h6M11 12h3"/></svg>,
          stock: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-5 h-5"><path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 3H8L6 7h12l-2-4zM12 12v3M8 12v3M16 12v3"/></svg>,
          recipe: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-5 h-5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>,
          plus: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-4 h-4"><path d="M12 5v14M5 12h14"/></svg>,
          minus: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-4 h-4"><path d="M5 12h14"/></svg>,
          edit: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
          trash: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>,
          x: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-5 h-5"><path d="M18 6L6 18M6 6l12 12"/></svg>,
          warn: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
          check: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-4 h-4"><polyline points="20 6 9 17 4 12"/></svg>,
          back: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>,
        };

        const SIDEBAR_ITEMS = [
          { id: "dashboard", label: "Dashboard",   icon: Icon.dashboard },
          { id: "pos",       label: "ระบบ POS",    icon: Icon.pos },
          { id: "stock",     label: "จัดการสต็อก", icon: Icon.stock },
          { id: "recipe",    label: "สูตรอาหาร",   icon: Icon.recipe },
        ];

        // ─── MOCK DATA ────────────────────────────────────────────────────────────────
        const INIT_INGREDIENTS = [
          { id:1,  name:"ใบชาไทย",      type:"วัตถุดิบ",    unit:"กรัม",  stock:2000, costPerUnit:0.18, minStock:500  },
          { id:2,  name:"นมข้นหวาน",    type:"วัตถุดิบ",    unit:"มล.",   stock:3500, costPerUnit:0.05, minStock:500  },
          { id:3,  name:"นมสด",         type:"วัตถุดิบ",    unit:"มล.",   stock:8000, costPerUnit:0.04, minStock:1000 },
          { id:7,  name:"น้ำเชื่อม",    type:"วัตถุดิบ",    unit:"มล.",   stock:5000, costPerUnit:0.02, minStock:500  },
          { id:8,  name:"แก้วพลาสติก",  type:"แพคเกจจิ้ง", unit:"ชิ้น",  stock:450,  costPerUnit:2.00, minStock:100  },
          { id:9,  name:"หลอดดูด",      type:"แพคเกจจิ้ง", unit:"ชิ้น",  stock:490,  costPerUnit:0.30, minStock:100  },
        ];

        const INIT_RECIPES = [
          { id:1, name:"ชาไทยเย็น", price: 45, lines:[{ingId:1,qty:15},{ingId:2,qty:30},{ingId:3,qty:60},{ingId:8,qty:1},{ingId:9,qty:1}] },
          { id:2, name:"ชาไทยปั่น", price: 55, lines:[{ingId:1,qty:18},{ingId:2,qty:40},{ingId:3,qty:80},{ingId:8,qty:1},{ingId:9,qty:1}] },
          { id:3, name:"นมสดคาราเมล", price: 50, lines:[{ingId:3,qty:150},{ingId:7,qty:20},{ingId:8,qty:1},{ingId:9,qty:1}] },
        ];

        const INIT_ADJUSTMENTS = [];

        // ─── HELPERS ─────────────────────────────────────────────────────────────────
        const fmtCost = (n) => `฿${Number(n).toLocaleString('th-TH', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        const calcRecipeCost = (lines, ings) => lines.reduce((s, l) => { const i = ings.find(x => x.id === l.ingId); return s + (i ? i.costPerUnit * Number(l.qty) : 0); }, 0);

        function useToast() {
          const [msg, setMsg] = useState("");
          const show = (m) => { setMsg(m); setTimeout(() => setMsg(""), 3000); };
          return [msg, show];
        }

        // ─── SHARED UI ───────────────────────────────────────────────────────────────
        function Badge({ children, color="slate" }) {
          const map = { slate:"bg-slate-700 text-slate-300", amber:"bg-amber-500/20 text-amber-400", rose:"bg-rose-500/20 text-rose-400", emerald:"bg-emerald-500/20 text-emerald-400", violet:"bg-violet-500/20 text-violet-400" };
          return <span className={`inline-block text-xs font-semibold px-2 py-0.5 rounded-full whitespace-nowrap ${map[color]}`}>{children}</span>;
        }

        const Card = ({ title, action, children, className="" }) => (
          <div className={`bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden ${className}`}>
            {(title||action) && (
              <div className="flex items-center justify-between px-4 py-3 border-b border-slate-800 gap-2 font-bold text-white">
                {title && <p>{title}</p>}
                {action}
              </div>
            )}
            <div className="p-4">{children}</div>
          </div>
        );

        function Btn({ children, onClick, variant="primary", size="md", className="", disabled=false }) {
          const base = "inline-flex items-center gap-2 font-semibold rounded-xl touch-manipulation transition-all duration-150 disabled:opacity-40 disabled:cursor-not-allowed select-none justify-center";
          const sz = { sm:"px-3 py-1.5 text-xs min-h-[32px]", md:"px-4 py-2.5 text-sm min-h-[42px]", lg:"px-5 py-3 text-sm min-h-[52px]" };
          const va = { primary:"bg-amber-500 hover:bg-amber-400 text-slate-950", danger:"bg-rose-500/20 hover:bg-rose-500/30 text-rose-400 border border-rose-500/30", ghost:"bg-slate-800 hover:bg-slate-700 text-slate-300" };
          return <button disabled={disabled} onClick={onClick} className={`${base} ${sz[size]} ${va[variant]} ${className}`}>{children}</button>;
        }

        function Field({ label, required, children }) {
          return (
            <div className="flex flex-col gap-1.5">
              <label className="text-slate-400 text-xs font-semibold">{label}{required && <span className="text-rose-400 ml-0.5">*</span>}</label>
              {children}
            </div>
          );
        }

        const inp = "bg-slate-800 border border-slate-700 text-white rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-amber-500 w-full placeholder-slate-500";
        const sel = `${inp} appearance-none`;

        function Modal({ open, onClose, title, children }) {
          if (!open) return null;
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm" onClick={onClose}>
              <div className="bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col max-h-[90vh]" onClick={e=>e.stopPropagation()}>
                <div className="flex items-center justify-between px-5 py-4 border-b border-slate-800">
                  <p className="text-white font-bold text-base">{title}</p>
                  <button onClick={onClose} className="text-slate-400 hover:text-white p-1">{Icon.x}</button>
                </div>
                <div className="overflow-y-auto p-5">{children}</div>
              </div>
            </div>
          );
        }

        const Toast = ({ msg }) => msg ? (
          <div className="fixed top-6 right-6 z-[100] bg-emerald-500 text-slate-950 px-4 py-3 rounded-xl shadow-2xl flex items-center gap-2 font-bold animate-bounce">
            {Icon.check} {msg}
          </div>
        ) : null;

        // ─── SPRINT 3: DASHBOARD PAGE ────────────────────────────────────────────────
        function Dashboard({ orders }) {
          const totalNet = orders.reduce((sum, o) => sum + o.net, 0);
          return (
            <div className="flex flex-col gap-4">
              <div className="grid grid-cols-2 gap-4">
                <Card className="bg-gradient-to-br from-emerald-600/20 to-teal-900/20 border-emerald-500/30 !p-0">
                  <div className="p-4">
                    <p className="text-emerald-400 text-sm">รายได้สุทธิวันนี้ (Net)</p>
                    <p className="text-3xl text-white font-black mt-1 break-words">{fmtCost(totalNet)}</p>
                  </div>
                </Card>
                <Card className="bg-gradient-to-br from-blue-600/20 to-sky-900/20 border-blue-500/30 !p-0">
                  <div className="p-4">
                    <p className="text-blue-400 text-sm">จำนวนออเดอร์</p>
                    <p className="text-3xl text-white font-black mt-1 break-words">{orders.length} บิล</p>
                  </div>
                </Card>
              </div>
              <Card title="ออเดอร์ล่าสุด" className="!p-0">
                {orders.length === 0 ? <p className="text-slate-500 text-center py-8">ยังไม่มีออเดอร์วันนี้</p> : (
                  <div className="overflow-x-auto">
                    <table className="w-full text-left text-sm whitespace-nowrap min-w-[500px]">
                      <thead><tr className="border-b border-slate-800 text-slate-400 bg-slate-900/50"><th className="p-3">เวลา</th><th className="p-3">โหมด</th><th className="p-3">รายการ</th><th className="p-3 text-right">ยอดรับสุทธิ</th></tr></thead>
                      <tbody>
                        {orders.map((o,i) => (
                          <tr key={i} className="border-b border-slate-800/50 hover:bg-slate-800/30">
                            <td className="p-3 text-slate-400">{o.time}</td>
                            <td className="p-3"><Badge color={o.type==='storefront'?'amber':'rose'}>{o.type==='storefront'?'หน้าร้าน':'เดลิเวอรี่'}</Badge></td>
                            <td className="p-3 text-white break-words whitespace-normal max-w-[200px]">{o.items}</td>
                            <td className="p-3 text-right text-emerald-400 font-bold">{fmtCost(o.net)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </Card>
            </div>
          );
        }

        // ─── SPRINT 3: POS PAGE ──────────────────────────────────────────────────────
        function POSPage({ recipes, ingredients, setIngredients, onOrderComplete }) {
          const [orderType, setOrderType] = useState('storefront');
          const [cart, setCart] = useState([]);
          const [gpPercent, setGpPercent] = useState(30);
          const [adsDiscount, setAdsDiscount] = useState(0);

          const grossTotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
          const gpDeduction = orderType === 'delivery' ? grossTotal * (gpPercent / 100) : 0;
          const netRevenue = orderType === 'delivery' ? grossTotal - gpDeduction - adsDiscount : grossTotal;

          const addToCart = (recipe) => {
            setCart(prev => {
              const ex = prev.find(i => i.id === recipe.id);
              if (ex) return prev.map(i => i.id === recipe.id ? { ...i, qty: i.qty + 1 } : i);
              return [...prev, { ...recipe, qty: 1 }];
            });
          };

          const updateQty = (id, delta) => {
            setCart(prev => prev.map(i => i.id === id ? { ...i, qty: Math.max(0, i.qty + delta) } : i).filter(i => i.qty > 0));
          };

          const checkout = () => {
            if (cart.length === 0) return;
            let stockDeductions = {};
            cart.forEach(cartItem => {
                const recipe = recipes.find(r => r.id === cartItem.id);
                if(recipe) {
                    recipe.lines.forEach(line => {
                        stockDeductions[line.ingId] = (stockDeductions[line.ingId] || 0) + (line.qty * cartItem.qty);
                    });
                }
            });
            setIngredients(prev => prev.map(ing => stockDeductions[ing.id] ? { ...ing, stock: Math.max(0, ing.stock - stockDeductions[ing.id]) } : ing));
            onOrderComplete({
              id: `#${Math.floor(1000 + Math.random() * 9000)}`,
              type: orderType,
              items: cart.map(i => `${i.name} x${i.qty}`).join(', '),
              gross: grossTotal,
              net: netRevenue,
              time: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })
            });
            setCart([]); setAdsDiscount(0);
          };

          return (
            <div className="flex flex-col lg:flex-row gap-4 h-[calc(100vh-8rem)]">
              <div className="flex-1 flex flex-col gap-4 overflow-y-auto">
                <div className="flex gap-2 bg-slate-900 p-2 rounded-2xl border border-slate-800 flex-shrink-0">
                  <button onClick={() => setOrderType('storefront')} className={`flex-1 py-3 rounded-xl font-bold transition-all ${orderType==='storefront'?'bg-amber-500 text-slate-950':'text-slate-400 hover:bg-slate-800'}`}>🏠 หน้าร้าน</button>
                  <button onClick={() => setOrderType('delivery')} className={`flex-1 py-3 rounded-xl font-bold transition-all ${orderType==='delivery'?'bg-orange-500 text-white':'text-slate-400 hover:bg-slate-800'}`}>🛵 เดลิเวอรี่</button>
                </div>
                <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                  {recipes.map(r => (
                    <button key={r.id} onClick={() => addToCart(r)} className="bg-slate-900 border border-slate-800 hover:border-amber-500 rounded-2xl p-4 text-left transition-all active:scale-95 flex flex-col items-center text-center">
                      <div className="text-4xl mb-2">🥤</div>
                      <p className="text-white font-bold truncate w-full">{r.name}</p>
                      <p className="text-amber-400 text-sm mt-1">{fmtCost(r.price)}</p>
                    </button>
                  ))}
                </div>
              </div>

              <div className="w-full lg:w-96 flex flex-col bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden flex-shrink-0 lg:h-full max-h-[60vh] lg:max-h-full">
                <div className="p-4 border-b border-slate-800 font-bold text-white flex-shrink-0">ตะกร้าออเดอร์</div>
                <div className="flex-1 overflow-y-auto p-2">
                  {cart.length === 0 ? <div className="text-center text-slate-500 py-10">ยังไม่มีรายการ</div> : (
                    <div className="flex flex-col gap-2">
                      {cart.map(item => (
                        <div key={item.id} className="flex items-center justify-between p-3 bg-slate-950 rounded-xl border border-slate-800">
                          <div className="min-w-0 flex-1">
                            <p className="text-white font-bold text-sm truncate">{item.name}</p>
                            <p className="text-slate-400 text-xs">{fmtCost(item.price)}</p>
                          </div>
                          <div className="flex items-center gap-3 bg-slate-900 rounded-lg p-1">
                            <button onClick={() => updateQty(item.id, -1)} className="p-1 text-slate-400 hover:text-rose-400">{item.qty===1 ? Icon.trash : Icon.minus}</button>
                            <span className="text-white font-bold w-4 text-center">{item.qty}</span>
                            <button onClick={() => updateQty(item.id, 1)} className="p-1 text-slate-400 hover:text-emerald-400">{Icon.plus}</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                <div className="p-4 bg-slate-950 border-t border-slate-800 flex flex-col gap-3 flex-shrink-0">
                  <div className="flex justify-between text-slate-400 text-sm"><span>ยอดรวมปกติ</span><span className="text-white">{fmtCost(grossTotal)}</span></div>
                  {orderType === 'delivery' && (
                    <div className="flex flex-col gap-2 bg-orange-500/10 border border-orange-500/30 p-3 rounded-xl">
                      <div className="flex items-center justify-between text-sm"><span className="text-orange-400">หัก GP Platform (%)</span><input type="number" value={gpPercent} onChange={(e)=>setGpPercent(Number(e.target.value))} className="w-16 bg-slate-900 border border-slate-700 rounded text-right px-1 text-white" /></div>
                      <div className="flex justify-between text-rose-400 text-xs"><span>มูลค่าที่โดนหัก</span><span>-{fmtCost(gpDeduction)}</span></div>
                      <div className="flex items-center justify-between text-sm mt-1"><span className="text-orange-400">หักส่วนลด/Ads (฿)</span><input type="number" value={adsDiscount} onChange={(e)=>setAdsDiscount(Number(e.target.value))} className="w-16 bg-slate-900 border border-slate-700 rounded text-right px-1 text-white" /></div>
                    </div>
                  )}
                  <div className="flex justify-between items-center mt-2"><span className="text-lg text-emerald-400 font-bold">ยอดรับสุทธิ</span><span className="text-3xl text-emerald-400 font-black">{fmtCost(netRevenue)}</span></div>
                  <button onClick={checkout} disabled={cart.length === 0} className="w-full py-4 mt-2 bg-emerald-500 hover:bg-emerald-400 disabled:opacity-50 disabled:bg-slate-800 text-slate-950 font-black text-lg rounded-xl transition-all shadow-lg active:scale-95">ยืนยัน & ตัดสต็อก</button>
                </div>
              </div>
            </div>
          );
        }

        // ─── SPRINT 2: INVENTORY & STOCK ADJUSTMENT PAGE ──────────────────────────────
        const EMPTY_ING = { name:"", type:"วัตถุดิบ", unit:"กรัม", stock:"", costPerUnit:"", minStock:"" };

        function InventoryPage({ ingredients, setIngredients, adjustments, setAdjustments, onNavAdj }) {
          const [modal, setModal] = useState(false);
          const [form, setForm] = useState(EMPTY_ING);
          const [toast, showToast] = useToast();

          const save = () => {
            if (!form.name||!form.stock||!form.costPerUnit) return;
            const id = Math.max(0,...ingredients.map(i=>i.id))+1;
            setIngredients(p=>[...p,{...form, id, stock:Number(form.stock), costPerUnit:Number(form.costPerUnit), minStock:Number(form.minStock||0)}]);
            setModal(false); showToast("เพิ่มรายการแล้ว");
          };

          return (
            <div className="flex flex-col gap-4">
              <div className="flex justify-between items-center">
                <Btn onClick={()=>setModal(true)}>{Icon.plus} เพิ่มวัตถุดิบ</Btn>
                <Btn variant="ghost" onClick={onNavAdj}>⚖️ ปรับปรุงสต็อกมือ</Btn>
              </div>
              <Card className="!p-0">
                <div className="overflow-x-auto">
                  <table className="w-full text-left text-sm whitespace-nowrap min-w-[600px]">
                    <thead><tr className="border-b border-slate-800 bg-slate-900/50"><th className="p-3">ชื่อ</th><th className="p-3">ประเภท</th><th className="p-3">สต็อกคงเหลือ</th><th className="p-3">ต้นทุน/หน่วย</th><th className="p-3 text-center">จัดการ</th></tr></thead>
                    <tbody>
                      {ingredients.map(ing=>{
                        const low = ing.stock <= ing.minStock;
                        return (
                          <tr key={ing.id} className="border-b border-slate-800/50 hover:bg-slate-800/30">
                            <td className="p-3 text-white font-semibold break-words whitespace-normal max-w-[150px]">{ing.name}</td>
                            <td className="p-3"><Badge color={ing.type==="วัตถุดิบ"?"amber":"violet"}>{ing.type}</Badge></td>
                            <td className="p-3"><span className={`font-bold ${low?'text-rose-400':'text-white'}`}>{ing.stock} {ing.unit}</span> {low && <span className="text-xs text-rose-500 ml-1">(ใกล้หมด)</span>}</td>
                            <td className="p-3 text-slate-300">{fmtCost(ing.costPerUnit)}</td>
                            <td className="p-3 text-center"><button onClick={()=>setIngredients(p=>p.filter(i=>i.id!==ing.id))} className="text-slate-500 hover:text-rose-400 p-2">{Icon.trash}</button></td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </Card>
              <Modal open={modal} onClose={()=>setModal(false)} title="เพิ่มวัตถุดิบ / แพคเกจจิ้ง">
                <div className="flex flex-col gap-4">
                  <Field label="ชื่อ"><input className={inp} value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></Field>
                  <div className="grid grid-cols-2 gap-3">
                    <Field label="ประเภท"><select className={sel} value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}><option>วัตถุดิบ</option><option>แพคเกจจิ้ง</option></select></Field>
                    <Field label="หน่วย"><select className={sel} value={form.unit} onChange={e=>setForm(f=>({...f,unit:e.target.value}))}><option>กรัม</option><option>มล.</option><option>ชิ้น</option></select></Field>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <Field label="สต็อก"><input type="number" className={inp} value={form.stock} onChange={e=>setForm(f=>({...f,stock:e.target.value}))}/></Field>
                    <Field label="แจ้งเตือนขั้นต่ำ"><input type="number" className={inp} value={form.minStock} onChange={e=>setForm(f=>({...f,minStock:e.target.value}))}/></Field>
                  </div>
                  <Field label="ต้นทุน (฿)"><input type="number" className={inp} value={form.costPerUnit} onChange={e=>setForm(f=>({...f,costPerUnit:e.target.value}))}/></Field>
                  <Btn onClick={save} disabled={!form.name}>บันทึก</Btn>
                </div>
              </Modal>
            </div>
          );
        }

        function StockAdjPage({ ingredients, setIngredients, adjustments, setAdjustments, onBack }) {
          const [form, setForm] = useState({ ingId:"", type:"Damage/Waste", qty:"", reason:"" });
          const [toast, showToast] = useToast();

          const submit = () => {
            if (!form.ingId||!form.qty) return;
            const ing = ingredients.find(i=>i.id===Number(form.ingId));
            setIngredients(p=>p.map(i=>i.id===ing.id?{...i,stock:Math.max(0,i.stock-Number(form.qty))}:i));
            setAdjustments(p=>[{id:Date.now(),ingId:ing.id,ingName:ing.name,type:form.type,qty:Number(form.qty),unit:ing.unit,reason:form.reason,date:new Date().toLocaleDateString('th-TH')},...p]);
            showToast(`ปรับลด ${ing.name} แล้ว ✓`);
            setForm({ ingId:"", type:"Damage/Waste", qty:"", reason:"" });
          };

          return (
            <div className="flex flex-col gap-4">
              <div className="flex items-center gap-2 mb-2">
                <button onClick={onBack} className="p-2 bg-slate-800 rounded-lg hover:text-white">{Icon.back}</button>
                <h2 className="text-white font-bold text-lg">บันทึกปรับลดสต็อก (Manual)</h2>
              </div>
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                <Card title="ฟอร์มตัดสต็อก">
                  <div className="flex flex-col gap-4">
                    <Field label="ประเภท">
                      <select className={sel} value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}><option>Damage/Waste (ของเสีย)</option><option>WIP / R&D (ทดลองสูตร)</option></select>
                    </Field>
                    <Field label="วัตถุดิบ">
                      <select className={sel} value={form.ingId} onChange={e=>setForm(f=>({...f,ingId:e.target.value}))}>
                        <option value="">-- เลือกวัตถุดิบ --</option>
                        {ingredients.map(i=>(<option key={i.id} value={i.id}>{i.name} ({i.stock} {i.unit})</option>))}
                      </select>
                    </Field>
                    <Field label="จำนวนที่ปรับลด"><input type="number" className={inp} value={form.qty} onChange={e=>setForm(f=>({...f,qty:e.target.value}))}/></Field>
                    <Field label="หมายเหตุ"><input className={inp} value={form.reason} onChange={e=>setForm(f=>({...f,reason:e.target.value}))}/></Field>
                    <Btn onClick={submit} variant="danger">ยืนยันตัดสต็อก</Btn>
                  </div>
                </Card>
                <Card title="ประวัติการตัด" className="!p-0">
                  <div className="overflow-x-auto p-4">
                    {adjustments.length===0 ? <p className="text-slate-500 text-center">ไม่มีประวัติ</p> : (
                      <table className="w-full text-left text-sm whitespace-nowrap min-w-[400px]">
                        <thead><tr className="border-b border-slate-800 text-slate-400"><th className="pb-2">วันที่</th><th className="pb-2">รายการ</th><th className="pb-2">จำนวน</th></tr></thead>
                        <tbody>
                          {adjustments.map(a=>(<tr key={a.id} className="border-b border-slate-800/50"><td className="py-2">{a.date}</td><td className="py-2 text-white">{a.ingName} <br/><span className="text-xs text-slate-500">{a.type}</span></td><td className="py-2 text-rose-400 font-bold">-{a.qty}</td></tr>))}
                        </tbody>
                      </table>
                    )}
                  </div>
                </Card>
              </div>
            </div>
          );
        }

        // ─── SPRINT 2: RECIPE PAGE ───────────────────────────────────────────────────
        function RecipePage({ ingredients, recipes, setRecipes }) {
          const [selected, setSelected] = useState(recipes[0]?.id||null);
          const [modalNew, setModalNew] = useState(false);
          const [modalAddIng, setModalAddIng] = useState(false);
          const [newName, setNewName] = useState("");
          const [newPrice, setNewPrice] = useState("");
          const [toast, showToast] = useToast();

          const recipe = recipes.find(r=>r.id===selected)||null;
          const cost = useMemo(()=>recipe?calcRecipeCost(recipe.lines,ingredients):0,[recipe,ingredients]);

          const createRecipe = () => {
            if (!newName) return;
            const id = Math.max(0,...recipes.map(r=>r.id))+1;
            setRecipes(p=>[...p,{id,name:newName,price:Number(newPrice||0),lines:[]}]);
            setSelected(id); setModalNew(false); setNewName(""); setNewPrice(""); showToast("สร้างเมนูใหม่แล้ว");
          };

          const addIngToRecipe = (ingId) => {
            setRecipes(p=>p.map(r=>r.id===recipe.id?{...r,lines:[...r.lines,{ingId,qty:1}]}:r));
            setModalAddIng(false);
          };

          const changeQty = (ingId, val) => {
            setRecipes(p=>p.map(r=>r.id===recipe.id?{...r,lines:r.lines.map(l=>l.ingId===ingId?{...l,qty:val}:l)}:r));
          };

          return (
            <div className="flex flex-col lg:flex-row gap-4 h-full">
              <div className="w-full lg:w-1/3 flex flex-col gap-4">
                <Card title="เมนูทั้งหมด" action={<Btn size="sm" onClick={()=>setModalNew(true)}>{Icon.plus} เมนูใหม่</Btn>} className="flex-1 !p-0">
                  <div className="overflow-y-auto max-h-[50vh] lg:max-h-[70vh]">
                    {recipes.map(r=>(
                      <div key={r.id} onClick={()=>setSelected(r.id)} className={`p-4 border-b border-slate-800 cursor-pointer transition-colors ${selected===r.id?'bg-amber-500/10 border-l-4 border-l-amber-500':'hover:bg-slate-800/50'}`}>
                        <p className="text-white font-bold">{r.name}</p>
                        <p className="text-xs text-slate-400 mt-1">ราคาขาย: {fmtCost(r.price)} | ต้นทุน: {fmtCost(calcRecipeCost(r.lines,ingredients))}</p>
                      </div>
                    ))}
                  </div>
                </Card>
              </div>

              <div className="w-full lg:w-2/3 flex flex-col gap-4">
                {!recipe ? <div className="text-center text-slate-500 py-10 border border-slate-800 rounded-2xl">เลือกเมนูเพื่อดูสูตร</div> : (
                  <>
                    <div className="bg-gradient-to-br from-amber-500/10 to-orange-500/5 border border-amber-500/30 rounded-2xl p-4 flex justify-between items-center">
                      <div>
                        <p className="text-amber-400 text-xs">สูตรสำหรับเมนู</p>
                        <p className="text-white text-xl font-black">{recipe.name}</p>
                      </div>
                      <div className="text-right">
                        <p className="text-slate-400 text-xs">Food Cost / แก้ว</p>
                        <p className="text-amber-400 text-2xl font-black">{fmtCost(cost)}</p>
                      </div>
                    </div>
                    <Card title="วัตถุดิบในสูตร (BOM)" action={<Btn size="sm" onClick={()=>setModalAddIng(true)}>{Icon.plus} เพิ่มวัตถุดิบ</Btn>} className="!p-0">
                      <div className="overflow-x-auto">
                        <table className="w-full text-left text-sm whitespace-nowrap min-w-[500px]">
                          <thead><tr className="border-b border-slate-800 bg-slate-900/50"><th className="p-3">วัตถุดิบ</th><th className="p-3">ปริมาณใช้/แก้ว</th><th className="p-3 text-right">ต้นทุนย่อย</th><th className="p-3"></th></tr></thead>
                          <tbody>
                            {recipe.lines.map(line=>{
                              const ing=ingredients.find(i=>i.id===line.ingId);
                              if(!ing) return null;
                              return (
                                <tr key={line.ingId} className="border-b border-slate-800/50">
                                  <td className="p-3 text-white">{ing.name}</td>
                                  <td className="p-3"><input type="number" className="w-20 bg-slate-800 border border-slate-700 rounded px-2 py-1 text-white" value={line.qty} onChange={e=>changeQty(line.ingId,e.target.value)} /> {ing.unit}</td>
                                  <td className="p-3 text-right text-emerald-400">{fmtCost(ing.costPerUnit*Number(line.qty))}</td>
                                  <td className="p-3 text-center"><button onClick={()=>setRecipes(p=>p.map(r=>r.id===recipe.id?{...r,lines:r.lines.filter(l=>l.ingId!==line.ingId)}:r))} className="text-slate-500 hover:text-rose-400">{Icon.trash}</button></td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    </Card>
                  </>
                )}
              </div>

              <Modal open={modalNew} onClose={()=>setModalNew(false)} title="สร้างเมนูใหม่">
                <div className="flex flex-col gap-4">
                  <Field label="ชื่อเมนู"><input className={inp} value={newName} onChange={e=>setNewName(e.target.value)}/></Field>
                  <Field label="ราคาขาย (฿)"><input type="number" className={inp} value={newPrice} onChange={e=>setNewPrice(e.target.value)}/></Field>
                  <Btn onClick={createRecipe} disabled={!newName}>ยืนยัน</Btn>
                </div>
              </Modal>

              <Modal open={modalAddIng} onClose={()=>setModalAddIng(false)} title="เลือกวัตถุดิบเข้าสูตร">
                <div className="flex flex-col gap-2 max-h-72 overflow-y-auto">
                  {ingredients.filter(i=>!recipe?.lines.find(l=>l.ingId===i.id)).map(ing=>(
                    <button key={ing.id} onClick={()=>addIngToRecipe(ing.id)} className="p-3 bg-slate-800 hover:bg-slate-700 rounded-xl text-left text-white font-semibold transition-colors">{ing.name} <span className="text-xs text-slate-400 font-normal">({fmtCost(ing.costPerUnit)}/{ing.unit})</span></button>
                  ))}
                </div>
              </Modal>
            </div>
          );
        }

        // ─── ROOT APP ─────────────────────────────────────────────────────────────────
        function POSApp() {
          const [active, setActive] = useState("pos");
          const [sidebar, setSidebar] = useState(false);
          const [ingredients, setIngredients] = useState(INIT_INGREDIENTS);
          const [recipes, setRecipes] = useState(INIT_RECIPES);
          const [adjustments, setAdjustments] = useState(INIT_ADJUSTMENTS);
          const [orders, setOrders] = useState([]);
          const [toast, showToast] = useToast();

          const handleOrderComplete = (newOrder) => {
            setOrders(prev => [newOrder, ...prev]);
            showToast(`รับออเดอร์หน้าร้าน และตัดสต็อกสำเร็จ!`);
          };

          return (
            <div className="flex h-[100dvh] w-screen overflow-hidden bg-slate-950 font-sans selection:bg-amber-500/30">
              <Toast msg={toast} />
              
              <aside className={`flex flex-col bg-slate-900 border-r border-slate-800 z-20 transition-all ${sidebar ? 'w-56 absolute inset-y-0 shadow-2xl' : 'w-16 hidden md:flex'}`}>
                <div className="h-16 border-b border-slate-800 flex items-center px-4 justify-between">
                  <div className="flex items-center text-xl">🧋 <span className={`ml-2 font-bold text-white text-base truncate ${sidebar ? 'block' : 'hidden'}`}>ระบบร้านน้ำ</span></div>
                  <button className="md:hidden text-slate-400" onClick={()=>setSidebar(false)}>{Icon.x}</button>
                </div>
                <nav className="flex-1 p-2 space-y-2 overflow-y-auto">
                  {SIDEBAR_ITEMS.map(item=>(
                    <button key={item.id} onClick={()=>{setActive(item.id); setSidebar(false);}} className={`w-full flex items-center gap-3 p-3 rounded-xl transition-all ${active===item.id||(active==='stock_adj'&&item.id==='stock')?'bg-amber-500 text-slate-950 font-bold':'text-slate-400 hover:bg-slate-800'}`}>
                      <span className="flex-shrink-0">{item.icon}</span> <span className={`truncate ${sidebar ? 'block' : 'hidden'}`}>{item.label}</span>
                    </button>
                  ))}
                </nav>
              </aside>

              <div className="flex-1 flex flex-col min-w-0 h-full relative">
                <header className="h-16 flex-shrink-0 bg-slate-900 border-b border-slate-800 text-white font-bold flex items-center px-4 justify-between">
                  <div className="flex items-center gap-3">
                    <button className="md:hidden text-slate-400 hover:text-white" onClick={()=>setSidebar(true)}>☰</button>
                    <span className="truncate">{active === 'stock_adj' ? 'ปรับปรุงสต็อก (Manual)' : SIDEBAR_ITEMS.find(i=>i.id===active)?.label}</span>
                  </div>
                  <span className="text-amber-400 text-xs md:text-sm bg-amber-500/10 px-2 py-1 rounded-full border border-amber-500/20">All Sprints Merged ✨</span>
                </header>
                
                <main className="flex-1 overflow-y-auto overflow-x-hidden p-2 md:p-4">
                  {active==="pos" && <POSPage recipes={recipes} ingredients={ingredients} setIngredients={setIngredients} onOrderComplete={handleOrderComplete} />}
                  {active==="dashboard" && <Dashboard orders={orders} />}
                  {active==="stock" && <InventoryPage ingredients={ingredients} setIngredients={setIngredients} adjustments={adjustments} setAdjustments={setAdjustments} onNavAdj={()=>setActive('stock_adj')} />}
                  {active==="stock_adj" && <StockAdjPage ingredients={ingredients} setIngredients={setIngredients} adjustments={adjustments} setAdjustments={setAdjustments} onBack={()=>setActive('stock')} />}
                  {active==="recipe" && <RecipePage ingredients={ingredients} recipes={recipes} setRecipes={setRecipes} />}
                </main>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<POSApp />);
    </script>
</body>
</html>
