    *{box-sizing:border-box}

    .toast{position:fixed;top:24px;right:24px;z-index:9999;background:#10b981;color:#020617;padding:12px 18px;border-radius:12px;font-weight:700;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,.4);animation:slideIn .25s ease}

    @keyframes spin{100%{transform:rotate(360deg)}}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}

    .modal-body{overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
    .inp{background:#1e293b;border:1px solid #334155;color:#fff;border-radius:10px;padding:10px 12px;font-size:.875rem;width:100%;outline:none;transition:border-color .15s}
    .inp:focus{border-color:#f59e0b}
    select.inp{appearance:none;-webkit-appearance:none}
    textarea.inp{resize:vertical;min-height:72px}
    .btn{display:inline-flex;align-items:center;gap:6px;font-weight:600;border-radius:10px;cursor:pointer;border:none;transition:all .15s;user-select:none;justify-content:center;white-space:nowrap;font-size:.875rem}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .btn-primary{background:#f59e0b;color:#020617;padding:10px 16px;min-height:42px}
    .btn-primary:hover:not(:disabled){background:#fbbf24}
    .btn-ghost{background:#1e293b;color:#cbd5e1;padding:10px 16px;min-height:42px}
    .btn-ghost:hover:not(:disabled){background:#293548}
    .btn-emerald{background:#10b981;color:#020617;padding:10px 16px;min-height:42px}

    .card{background:#0f172a;border-radius:16px;border:1px solid #1e293b;overflow:hidden}
    .card-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #1e293b;font-weight:700;color:#fff;gap:8px;flex-shrink:0}

    .field label{font-size:.75rem;font-weight:600;color:#94a3b8}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
    table{width:100%;border-collapse:collapse;font-size:.875rem}
    th,td{padding:10px 12px;text-align:left;border-bottom:1px solid rgba(30,41,59,.8)}
    th{color:#94a3b8;background:rgba(15,23,42,.5)}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
    #loading-overlay{position:fixed;inset:0;background:rgba(2,6,23,.97);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#10b981;font-weight:bold;font-size:1.2rem}
    #loading-overlay .spin{animation:spin 1s linear infinite;font-size:3rem;margin-bottom:16px;display:block}
    /* shift status banner */
    #shift-banner{display:none;position:fixed;bottom:0;left:0;right:0;z-index:30;background:#0f172a;border-top:1px solid #1e293b;padding:8px 16px;display:flex;align-items:center;gap:12px;font-size:.8rem}

    /* ── RECEIPT PRINT ──────────────────────── */
    #receipt-print-area{display:none}
    @media print{
      body>*{display:none !important}
      #receipt-print-area{display:block !important;width:80mm;margin:0 auto;font-family:'Courier New',Courier,monospace;font-size:12px;color:#000;background:#fff;padding:8px 4px}
      #receipt-print-area *{color:#000 !important;background:none !important}
      @page{size:80mm auto;margin:4mm 2mm}

    .rcpt-addr{font-size:10px;text-align:center;margin-bottom:2px;line-height:1.4}

    .rcpt-order-no{font-size:11px;text-align:center;margin-bottom:4px;font-weight:700}
    .kot-title{font-size:18px;font-weight:700;text-align:center;letter-spacing:2px;margin:4px 0}
    .kot-item{font-size:14px;font-weight:700;padding:4px 0;border-bottom:1px dashed #000}

    /* payment method chips */
    .pay-chip{flex:1;padding:10px 6px;border-radius:10px;border:2px solid transparent;background:#1e293b;color:#94a3b8;font-weight:700;font-size:.8rem;text-align:center;cursor:pointer;transition:all .15s;min-height:52px;display:flex;flex-direction:column;align-items:center;gap:3px}
    .pay-chip.active{border-color:#f59e0b;background:rgba(245,158,11,.1);color:#f59e0b}
    .pay-chip span.icon{font-size:1.3rem;line-height:1}

    /* margin calculator highlight */
    .margin-good{color:#10b981}
    .margin-warn{color:#f59e0b}
    .margin-bad {color:#f87171}
  </style>
</head>

<script>

// ═══════════════════════════════════════════════════════════════════════════
// CLOUD DATA FETCH
// ═══════════════════════════════════════════════════════════════════════════
async function fetchCloudData(){
  try{
    // ingredients
    var r1=await _sb.from('ingredients').select('*').order('id');
    state.ingredients=(r1.data||[]).map(function(i){return{id:i.id,name:i.name,type:i.type,unit:i.unit,stock:Number(i.stock),costPerUnit:Number(i.cost_per_unit),minStock:Number(i.min_stock)}});

    // recipes + lines
    var r2=await _sb.from('recipes').select('*').order('id');
    var r3=await _sb.from('recipe_lines').select('*');
    state.recipes=(r2.data||[]).map(function(r){return{id:r.id,name:r.name,price:Number(r.price),lines:(r3.data||[]).filter(function(l){return l.recipe_id===r.id}).map(function(l){return{ingId:l.ingredient_id,qty:Number(l.qty)}})}});
    if(state.recipes.length>0&&!state.selectedRecipeId)state.selectedRecipeId=state.recipes[0].id;

    // orders (limit 300, newest first)
    var r4=await _sb.from('orders').select('*').order('created_at',{ascending:false}).limit(300);
    state.orders=(r4.data||[]).map(mapOrder);

    // adjustments
    var r5=await _sb.from('adjustments').select('*').order('created_at',{ascending:false});
    state.adjustments=(r5.data||[]).map(function(a){return{id:a.id,ingName:a.ing_name,type:a.type,qty:Number(a.qty),unit:a.unit,reason:a.reason,date:new Date(a.created_at).toLocaleDateString('th-TH')}});

    // platforms (Sprint 6)
    var r6=await _sb.from('platforms').select('*').order('sort_order');
    state.platforms=(r6.data||[]).map(function(p){return{id:p.id,name:p.name,icon:p.icon,gpPercent:Number(p.gp_percent),active:p.active}});

    // platform_prices (Sprint 6)
    var r7=await _sb.from('platform_prices').select('*');
    state.platformPrices=(r7.data||[]);

    // open shift (Sprint 6)
    var r8=await _sb.from('shifts').select('*').eq('status','open').order('opened_at',{ascending:false}).limit(1);
    state.currentShift=(r8.data&&r8.data.length>0)?r8.data[0]:null;

  }catch(err){console.error('fetchCloudData:',err);showToast('⚠️ โหลดข้อมูลไม่สำเร็จ')}
}

function mapOrder(o){
  return{
    id:o.id, type:o.type, items:o.items,
    gross:Number(o.gross), net:Number(o.net), cogs:Number(o.cogs),
    gpPercent:Number(o.gp_percent||0), adsDiscount:Number(o.ads_discount||0),
    paymentMethod:o.payment_method||'cash',
    shiftId:o.shift_id||null,
    time:new Date(o.created_at).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}),
    dateStr:new Date(o.created_at).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'}),
    createdAt:o.created_at,
  };
}

async function refreshView(){await fetchCloudData();render();renderShiftIndicator()}

// ═══════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════
function fmtCost(n){return '฿'+Number(n).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:4})}
function fmtDisplay(n){return '฿'+Number(n).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2})}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function calcRecipeCost(lines,ings){return lines.reduce(function(s,l){var i=ings.find(function(x){return x.id===l.ingId});return s+(i?i.costPerUnit*Number(l.qty):0)},0)}
function parseOrderItems(str){if(!str)return[];return str.split(',').map(function(seg){seg=seg.trim();var m=seg.match(/^(.+?)\s*x(\d+)$/i);return m?{name:m[1].trim(),qty:parseInt(m[2],10)}:{name:seg,qty:1}})}

// DOM builder (unchanged from Sprint 5)
function el(tag,props){
  var e=document.createElement(tag);
  if(props)Object.keys(props).forEach(function(k){var v=props[k];if(k==='cls'){e.className=v}else if(k==='style'&&typeof v==='object'){Object.assign(e.style,v)}else if(k==='html'){e.innerHTML=v}else if(k==='txt'){e.textContent=v}else if(k.indexOf('on')===0){e.addEventListener(k.slice(2).toLowerCase(),v)}else{try{e.setAttribute(k,v)}catch(err){}}});
  for(var i=2;i<arguments.length;i++){var c=arguments[i];if(c==null||c===false)continue;if(typeof c==='string'||typeof c==='number'){e.appendChild(document.createTextNode(c))}else{e.appendChild(c)}}
  return e;
}
function mkField(lbl,inp,req){return el('div',{cls:'field'},el('label',{txt:lbl+(req?'*':'')}),inp)}
function mkInp(opts){var e=document.createElement('input');e.className='inp';if(opts){if(opts.type)e.type=opts.type;if(opts.placeholder)e.placeholder=opts.placeholder;if(opts.value!=null)e.value=opts.value;if(opts.style)Object.assign(e.style,opts.style)}return e}
function mkSel(options,value,onChange){var e=document.createElement('select');e.className='inp';options.forEach(function(opt){var o=document.createElement('option');o.value=opt.value!=null?opt.value:opt.label;o.textContent=opt.label;if(String(opt.value!=null?opt.value:opt.label)===String(value))o.selected=true;e.appendChild(o)});e.addEventListener('change',onChange);return e}

var _toastTimer;
function showToast(msg,color){var t=document.getElementById('toast');t.textContent=msg;t.style.background=color||'#10b981';t.style.color=color?'#fff':'#020617';t.style.display='flex';clearTimeout(_toastTimer);_toastTimer=setTimeout(function(){t.style.display='none'},3200)}
function closeModal(){document.getElementById('modal-container').innerHTML=''}
function openModal(title,bodyEl,wide){
  var mc=document.getElementById('modal-container');mc.innerHTML='';
  var bg=el('div',{cls:'modal-bg',onClick:closeModal});
  var box=el('div',{cls:'modal-box',style:wide?{maxWidth:'560px'}:{},onClick:function(e){e.stopPropagation()}},
    el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 20px',borderBottom:'1px solid #1e293b',flexShrink:0}},
      el('p',{txt:title,style:{fontWeight:700,color:'#fff',margin:0}}),
      el('button',{txt:'✕',style:{background:'none',border:'none',color:'#94a3b8',cursor:'pointer',fontSize:'1.2rem'},onClick:closeModal})
    ),
    el('div',{cls:'modal-body'},bodyEl)
  );
  bg.appendChild(box);mc.appendChild(bg);
}

// ═══════════════════════════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════════════════════════
function buildNav(){
  var nav=document.getElementById('sidebar-nav');nav.innerHTML='';
  PAGES.forEach(function(p){
    var active=state.active===p.id||(state.active==='stock_adj'&&p.id==='stock');
    var btn=el('button',{title:p.label,
      style:{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',padding:'10px',borderRadius:'10px',border:'none',cursor:'pointer',background:active?'#f59e0b':'transparent',color:active?'#020617':'#94a3b8',fontSize:'1.25rem',transition:'all .15s',position:'relative'},
      onClick:function(){navigate(p.id)}
    },p.icon);
    // Red dot on shift icon when open
    if(p.id==='shift'&&state.currentShift){
      var dot=el('div',{style:{position:'absolute',top:'6px',right:'6px',width:'8px',height:'8px',borderRadius:'50%',background:'#10b981',border:'2px solid #0f172a'}});
      btn.appendChild(dot);
    }
    nav.appendChild(btn);
  });
}

function navigate(id){
  state.active=id;buildNav();
  var titles={dashboard:'Dashboard',pos:'ระบบ POS',shift:'รอบการขาย (Shift)',stock:'จัดการสต็อก',recipe:'สูตรอาหาร & Margin',stock_adj:'ประวัติสต็อก',settings:'ตั้งค่าร้าน'};
  document.getElementById('header-title').textContent=titles[id]||'';
  render();
}

function render(){
  var main=document.getElementById('main');main.innerHTML='';
  if(state.active==='dashboard')main.appendChild(renderDashboard());
  else if(state.active==='pos')main.appendChild(renderPOS());
  else if(state.active==='shift')main.appendChild(renderShift());
  else if(state.active==='stock')main.appendChild(renderInventory());
  else if(state.active==='stock_adj')main.appendChild(renderStockAdj());
  else if(state.active==='recipe')main.appendChild(renderRecipe());
  else if(state.active==='settings')main.appendChild(renderSettings());
}

// ─── Shift indicator in header ───────────────────────────
function renderShiftIndicator(){
  var div=document.getElementById('shift-indicator');div.innerHTML='';
  if(state.currentShift){
    var opened=new Date(state.currentShift.opened_at).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});

      style:{display:'flex',alignItems:'center',gap:'6px',background:'rgba(16,185,129,.1)',border:'1px solid rgba(16,185,129,.3)',borderRadius:'999px',padding:'4px 10px',cursor:'pointer',fontSize:'.72rem',color:'#10b981',fontWeight:700},
      onClick:function(){navigate('shift')}
    },'🟢 กะเปิด '+opened));
  }else{
    div.appendChild(el('div',{
      style:{display:'flex',alignItems:'center',gap:'6px',background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.3)',borderRadius:'999px',padding:'4px 10px',cursor:'pointer',fontSize:'.72rem',color:'#f87171',fontWeight:700},
      onClick:function(){navigate('shift')}
    },'⭕ ยังไม่เปิดกะ'));
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// DASHBOARD — same as Sprint 5, + Reprint button in history table
// ═══════════════════════════════════════════════════════════════════════════
function renderDashboard(){
  var orders=state.orders;
  var totalNet=orders.reduce(function(s,o){return s+o.net},0);
  var totalCogs=orders.reduce(function(s,o){return s+(o.cogs||0)},0);
  var netProfit=totalNet-totalCogs;
  var margin=totalNet>0?(netProfit/totalNet)*100:0;
  var profit=netProfit>=0;

  var sfOrders=orders.filter(function(o){return o.type==='storefront'});
  var dvOrders=orders.filter(function(o){return o.type==='delivery'});

function renderPOS(){
  var s=state;

  // If delivery: find GP from selected platform, else 0
  var selPlat=s.platforms.find(function(p){return p.id===s.selectedPlatformId});
  var effectiveGP=s.orderType==='delivery'?(selPlat?selPlat.gpPercent:s.gpPercent):0;
  var gpDeduction=s.orderType==='delivery'?grossTotal*(effectiveGP/100):0;
  var netRevenue=s.orderType==='delivery'?grossTotal-gpDeduction-s.adsDiscount:grossTotal;

  var wrap=el('div',{style:{display:'flex',flexDirection:'column',gap:'16px'}});

    ));
  }

  // Mode toggle (storefront / delivery)
  var toggle=el('div',{style:{display:'flex',gap:'8px',background:'#0f172a',padding:'8px',borderRadius:'16px',border:'1px solid #1e293b'}});
  ['storefront','delivery'].forEach(function(type){

function addToCart(recipe,priceOverride){
  var usePrice=priceOverride!=null?priceOverride:recipe.price;
  var ex=state.cart.find(function(i){return i.id===recipe.id});
  if(ex)state.cart=state.cart.map(function(i){return i.id===recipe.id?Object.assign({},i,{qty:i.qty+1}):i});
  else state.cart=state.cart.concat([Object.assign({},recipe,{price:usePrice,qty:1})]);
  render();
}
function updateQty(id,delta){
  state.cart=state.cart.map(function(i){return i.id===id?Object.assign({},i,{qty:Math.max(0,i.qty+delta)}):i}).filter(function(i){return i.qty>0});
  render();
}

async function checkoutLogic(e,grossTotal,netRevenue,effectiveGP){
  if(!state.cart.length)return;
  var btn=e.currentTarget;btn.disabled=true;btn.textContent='กำลังบันทึก...';
  var s=state;var stockDed={};var totalCogs=0;
  s.cart.forEach(function(cartItem){
    var recipe=s.recipes.find(function(r){return r.id===cartItem.id});
    if(recipe){
      totalCogs+=calcRecipeCost(recipe.lines,s.ingredients)*cartItem.qty;
      recipe.lines.forEach(function(line){stockDed[line.ingId]=(stockDed[line.ingId]||0)+(line.qty*cartItem.qty)});
    }
  });
  try{
    var snapshot={type:s.orderType,items:s.cart.map(function(i){return i.name+' x'+i.qty}).join(', '),gross:grossTotal,net:netRevenue,cogs:totalCogs,gpPercent:effectiveGP,adsDiscount:s.adsDiscount,paymentMethod:s.paymentMethod};
    await _sb.from('orders').insert([{
      type:s.orderType,items:snapshot.items,gross:grossTotal,net:netRevenue,cogs:totalCogs,
      gp_percent:effectiveGP,ads_discount:s.adsDiscount,
      payment_method:s.paymentMethod,
      shift_id:s.currentShift?s.currentShift.id:null,
    }]);
    for(var i=0;i<s.ingredients.length;i++){
      var ing=s.ingredients[i];
      if(stockDed[ing.id])await _sb.from('ingredients').update({stock:Math.max(0,ing.stock-stockDed[ing.id])}).eq('id',ing.id);
    }
    state.cart=[];state.adsDiscount=0;
    showToast('✓ รับออเดอร์บน Cloud สำเร็จ');
    if(s.settings.printOnCheckout)printReceipt(snapshot);
    await refreshView();
  }catch(err){
    console.error(err);alert('เกิดข้อผิดพลาด: '+err.message);
    btn.disabled=false;btn.textContent='✅ ยืนยัน & ตัดสต็อก';
  }
}

function buildPricingRow(label,mode,recipe,cogs,platId,gpPct){
  // Load existing price
  var existingPP=platId?state.platformPrices.find(function(x){return x.recipe_id===recipe.id&&x.platform_id===platId}):null;
  var initPrice=platId?(existingPP?Number(existingPP.price):recipe.price):(recipe.price||0);

  var row=el('div',{style:{background:'#1e293b',borderRadius:'12px',padding:'14px',display:'flex',flexDirection:'column',gap:'10px'}});

  // Label + price input
  var header=el('div',{style:{display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'}});
  header.appendChild(el('span',{txt:label,style:{color:'#fff',fontWeight:700,fontSize:'.875rem',flex:'0 0 auto'}}));
  var priceI=el('input',{type:'number',min:'0',step:'0.5',style:{width:'96px',background:'#0f172a',border:'1px solid #334155',borderRadius:'8px',padding:'6px 10px',color:'#f59e0b',fontWeight:700,fontSize:'1rem',outline:'none',transition:'border-color .15s'}});
  priceI.value=initPrice;
  if(platId){
    var saveBtn=el('button',{cls:'btn btn-sky btn-sm',txt:'💾 บันทึก',style:{marginLeft:'auto'},onClick:async function(){
      this.disabled=true;
      var price=Number(priceI.value||0);
      if(existingPP){await _sb.from('platform_prices').update({price:price}).eq('id',existingPP.id)}
      else{await _sb.from('platform_prices').insert([{recipe_id:recipe.id,platform_id:platId,price:price}])}
      showToast('✓ บันทึกราคา '+label+' แล้ว');await refreshView();
    }});
    header.appendChild(el('span',{txt:'฿',style:{color:'#94a3b8'}}));
    header.appendChild(priceI);
    header.appendChild(saveBtn);
  }else{
    // Storefront price — update recipes table
    header.appendChild(el('span',{txt:'฿',style:{color:'#94a3b8'}}));
    header.appendChild(priceI);
    header.appendChild(el('button',{cls:'btn btn-sky btn-sm',txt:'💾 บันทึก',style:{marginLeft:'auto'},onClick:async function(){
      this.disabled=true;
      await _sb.from('recipes').update({price:Number(priceI.value||0)}).eq('id',recipe.id);
      showToast('✓ บันทึกราคาหน้าร้านแล้ว');await refreshView();
    }}));
  }
  row.appendChild(header);

  // Real-time margin calc
  var calcDiv=el('div',{style:{background:'rgba(0,0,0,.2)',borderRadius:'8px',padding:'10px',fontSize:'.8rem'}});
  function updateCalc(){
    var price=Number(priceI.value||0);
    var gpDeduct=mode==='delivery'?price*(Number(gpPct||0)/100):0;
    var netPrice=price-gpDeduct;
    var profit=netPrice-cogs;
    var marginPct=price>0?(profit/price)*100:0;
    var mClass=marginPct>=30?'margin-good':marginPct>=15?'margin-warn':'margin-bad';
    calcDiv.innerHTML='';
    var rows=[
      {label:'ราคาขาย',val:fmtDisplay(price),col:'#fff'},
    ];
    if(mode==='delivery'&&gpPct>0){rows.push({label:'หัก GP ('+gpPct+'%)',val:'-'+fmtDisplay(gpDeduct),col:'#fb923c'})}
    rows.push({label:'ต้นทุน (COGS)',val:'-'+fmtDisplay(cogs),col:'#f87171'});
    rows.push({label:'กำไรสุทธิ/แก้ว',val:fmtDisplay(profit),col:profit>=0?'#10b981':'#f87171'});
    rows.forEach(function(r){
      calcDiv.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'3px'}},el('span',{txt:r.label,style:{color:'#94a3b8'}}),el('span',{txt:r.val,style:{color:r.col,fontWeight:700}})));
    });
    calcDiv.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',borderTop:'1px solid rgba(255,255,255,.07)',paddingTop:'6px',marginTop:'4px'}},
      el('span',{txt:'% Margin',style:{color:'#94a3b8'}}),
      el('span',{cls:mClass,txt:marginPct.toFixed(1)+'%',style:{fontWeight:900,fontSize:'1rem'}})
    ));
  }
  priceI.addEventListener('input',updateCalc);
  updateCalc();
  row.appendChild(calcDiv);
  return row;
}

function buildReceipt(orderData){
  var s=state.settings;
  var orderNo=genOrderNo();
  var now=new Date();
  var timeStr=now.toLocaleString('th-TH',{hour:'2-digit',minute:'2-digit',day:'numeric',month:'short',year:'numeric'});
  var pm=PAY_METHODS.find(function(p){return p.id===orderData.paymentMethod})||PAY_METHODS[0];
  var html='';
  if(s.logoUrl)html+='<div style="text-align:center;margin-bottom:6px"><img src="'+s.logoUrl+'" style="max-width:60px;max-height:60px;object-fit:contain"/></div>';
  html+='<div class="rcpt-shop-name">'+escHtml(s.shopName)+'</div>';
  html+='<div class="rcpt-addr">'+escHtml(s.address).replace(/\n/g,'<br>')+'</div>';
  html+='<hr class="rcpt-divider">';
  html+='<div class="rcpt-order-no">'+orderNo+(orderData.reprinted?' [REPRINT]':'')+'</div>';
  if(orderData.reprinted&&orderData.originalTime)html+='<div style="text-align:center;font-size:10px;margin-bottom:2px">เวลาขายเดิม: '+orderData.originalTime+'</div>';
  html+='<div class="rcpt-row"><span>'+timeStr+'</span><span>'+(orderData.type==='storefront'?'🏠 หน้าร้าน':'🛵 เดลิเวอรี่')+'</span></div>';
  html+='<div class="rcpt-row"><span>ชำระ: '+pm.icon+' '+pm.label+'</span></div>';
  html+='<hr class="rcpt-divider">';
  parseOrderItems(orderData.items).forEach(function(item){
    var recipe=state.recipes.find(function(r){return r.name===item.name});
    var price=recipe?recipe.price*item.qty:0;
    html+='<div class="rcpt-row"><span>'+escHtml(item.name)+' x'+item.qty+'</span><span>'+(price>0?fmtDisplay(price):'')+'</span></div>';
  });
  html+='<hr class="rcpt-divider">';
  html+='<div class="rcpt-row"><span>ยอดก่อนหัก</span><span>'+fmtDisplay(orderData.gross)+'</span></div>';
  if(orderData.type==='delivery'){
    var gpDed=orderData.gross-orderData.net-(orderData.adsDiscount||0);
    html+='<div class="rcpt-row" style="color:#d97706"><span>หัก GP ('+orderData.gpPercent+'%)</span><span>-'+fmtDisplay(gpDed)+'</span></div>';
    if(orderData.adsDiscount>0)html+='<div class="rcpt-row" style="color:#d97706"><span>หัก Ads/ส่วนลด</span><span>-'+fmtDisplay(orderData.adsDiscount)+'</span></div>';
  }
  html+='<div class="rcpt-row bold"><span>ยอดรับสุทธิ</span><span>'+fmtDisplay(orderData.net)+'</span></div>';
  html+='<hr class="rcpt-divider">';
  html+='<div class="rcpt-center">'+escHtml(s.receiptFooter).replace(/\n/g,'<br>')+'</div>';
  document.getElementById('receipt-print-area').innerHTML=html;
}

function buildKOT(orderData){
  var orderNo=genOrderNo();
  var now=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  var html='<div class="kot-title">KOT '+orderNo+'</div>';
  html+='<div style="text-align:center;font-size:11px;margin-bottom:8px">'+now+' — '+(orderData.type==='storefront'?'หน้าร้าน':'เดลิเวอรี่')+'</div>';
  html+='<hr class="rcpt-divider">';
  parseOrderItems(orderData.items).forEach(function(item){html+='<div class="kot-item">'+item.qty+' × '+escHtml(item.name)+'</div>'});
  document.getElementById('receipt-print-area').innerHTML=html;
}

function printReceipt(orderData){buildReceipt(orderData);setTimeout(function(){window.print()},120)}
function printKOT(orderData){buildKOT(orderData);setTimeout(function(){window.print()},120)}

bootUp();
