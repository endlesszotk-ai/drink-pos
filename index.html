<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Drink POS & Cloud BOM System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --accent-gold: #d97706;
      --accent-gold-hover: #b45309;
      --accent-gold-light: #fef3c7;
    }
    *{box-sizing:border-box}
    body{background:var(--bg-color);color:var(--text-main);font-family:sans-serif;margin:0;overscroll-behavior:none}
    .toast{position:fixed;top:24px;right:24px;z-index:9999;background:#10b981;color:#fff;padding:12px 18px;border-radius:12px;font-weight:700;display:flex;align-items:center;gap:8px;box-shadow:0 10px 40px rgba(0,0,0,.1);animation:slideIn .25s ease}
    @keyframes slideIn{from{transform:translateX(60px);opacity:0}to{transform:none;opacity:1}}
    @keyframes spin{100%{transform:rotate(360deg)}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
    .modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.4);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
    .modal-box{background:var(--card-bg);border:1px solid var(--border-color);border-radius:16px;width:100%;max-width:480px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 25px -5px rgba(0,0,0,.1)}
    .modal-body{overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
    .inp{background:#f8fafc;border:1px solid var(--border-color);color:var(--text-main);border-radius:10px;padding:10px 12px;font-size:.875rem;width:100%;outline:none;transition:all .15s}
    .inp:focus{border-color:var(--accent-gold);box-shadow:0 0 0 3px var(--accent-gold-light)}
    select.inp{appearance:none;-webkit-appearance:none}
    textarea.inp{resize:vertical;min-height:72px}
    .btn{display:inline-flex;align-items:center;gap:6px;font-weight:600;border-radius:10px;cursor:pointer;border:none;transition:all .15s;user-select:none;justify-content:center;white-space:nowrap;font-size:.875rem}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .btn-primary{background:var(--accent-gold);color:#fff;padding:10px 16px;min-height:42px}
    .btn-primary:hover:not(:disabled){background:var(--accent-gold-hover)}
    .btn-ghost{background:#f1f5f9;color:var(--text-main);padding:10px 16px;min-height:42px}
    .btn-ghost:hover:not(:disabled){background:#e2e8f0}
    .btn-emerald{background:#10b981;color:#fff;padding:10px 16px;min-height:42px}
    .btn-emerald:hover:not(:disabled){background:#059669}
    .btn-danger{background:#fff1f2;color:#e11d48;padding:10px 16px;min-height:42px;border:1px solid #ffe4e6}
    .btn-danger:hover:not(:disabled){background:#ffe4e6}
    .btn-violet{background:#f5f3ff;color:#4f46e5;padding:10px 16px;min-height:42px;border:1px solid #ede9fe}
    .btn-violet:hover:not(:disabled){background:#ede9fe}
    .btn-sm{padding:6px 12px;font-size:.75rem;min-height:32px;border-radius:8px}
    .card{background:var(--card-bg);border-radius:16px;border:1px solid var(--border-color);overflow:hidden;box-shadow:0 4px 6px -1px rgba(0,0,0,.05)}
    .card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border-color);font-weight:700;color:var(--text-main);gap:8px}
    .card-body{padding:20px}
    .badge{display:inline-block;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap}
    .badge-amber{background:#fef3c7;color:#d97706}
    .badge-violet{background:#f3e8ff;color:#6d28d9}
    .badge-rose{background:#ffe4e6;color:#e11d48}
    .badge-emerald{background:#d1fae5;color:#059669}
    .badge-slate{background:#f1f5f9;color:#475569}
    .field{display:flex;flex-direction:column;gap:6px}
    .field label{font-size:.75rem;font-weight:700;color:var(--text-muted)}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    table{width:100%;border-collapse:collapse;font-size:.875rem}
    th,td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--border-color)}
    th{color:var(--text-muted);background:#f8fafc;white-space:nowrap;font-weight:600}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:6px}

    /* ── LOGIN SCREEN ───────────────────────────────────── */
    #login-screen{position:fixed;inset:0;z-index:300;background:var(--bg-color);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:24px}
    .pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid #cbd5e1;background:transparent;transition:all .18s}
    .pin-dot.filled{background:var(--accent-gold);border-color:var(--accent-gold);transform:scale(1.15)}
    .numpad-btn{width:100%;background:var(--card-bg);border:1px solid var(--border-color);color:var(--text-main);font-size:1.4rem;font-weight:700;border-radius:14px;padding:0;min-height:68px;cursor:pointer;transition:all .1s;user-select:none;box-shadow:0 1px 2px rgba(0,0,0,.05)}
    .numpad-btn:active{background:var(--accent-gold);color:#fff;border-color:var(--accent-gold);transform:scale(.95)}
    .numpad-btn.clear-btn{color:#e11d48;border-color:#ffe4e6;background:#fff1f2}
    .numpad-btn.back-btn{color:#64748b}
    .pin-shake{animation:shake .38s ease}

    /* ── LOADING ─────────────────────────────────────────── */
    #loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.9);backdrop-filter:blur(4px);z-index:99999;display:none;flex-direction:column;align-items:center;justify-content:center;color:var(--accent-gold);font-weight:bold;font-size:1.2rem}
    #loading-overlay .spin{animation:spin 1s linear infinite;font-size:3rem;margin-bottom:16px;display:block}

    /* ── PAYMENT CHIPS ───────────────────────────────────── */
    .pay-opt{flex:1;padding:10px 4px;border-radius:10px;border:1px solid var(--border-color);background:var(--bg-color);color:var(--text-muted);cursor:pointer;text-align:center;font-size:.75rem;font-weight:700;transition:all .15s;min-height:48px;display:flex;align-items:center;justify-content:center}
    .pay-opt.active{border-color:var(--accent-gold);background:var(--accent-gold-light);color:var(--accent-gold-hover)}

    /* ── SHIFT BANNER ────────────────────────────────────── */
    .shift-banner{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-radius:12px;font-size:.875rem;font-weight:700;margin-bottom:8px}
    .shift-open{background:#ecfdf5;border:1px solid #a7f3d0;color:#059669}
    .shift-closed{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569}

    /* ── RECEIPT PRINT ───────────────────────────────────── */
    #receipt-print-area{display:none}
    @media print{
      body>*{display:none !important}
      #receipt-print-area{display:block !important;width:80mm;margin:0 auto;font-family:'Courier New',Courier,monospace;font-size:12px;color:#000;background:#fff;padding:8px 4px}
      #receipt-print-area *{color:#000 !important;background:none !important}
      @page{size:80mm auto;margin:4mm 2mm}
    }
    .rcpt-shop-name{font-size:16px;font-weight:700;text-align:center;margin-bottom:2px}
    .rcpt-addr{font-size:10px;text-align:center;margin-bottom:2px;line-height:1.4}
    .rcpt-divider{border:none;border-top:1px dashed #000;margin:6px 0}
    .rcpt-row{display:flex;justify-content:space-between;font-size:11px;margin:2px 0}
    .rcpt-row.bold{font-weight:700;font-size:13px}
    .rcpt-center{text-align:center;font-size:10px;margin-top:6px;line-height:1.6}
    .rcpt-order-no{font-size:11px;text-align:center;margin-bottom:4px;font-weight:700}
    .kot-title{font-size:18px;font-weight:700;text-align:center;letter-spacing:2px;margin:4px 0}
    .kot-item{font-size:14px;font-weight:700;padding:4px 0;border-bottom:1px dashed #000}
  </style>
</head>
<body>

<div id="login-screen">
  <div style="font-size:4rem;line-height:1;margin-bottom:8px">🧋</div>
  <div style="text-align:center">
    <p style="color:var(--text-main);font-size:1.5rem;font-weight:800;margin:0 0 4px">Drink POS</p>
    <p style="color:var(--text-muted);font-size:.875rem;margin:0">กรอก PIN เพื่อเข้าสู่ระบบ</p>
  </div>
  <div style="display:flex;gap:20px" id="pin-dots">
    <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div><div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
  </div>
  <p id="login-err" style="color:#e11d48;font-size:.875rem;min-height:22px;margin:-16px 0 0;font-weight:600;text-align:center"></p>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:290px">
    <button class="numpad-btn" onclick="numpad(1)">1</button><button class="numpad-btn" onclick="numpad(2)">2</button><button class="numpad-btn" onclick="numpad(3)">3</button>
    <button class="numpad-btn" onclick="numpad(4)">4</button><button class="numpad-btn" onclick="numpad(5)">5</button><button class="numpad-btn" onclick="numpad(6)">6</button>
    <button class="numpad-btn" onclick="numpad(7)">7</button><button class="numpad-btn" onclick="numpad(8)">8</button><button class="numpad-btn" onclick="numpad(9)">9</button>
    <button class="numpad-btn clear-btn" onclick="numpadClear()">C</button><button class="numpad-btn" onclick="numpad(0)">0</button><button class="numpad-btn back-btn" onclick="numpadBack()">⌫</button>
  </div>
  <p style="color:var(--text-muted);font-size:.75rem;text-align:center">Demo: Admin PIN=1234 · Cashier PIN=0001</p>
</div>

<div id="receipt-print-area"></div>
<div id="loading-overlay"><span class="spin">🔄</span><p id="loading-msg">กำลังโหลดข้อมูล...</p></div>

<div id="app" style="display:none;height:100dvh;width:100vw;overflow:hidden;flex-direction:row;background:var(--bg-color)">
  <aside id="sidebar" style="display:flex;flex-direction:column;background:var(--card-bg);border-right:1px solid var(--border-color);width:68px;flex-shrink:0;z-index:20;box-shadow:2px 0 8px rgba(0,0,0,.02)">
    <div style="height:64px;border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:center;font-size:1.5rem">🧋</div>
    <nav id="sidebar-nav" style="flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:8px;overflow-y:auto"></nav>
  </aside>
  <div style="flex:1;display:flex;flex-direction:column;min-width:0;height:100%;overflow:hidden">
    <header style="height:64px;flex-shrink:0;background:var(--card-bg);border-bottom:1px solid var(--border-color);display:flex;align-items:center;padding:0 20px;justify-content:space-between;gap:8px">
      <span id="header-title" style="font-weight:800;color:var(--text-main);font-size:1.1rem;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      <div style="display:flex;align-items:center;gap:12px;flex-shrink:0">
        <span id="shift-indicator" style="font-size:.75rem;padding:4px 10px;border-radius:999px;display:none;font-weight:600;white-space:nowrap"></span>
        <button id="staff-badge" onclick="doLogout()" title="ออกจากระบบ" style="background:var(--accent-gold-light);border:1px solid #fde68a;color:var(--accent-gold-hover);font-size:.75rem;font-weight:700;padding:6px 14px;border-radius:999px;cursor:pointer;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:background .15s"></button>
        <span style="font-size:.7rem;color:#059669;background:#d1fae5;padding:4px 10px;border-radius:999px;font-weight:700;flex-shrink:0">✓ Cloud Sync</span>
      </div>
    </header>
    <main id="main" style="flex:1;overflow-y:auto;overflow-x:hidden;padding:24px;padding-bottom:100px"></main>
  </div>
</div>

<div id="toast" class="toast" style="display:none"></div>
<div id="modal-container"></div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG & SUPABASE
// ═══════════════════════════════════════════════════════
var SUPABASE_URL = 'https://bxxnockrzvvmwwpjabve.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4eG5vY2tyenZ2bXd3cGphYnZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNzMyOTMsImV4cCI6MjA5NDY0OTI5M30.lbHiUdTEhqxkH9EZUkNhHODo_PxfcTDwNaqG1pJvN90';
var _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
var POINTS_PER_THB = 50; var POINTS_VALUE = 1;  
var DEFAULT_SETTINGS = { shopName:'ร้านชาไทย', logoUrl:'', address:'123 ถนนตัวอย่าง กรุงเทพฯ\nโทร: 02-xxx-xxxx', receiptFooter:'ขอบคุณที่ใช้บริการ 🙏', printOnCheckout:true, paperSize:'80mm' };
function loadSettings(){try{return Object.assign({},DEFAULT_SETTINGS,JSON.parse(localStorage.getItem('pos_settings')||'{}'))}catch(e){return Object.assign({},DEFAULT_SETTINGS)}}
function saveSettings(obj){localStorage.setItem('pos_settings',JSON.stringify(obj))}

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
var state = {
  active:'dashboard', currentStaff: null, staffList: [],
  ingredients:[], wipFormulas:[], recipes:[], adjustments:[], orders:[], platforms:[], platformPrices:[], currentShift:null, allShifts:[],
  orderType:'storefront', selectedPlatformId:null, paymentMethod:'cash', cart:[], gpPercent:0, adsDiscount:0,
  recipeTab: 'menu', selectedRecipeId: null, selectedWipId: null,
  currentMember:null, memberSearchPhone:'', memberNotFound:false, pointsToUse:0,
  extraDiscount:0, extraDiscountReason:'', showDiscountForm:false,
  settings:loadSettings(),
};

var UNIT_FAMILIES = {
  'กรัม':[{name:'กรัม',mult:1},{name:'กิโลกรัม',mult:1000}],
  'มล.':[{name:'มล.',mult:1},{name:'ลิตร',mult:1000}],
  'ชิ้น':[{name:'ชิ้น',mult:1},{name:'แพ็ค (50 ชิ้น)',mult:50},{name:'แพ็ค (100 ชิ้น)',mult:100}],
};
var PAY_METHODS = [ {id:'cash', label:'💵 เงินสด'}, {id:'qr', label:'📱 QR/โอน'}, {id:'card', label:'💳 บัตร'}, {id:'delivery_credit',label:'🛵 เครดิต'} ];
var ALL_PAGES = [
  {id:'dashboard', label:'Dashboard', icon:'⊞', roles:['admin']},
  {id:'pos',       label:'ระบบ POS', icon:'🖥', roles:['admin','cashier']},
  {id:'shift',     label:'รอบการขาย', icon:'🔄', roles:['admin','cashier']},
  {id:'stock',     label:'จัดการสต็อก', icon:'📦', roles:['admin']},
  {id:'recipe',    label:'สูตรอาหาร', icon:'📋', roles:['admin']},
  {id:'settings',  label:'ตั้งค่าร้าน', icon:'⚙️', roles:['admin']},
];

// ═══════════════════════════════════════════════════════
// LOGIN & BOOT
// ═══════════════════════════════════════════════════════
var _pin = '';
window.numpad = function numpad(d){if(_pin.length>=4)return;_pin+=String(d);updatePinDisplay();if(_pin.length===4)setTimeout(tryLogin,80)}
window.numpadBack = function numpadBack(){_pin=_pin.slice(0,-1);updatePinDisplay()}
window.numpadClear = function numpadClear(){_pin='';updatePinDisplay();document.getElementById('login-err').textContent=''}
function updatePinDisplay(){for(var i=0;i<4;i++){var dot=document.getElementById('pd'+i);if(dot)dot.classList.toggle('filled',i<_pin.length)}}

async function tryLogin() {
  document.getElementById('login-err').textContent = '';
  try {
    var { data } = await _sb.from('staff').select('*').eq('pin', _pin).eq('active', true).limit(1);
    if (data && data.length > 0) {
      state.currentStaff = data[0]; _pin = ''; updatePinDisplay();
      document.getElementById('loading-overlay').style.display = 'flex';
      document.getElementById('login-screen').style.display = 'none';
      await fetchCloudData();
      document.getElementById('loading-overlay').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      var sb = document.getElementById('staff-badge'); if (sb) sb.textContent = '👤 ' + state.currentStaff.name;
      navigate(state.currentStaff.role === 'cashier' ? 'pos' : 'dashboard');
    } else {
      _pin = ''; updatePinDisplay();
      document.getElementById('login-err').textContent = 'PIN ไม่ถูกต้อง กรุณาลองใหม่';
      var dots = document.getElementById('pin-dots'); dots.classList.add('pin-shake');
      setTimeout(()=>{dots.classList.remove('pin-shake');document.getElementById('login-err').textContent='';}, 600);
    }
  } catch(e) { _pin = ''; updatePinDisplay(); document.getElementById('login-err').textContent = 'ไม่สามารถเชื่อมต่อ Cloud ได้'; }
}
window.doLogout = function doLogout() {
  if (!confirm('ออกจากระบบใช่ไหม?')) return;
  state.currentStaff=null;state.cart=[];state.currentMember=null;state.memberSearchPhone='';state.memberNotFound=false;state.pointsToUse=0;state.extraDiscount=0;state.extraDiscountReason='';state.showDiscountForm=false;state.paymentMethod='cash';
  document.getElementById('app').style.display = 'none'; document.getElementById('login-screen').style.display = 'flex'; _pin = ''; updatePinDisplay(); document.getElementById('login-err').textContent = '';
}


function exportOrdersCSV(){
  if(!state.orders.length)return showToast('ไม่มีข้อมูล','#e11d48');
  var hdr=['วันที่','เวลา','ประเภท','ชำระ','รายการ','Gross','Net','COGS','Profit','แต้มได้','แต้มใช้','ส่วนลด'];
  var rows=state.orders.map(function(o){return[o.dateStr,o.time,o.type==='storefront'?'หน้าร้าน':'เดลิเวอรี่',payLabel(o.paymentMethod),'"'+o.items.replace(/"/g,'""')+'"',o.gross||0,o.net||o.total||0,o.cogs||0,(o.net||o.total||0)-(o.cogs||0),o.pointsEarned||0,o.pointsUsed||0,o.discountAmount||0].join(',')});
  var csv='\uFEFF'+hdr.join(',')+"\n"+rows.join("\n");
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));a.download='ยอดขาย_'+Date.now()+'.csv';a.click();
  showToast('✓ Export CSV สำเร็จ');
}
async function fetchCloudData() {
  var isAdmin = state.currentStaff && state.currentStaff.role === 'admin';
  var baseQueries = [
    _sb.from('ingredients').select('*').order('id'),
    _sb.from('recipes').select('*').order('id'),
    _sb.from('recipe_lines').select('*'),
    _sb.from('orders').select('*').order('created_at',{ascending:false}).limit(300),
    _sb.from('adjustments').select('*').order('created_at',{ascending:false}),
    _sb.from('platforms').select('*').order('id'),
    _sb.from('platform_prices').select('*'),
    _sb.from('shifts').select('*').order('opened_at',{ascending:false}).limit(50),
    _sb.from('wip_formulas').select('*')
  ];
  if (isAdmin) baseQueries.push(_sb.from('staff').select('*').order('id'));
  var results = await Promise.all(baseQueries);
  var [r1,r2,r3,r4,r5,r6,r7,r8,r9] = results;

  state.ingredients = (r1.data||[]).map(i => ({id:i.id,name:i.name,type:i.type,unit:i.unit,stock:Number(i.stock),costPerUnit:Number(i.cost_per_unit),minStock:Number(i.min_stock),yieldPerBatch:Number(i.yield_per_batch||1)}));
  state.wipFormulas = (r9.data||[]).map(x => ({id:x.id, wipIngId:x.wip_ing_id, rawIngId:x.raw_ing_id, qty:Number(x.qty)}));
  state.recipes = (r2.data||[]).map(r => ({
    id:r.id, name:r.name, price:Number(r.price),
    lines:(r3.data||[]).filter(l=>l.recipe_id===r.id).map(l=>({ingId:l.ingredient_id,qty:Number(l.qty)}))
  }));
  if (state.recipes.length > 0 && !state.selectedRecipeId) state.selectedRecipeId = state.recipes[0].id;
  var wips = state.ingredients.filter(i=>i.type==='WIP/เบส');
  if (wips.length > 0 && !state.selectedWipId) state.selectedWipId = wips[0].id;

  state.orders = (r4.data||[]).map(o => ({
    id:o.id, type:o.type, items:o.items, gross:Number(o.gross), net:Number(o.net), cogs:Number(o.cogs), gpPercent:Number(o.gp_percent||0), adsDiscount:Number(o.ads_discount||0), paymentMethod:o.payment_method||'cash', shiftId:o.shift_id||null, staffId:o.staff_id||null, memberId:o.member_id||null, pointsEarned:Number(o.points_earned||0), pointsUsed:Number(o.points_used||0), discountAmount:Number(o.discount_amount||0), discountReason:o.discount_reason||'', time:new Date(o.created_at).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}), dateStr:new Date(o.created_at).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'})
  }));

function addToCart(recipe,overridePrice){
  var price=overridePrice!=null?overridePrice:recipe.price;
  var ex=state.cart.find(i=>i.id===recipe.id);
  if(ex)state.cart=state.cart.map(i=>i.id===recipe.id?Object.assign({},i,{qty:i.qty+1,price}):i);
  else state.cart=state.cart.concat([Object.assign({},recipe,{qty:1,price})]);
  render();
}
function updateQty(id,delta){
  state.cart=state.cart.map(i=>i.id===id?Object.assign({},i,{qty:Math.max(0,i.qty+delta)}):i).filter(i=>i.qty>0);
  render();
}

    if(!formulas.length) { extra.appendChild(el('p',{txt:'⚠️ ยังไม่ได้ผูกสูตร',style:{color:'#e11d48',fontWeight:700,background:'#fff1f2',padding:'12px',borderRadius:'8px'}})); return; }
    
    var bI = mkInp({type:'number',value:'1',min:'1'}); 
    var yI = mkInp({type:'number',value:wipIng.yieldPerBatch});
    function recalcExpected() { yI.value = wipIng.yieldPerBatch * Number(bI.value||1); form.actualYield = Number(yI.value); }
    bI.addEventListener('input',e=>{form.batches=Number(e.target.value); recalcExpected();});
    yI.addEventListener('input',e=>form.actualYield=Number(e.target.value));
    recalcExpected();

    var cBtn = el('button',{cls:'btn btn-violet',txt:'✅ ยืนยันการผลิต',style:{width:'100%',padding:'14px',fontSize:'1.1rem'},onClick:async function(){
      if(form.actualYield <= 0) return;
      this.disabled=true; this.textContent='กำลังตัดสต็อก...';
      try {
        var totalRawCost = 0;
        for(var i=0; i<formulas.length; i++) {
          var f = formulas[i]; var raw = state.ingredients.find(ri=>ri.id===f.rawIngId);
          if(raw) {
            var useQty = f.qty * form.batches; totalRawCost += (useQty * raw.costPerUnit);
            await _sb.from('ingredients').update({stock: Math.max(0, raw.stock - useQty)}).eq('id', raw.id);
          }
        }
        var newStock = wipIng.stock + form.actualYield;
        var newTotalCostValue = (wipIng.stock * wipIng.costPerUnit) + totalRawCost;
        var newCostPerUnit = newStock > 0 ? (newTotalCostValue / newStock) : 0;
        await _sb.from('ingredients').update({stock: newStock, cost_per_unit: newCostPerUnit}).eq('id', wipIng.id);
        await _sb.from('adjustments').insert([{ingredient_id:wipIng.id, ing_name:wipIng.name, type:'Produce WIP', qty:form.actualYield, unit:wipIng.unit, reason:'ผลิต '+form.batches+' รอบ (คอส '+fmtCost(totalRawCost)+')'}]);
        closeModal(); showToast('✓ ผลิตสำเร็จ ตัดสต็อกแล้ว!'); await refreshView();
      } catch(err) { alert(err.message); this.disabled=false; }
    }});
    extra.appendChild(mkField('จำนวนรอบ (สูตร) ที่ผลิต',bI));
    extra.appendChild(mkField('ปริมาณที่ได้จริง (Actual Yield)',yI));
    extra.appendChild(el('p',{txt:'*ระบบจะตัดวัตถุดิบและคำนวณต้นทุนถัวเฉลี่ยให้อัตโนมัติ',style:{color:'var(--text-muted)',fontSize:'.75rem',margin:0,textAlign:'center'}}));
    extra.appendChild(cBtn);
  }
  if(forceWipId){ 
    wrap.appendChild(el('p',{txt:'ผลิตเบส: '+state.ingredients.find(i=>i.id===forceWipId).name,style:{fontWeight:800,color:'var(--text-main)',fontSize:'1.1rem'}})); 
    renderProdExtra(); 
    wrap.appendChild(extra); 
  } else {
    var wipOpts=[{label:'-- เลือกเบส --',value:''}].concat(state.ingredients.filter(i=>i.type==='WIP/เบส').map(i=>({label:i.name,value:i.id})));
    var wipSel=mkSel(wipOpts,form.wipId,function(e){form.wipId=e.target.value;renderProdExtra();});
    wrap.appendChild(mkField('เลือกเบส',wipSel));
    wrap.appendChild(extra);
  }
  openModal('🍳 ผลิตเบสเข้าสต็อก', wrap);
}


// ═══════════════════════════════════════════════════════
// RECEIPT
// ═══════════════════════════════════════════════════════
function genOrderNo(){return '#'+Date.now().toString().slice(-6)}
function escHtmlR(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function buildReceipt(orderData){
  var s=state.settings;var html='';
  if(s.logoUrl)html+='<div style="text-align:center;margin-bottom:6px"><img src="'+s.logoUrl+'" style="max-width:60px;max-height:60px;object-fit:contain"/></div>';
  html+='<div class="rcpt-shop-name">'+escHtmlR(s.shopName)+'</div>';
  html+='<div class="rcpt-addr">'+escHtmlR(s.address).replace(/\n/g,'<br>')+'</div>';
  html+='<hr class="rcpt-divider">';
  html+='<div class="rcpt-order-no">ออเดอร์ '+genOrderNo()+'</div>';
  html+='<div class="rcpt-row"><span>'+(orderData.dateStr?orderData.dateStr+' '+orderData.time:new Date().toLocaleString('th-TH'))+'</span><span>'+(orderData.type==='storefront'?'หน้าร้าน':'เดลิเวอรี่')+'</span></div>';
  html+='<div class="rcpt-row"><span>ชำระ:</span><span>'+payLabel(orderData.paymentMethod||'cash')+'</span></div>';
  if(orderData.staffName)html+='<div class="rcpt-row"><span>พนักงาน:</span><span>'+escHtmlR(orderData.staffName)+'</span></div>';
  if(orderData.memberName)html+='<div class="rcpt-row"><span>สมาชิก:</span><span>'+escHtmlR(orderData.memberName)+'</span></div>';
  html+='<hr class="rcpt-divider">';
  parseOrderItems(orderData.items).forEach(function(it){html+='<div class="rcpt-row"><span>'+escHtmlR(it.name)+' x'+it.qty+'</span><span></span></div>'});
  html+='<hr class="rcpt-divider">';
  html+='<div class="rcpt-row"><span>ยอดก่อนหัก</span><span>'+fmtDisplay(orderData.gross||0)+'</span></div>';
  if(orderData.type==='delivery'&&(orderData.gpPercent||0)>0){html+='<div class="rcpt-row"><span>หัก GP ('+orderData.gpPercent+'%)</span><span>-'+fmtDisplay((orderData.gross||0)*((orderData.gpPercent||0)/100))+'</span></div>'}
  if((orderData.pointsUsed||0)>0)html+='<div class="rcpt-row"><span>แลกแต้ม ('+orderData.pointsUsed+' แต้ม)</span><span>-'+fmtDisplay(orderData.pointsUsed)+'</span></div>';
  if((orderData.discountAmount||0)>0)html+='<div class="rcpt-row"><span>ส่วนลด'+(orderData.discountReason?' ('+escHtmlR(orderData.discountReason)+')':'')+'</span><span>-'+fmtDisplay(orderData.discountAmount)+'</span></div>';
  html+='<div class="rcpt-row bold"><span>ยอดชำระสุทธิ</span><span>'+fmtDisplay(orderData.net||orderData.total||0)+'</span></div>';
  html+='<hr class="rcpt-divider">';
  if((orderData.pointsEarned||0)>0)html+='<div class="rcpt-row"><span>🌟 แต้มที่ได้รับ</span><span>+'+orderData.pointsEarned+' แต้ม</span></div>';
  if(orderData.memberPoints!=null)html+='<div class="rcpt-row"><span>แต้มสะสมทั้งหมด</span><span>'+orderData.memberPoints+' แต้ม</span></div>';
  html+='<div class="rcpt-center">'+escHtmlR(s.receiptFooter).replace(/\n/g,'<br>')+'</div>';
  document.getElementById('receipt-print-area').innerHTML=html;
}
function buildKOT(orderData){
  var html='<div class="kot-title">KOT '+genOrderNo()+'</div>';
  html+='<div style="text-align:center;font-size:11px;margin-bottom:8px">'+new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})+' — '+(orderData.type==='storefront'?'หน้าร้าน':'เดลิเวอรี่')+'</div>';
  html+='<hr class="rcpt-divider">';
  parseOrderItems(orderData.items).forEach(function(it){html+='<div class="kot-item">'+it.qty+' × '+escHtmlR(it.name)+'</div>'});
  document.getElementById('receipt-print-area').innerHTML=html;
}
function printReceipt(orderData){buildReceipt(orderData);setTimeout(function(){window.print()},120)}
function printKOT(orderData){buildKOT(orderData);setTimeout(function(){window.print()},120)}
// ═══════════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════════
function renderSettings(){
  var s=state.settings;
  var wrap=el('div',{style:{display:'flex',flexDirection:'column',gap:'16px',maxWidth:'640px'}});

  var staffCard=el('div',{cls:'card'});
  staffCard.appendChild(el('div',{cls:'card-head'},el('span',{txt:'👥 จัดการพนักงาน (Staff)'}),el('button',{cls:'btn btn-primary btn-sm',txt:'+ เพิ่ม',onClick:openModalAddStaff})));
  var sfBody=el('div',{cls:'card-body',style:{display:'flex',flexDirection:'column',gap:'8px'}});
  (state.staffList||[]).forEach(st=>{
    var isSelf=state.currentStaff&&st.id===state.currentStaff.id;
    var row=el('div',{style:{display:'flex',alignItems:'center',gap:'12px',background:'#f8fafc',borderRadius:'12px',padding:'12px 16px',border:'1px solid var(--border-color)'}});
    row.appendChild(el('span',{txt:st.active?'🟢':'⚫',style:{fontSize:'1rem'}}));
    row.appendChild(el('div',{style:{flex:1}},el('p',{txt:st.name+(isSelf?' (คุณ)':''),style:{color:'var(--text-main)',fontWeight:800,margin:'0 0 2px'}}),el('p',{txt:st.role==='admin'?'👑 แอดมิน':'💼 แคชเชียร์',style:{color:'var(--text-muted)',fontSize:'.75rem',margin:0}})));
    row.appendChild(el('button',{cls:'btn btn-ghost btn-sm',txt:st.active?'ปิดบัญชี':'เปิดบัญชี',style:{opacity:isSelf?.4:1},onClick:async function(){if(isSelf)return; await _sb.from('staff').update({active:!st.active}).eq('id',st.id);await refreshView()}}));
    if(!isSelf){row.appendChild(el('button',{txt:'🗑',style:{background:'none',border:'none',cursor:'pointer',color:'var(--text-muted)',fontSize:'1.2rem'},onClick:async function(){if(confirm('ลบ?')){await _sb.from('staff').delete().eq('id',st.id);await refreshView()}}}));}
    sfBody.appendChild(row);
  });
  staffCard.appendChild(sfBody);wrap.appendChild(staffCard);

  var platCard=el('div',{cls:'card'});
  platCard.appendChild(el('div',{cls:'card-head'},el('span',{txt:'🛵 แอปเดลิเวอรี่ (GP%)'}),el('button',{cls:'btn btn-primary btn-sm',txt:'+ เพิ่มแอป',onClick:openModalAddPlatform})));
  var platBody=el('div',{cls:'card-body',style:{display:'flex',flexDirection:'column',gap:'10px'}});
  state.platforms.forEach(p=>{
    var row=el('div',{style:{display:'flex',alignItems:'center',gap:'10px',background:'#f8fafc',borderRadius:'12px',padding:'12px 16px',border:'1px solid var(--border-color)'}});
    row.appendChild(el('button',{txt:p.active?'🟢':'⚫',style:{background:'none',border:'none',cursor:'pointer'},onClick:async()=>{await _sb.from('platforms').update({active:!p.active}).eq('id',p.id);await refreshView()}}));
    row.appendChild(el('span',{txt:p.name,style:{color:'var(--text-main)',fontWeight:800,flex:1}}));
    var gpI=el('input',{type:'number',style:{width:'70px',background:'#fff',border:'1px solid var(--border-color)',borderRadius:'8px',padding:'6px 10px',fontWeight:700}});gpI.value=p.gpPercent;
    row.appendChild(el('span',{txt:'GP:',style:{color:'var(--text-muted)',fontSize:'.8rem'}}));row.appendChild(gpI);row.appendChild(el('span',{txt:'%',style:{color:'var(--text-muted)',fontSize:'.8rem'}}));
    row.appendChild(el('button',{cls:'btn btn-ghost btn-sm',txt:'เซฟ GP',onClick:async()=>{await _sb.from('platforms').update({gp_percent:Number(gpI.value)}).eq('id',p.id);showToast('✓ อัปเดต GP');await refreshView()}}));
    platBody.appendChild(row);
  });
  platCard.appendChild(platBody);wrap.appendChild(platCard);
  
  return wrap;
}

function openModalAddStaff() {
  var form={name:'',pin:'',role:'cashier'};
  var nI=mkInp({placeholder:'ชื่อ'});nI.addEventListener('input',e=>form.name=e.target.value);
  var pI=mkInp({placeholder:'PIN 4 หลัก',maxlength:'4',type:'password'});pI.addEventListener('input',e=>form.pin=e.target.value);
  var rSel=mkSel([{label:'💼 แคชเชียร์',value:'cashier'},{label:'👑 แอดมิน',value:'admin'}],'cashier',e=>form.role=e.target.value);
  var btn=el('button',{cls:'btn btn-primary',txt:'เพิ่มพนักงาน',style:{width:'100%'},onClick:async function(){
    if(!form.name||form.pin.length!==4)return;this.disabled=true;
    await _sb.from('staff').insert([{name:form.name,pin:form.pin,role:form.role}]);
    closeModal();await refreshView();
  }});
  openModal('เพิ่มพนักงาน',el('div',{style:{display:'flex',flexDirection:'column',gap:'16px'}},mkField('ชื่อ',nI),mkField('PIN',pI),mkField('บทบาท',rSel),btn));
}
function openModalAddPlatform(){
  var form={name:'',gp:30};
  var nI=mkInp({placeholder:'เช่น Grab'});nI.addEventListener('input',e=>form.name=e.target.value);
  var gpI=mkInp({type:'number',value:'30'});gpI.addEventListener('input',e=>form.gp=e.target.value);
  var btn=el('button',{cls:'btn btn-primary',txt:'เพิ่มแอป',style:{width:'100%'},onClick:async function(){
    if(!form.name)return;this.disabled=true;
    await _sb.from('platforms').insert([{name:form.name,gp_percent:Number(form.gp||0)}]);
    closeModal();await refreshView();
  }});
  openModal('เพิ่มแพลตฟอร์ม',el('div',{style:{display:'flex',flexDirection:'column',gap:'16px'}},mkField('ชื่อ',nI),mkField('GP (%)',gpI),btn));
}

bootUp();
