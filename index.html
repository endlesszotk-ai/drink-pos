<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Drink POS &amp; BOM System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{box-sizing:border-box}
    body{background:#020617;color:#cbd5e1;font-family:sans-serif;margin:0;overscroll-behavior:none}
    .toast{position:fixed;top:24px;right:24px;z-index:9999;background:#10b981;color:#020617;padding:12px 18px;border-radius:12px;font-weight:700;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,.4);animation:slideIn .25s ease}
    @keyframes slideIn{from{transform:translateX(60px);opacity:0}to{transform:none;opacity:1}}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
    .modal-box{background:#0f172a;border:1px solid #334155;border-radius:16px;width:100%;max-width:420px;max-height:90vh;display:flex;flex-direction:column}
    .modal-body{overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
    .inp{background:#1e293b;border:1px solid #334155;color:#fff;border-radius:10px;padding:10px 12px;font-size:.875rem;width:100%;outline:none;transition:border-color .15s}
    .inp:focus{border-color:#f59e0b}
    select.inp{appearance:none;-webkit-appearance:none}
    .btn{display:inline-flex;align-items:center;gap:6px;font-weight:600;border-radius:10px;cursor:pointer;border:none;transition:all .15s;user-select:none;justify-content:center;white-space:nowrap;font-size:.875rem}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .btn-primary{background:#f59e0b;color:#020617;padding:10px 16px;min-height:42px}
    .btn-primary:hover:not(:disabled){background:#fbbf24}
    .btn-ghost{background:#1e293b;color:#cbd5e1;padding:10px 16px;min-height:42px}
    .btn-ghost:hover:not(:disabled){background:#293548}
    .btn-emerald{background:#10b981;color:#020617;padding:10px 16px;min-height:42px}
    .btn-emerald:hover:not(:disabled){background:#34d399}
    .btn-danger{background:rgba(239,68,68,.15);color:#f87171;padding:10px 16px;min-height:42px;border:1px solid rgba(239,68,68,.3)}
    .btn-danger:hover:not(:disabled){background:rgba(239,68,68,.25)}
    .btn-sm{padding:6px 12px;font-size:.75rem;min-height:32px;border-radius:8px}
    .card{background:#0f172a;border-radius:16px;border:1px solid #1e293b;overflow:hidden}
    .card-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #1e293b;font-weight:700;color:#fff;gap:8px}
    .card-body{padding:16px}
    .badge{display:inline-block;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap}
    .badge-amber{background:rgba(245,158,11,.2);color:#fbbf24}
    .badge-violet{background:rgba(139,92,246,.2);color:#a78bfa}
    .badge-rose{background:rgba(239,68,68,.2);color:#f87171}
    .field{display:flex;flex-direction:column;gap:6px}
    .field label{font-size:.75rem;font-weight:600;color:#94a3b8}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    table{width:100%;border-collapse:collapse;font-size:.875rem}
    th,td{padding:10px 12px;text-align:left;border-bottom:1px solid rgba(30,41,59,.8)}
    th{color:#94a3b8;background:rgba(15,23,42,.5)}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
  </style>
</head>
<body>

<div id="app" style="display:flex;height:100dvh;width:100vw;overflow:hidden">
  <aside id="sidebar" style="display:flex;flex-direction:column;background:#0f172a;border-right:1px solid #1e293b;width:58px;flex-shrink:0;z-index:20">
    <div style="height:64px;border-bottom:1px solid #1e293b;display:flex;align-items:center;justify-content:center;font-size:1.4rem">🧋</div>
    <nav id="sidebar-nav" style="flex:1;padding:8px;display:flex;flex-direction:column;gap:6px;overflow-y:auto"></nav>
  </aside>
  <div style="flex:1;display:flex;flex-direction:column;min-width:0;height:100%;overflow:hidden">
    <header style="height:64px;flex-shrink:0;background:#0f172a;border-bottom:1px solid #1e293b;display:flex;align-items:center;padding:0 16px;justify-content:space-between">
      <span id="header-title" style="font-weight:700;color:#fff;font-size:1rem"></span>
      <span style="font-size:.75rem;color:#10b981;background:rgba(16,185,129,.1);padding:4px 10px;border-radius:999px;border:1px solid rgba(16,185,129,.2)">✓ P&amp;L System</span>
    </header>
    <main id="main" style="flex:1;overflow-y:auto;overflow-x:hidden;padding:12px;padding-bottom:80px"></main>
  </div>
</div>

<div id="toast" class="toast" style="display:none"></div>
<div id="modal-container"></div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
var state = {
  active: 'dashboard',
  ingredients: [
    {id:1,name:'ใบชาไทย',type:'วัตถุดิบ',unit:'กรัม',stock:2000,costPerUnit:0.18,minStock:500},
    {id:2,name:'นมข้นหวาน',type:'วัตถุดิบ',unit:'มล.',stock:3500,costPerUnit:0.05,minStock:500},
    {id:3,name:'นมสด',type:'วัตถุดิบ',unit:'มล.',stock:8000,costPerUnit:0.04,minStock:1000},
    {id:8,name:'แก้วพลาสติก',type:'แพคเกจจิ้ง',unit:'ชิ้น',stock:450,costPerUnit:2.00,minStock:100},
  ],
  recipes: [
    {id:1,name:'ชาไทยเย็น',price:45,lines:[{ingId:1,qty:15},{ingId:2,qty:30},{ingId:3,qty:60},{ingId:8,qty:1}]},
  ],
  adjustments: [],
  orders: [],
  orderType: 'storefront',
  cart: [],
  gpPercent: 30,
  adsDiscount: 0,
  selectedRecipeId: 1,
};

var UNIT_FAMILIES = {
  'กรัม': [{name:'กรัม',mult:1},{name:'กิโลกรัม',mult:1000}],
  'มล.':  [{name:'มล.',mult:1},{name:'ลิตร',mult:1000}],
  'ชิ้น': [{name:'ชิ้น',mult:1},{name:'แพ็ค (50 ชิ้น)',mult:50},{name:'แพ็ค (100 ชิ้น)',mult:100}],
};

var PAGES = [
  {id:'dashboard',label:'Dashboard',icon:'⊞'},
  {id:'pos',label:'ระบบ POS',icon:'🖥'},
  {id:'stock',label:'จัดการสต็อก',icon:'📦'},
  {id:'recipe',label:'สูตรอาหาร',icon:'📋'},
];

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function fmtCost(n){return '฿'+Number(n).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:4})}
function fmtDisplay(n){return '฿'+Number(n).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2})}
function calcRecipeCost(lines,ings){return lines.reduce(function(s,l){var i=ings.find(function(x){return x.id===l.ingId});return s+(i?i.costPerUnit*Number(l.qty):0)},0)}

// Tiny DOM builder
function el(tag,props){
  var e=document.createElement(tag);
  if(props) Object.keys(props).forEach(function(k){
    var v=props[k];
    if(k==='cls'){e.className=v}
    else if(k==='style'&&typeof v==='object'){Object.assign(e.style,v)}
    else if(k==='html'){e.innerHTML=v}
    else if(k==='txt'){e.textContent=v}
    else if(k.indexOf('on')===0){e.addEventListener(k.slice(2).toLowerCase(),v)}
    else{try{e.setAttribute(k,v)}catch(err){}}
  });
  for(var i=2;i<arguments.length;i++){
    var c=arguments[i];
    if(c==null||c===false)continue;
    if(typeof c==='string'||typeof c==='number'){e.appendChild(document.createTextNode(c))}
    else{e.appendChild(c)}
  }
  return e;
}

function mkField(labelTxt,inputEl,req){
  return el('div',{cls:'field'},el('label',{txt:labelTxt+(req?'*':'')}),inputEl);
}

function mkInp(opts){
  var e=document.createElement('input');
  e.className='inp';
  if(opts){
    if(opts.type)e.type=opts.type;
    if(opts.placeholder)e.placeholder=opts.placeholder;
    if(opts.value!=null)e.value=opts.value;
    if(opts.style)Object.assign(e.style,opts.style);
  }
  return e;
}

function mkSel(options,value,onChange){
  var e=document.createElement('select');
  e.className='inp';
  options.forEach(function(opt){
    var o=document.createElement('option');
    o.value=opt.value!=null?opt.value:opt.label;
    o.textContent=opt.label;
    if(String(opt.value!=null?opt.value:opt.label)===String(value))o.selected=true;
    e.appendChild(o);
  });
  e.addEventListener('change',onChange);
  return e;
}

var _toastTimer;
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent='✓  '+msg;
  t.style.display='flex';
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(function(){t.style.display='none'},3000);
}

function closeModal(){document.getElementById('modal-container').innerHTML=''}

function openModal(title,bodyEl){
  var mc=document.getElementById('modal-container');
  mc.innerHTML='';
  var bg=el('div',{cls:'modal-bg',onClick:closeModal});
  var box=el('div',{cls:'modal-box',onClick:function(e){e.stopPropagation()}},
    el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 20px',borderBottom:'1px solid #1e293b'}},
      el('p',{txt:title,style:{fontWeight:700,color:'#fff',margin:0}}),
      el('button',{txt:'✕',style:{background:'none',border:'none',color:'#94a3b8',cursor:'pointer',fontSize:'1.2rem'},onClick:closeModal})
    ),
    el('div',{cls:'modal-body'},bodyEl)
  );
  bg.appendChild(box);
  mc.appendChild(bg);
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
function buildNav(){
  var nav=document.getElementById('sidebar-nav');
  nav.innerHTML='';
  PAGES.forEach(function(p){
    var active=state.active===p.id||(state.active==='stock_adj'&&p.id==='stock');
    var btn=el('button',{
      title:p.label,
      style:{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',padding:'10px',borderRadius:'10px',border:'none',cursor:'pointer',
             background:active?'#f59e0b':'transparent',color:active?'#020617':'#94a3b8',fontSize:'1.25rem',transition:'all .15s'},
      onClick:function(){navigate(p.id)}
    },p.icon);
    nav.appendChild(btn);
  });
}

function navigate(id){
  state.active=id;
  buildNav();
  var titles={dashboard:'Dashboard',pos:'ระบบ POS',stock:'จัดการสต็อก',recipe:'สูตรอาหาร',stock_adj:'ประวัติสต็อก'};
  document.getElementById('header-title').textContent=titles[id]||'';
  render();
}

// ─── RENDER ROUTER ────────────────────────────────────────────────────────────
function render(){
  var main=document.getElementById('main');
  main.innerHTML='';
  if(state.active==='dashboard')main.appendChild(renderDashboard());
  else if(state.active==='pos')main.appendChild(renderPOS());
  else if(state.active==='stock')main.appendChild(renderInventory());
  else if(state.active==='stock_adj')main.appendChild(renderStockAdj());
  else if(state.active==='recipe')main.appendChild(renderRecipe());
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function renderDashboard(){
  var orders=state.orders;
  var totalNet=orders.reduce(function(s,o){return s+o.net},0);
  var totalCogs=orders.reduce(function(s,o){return s+(o.cogs||0)},0);
  var netProfit=totalNet-totalCogs;
  var margin=totalNet>0?(netProfit/totalNet)*100:0;
  var profit=netProfit>=0;

  var wrap=el('div',{style:{display:'flex',flexDirection:'column',gap:'16px'}});

  var grid=el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}});

  grid.appendChild(el('div',{cls:'card'},
    el('div',{style:{padding:'16px'}},
      el('p',{txt:'ยอดขายรับสุทธิ (Net Rev.)',style:{color:'#94a3b8',fontSize:'.75rem',margin:'0 0 4px'}}),
      el('p',{txt:fmtDisplay(totalNet),style:{color:'#fff',fontWeight:900,fontSize:'1.4rem',margin:'0 0 4px'}}),
      el('p',{txt:'หลังหัก GP/Ads แล้ว',style:{color:'#64748b',fontSize:'.7rem',margin:0}})
    )
  ));

  grid.appendChild(el('div',{cls:'card',style:{borderColor:'rgba(159,18,57,.4)'}},
    el('div',{style:{padding:'16px'}},
      el('p',{txt:'ต้นทุนวัตถุดิบ (COGS)',style:{color:'#f87171',fontSize:'.75rem',margin:'0 0 4px'}}),
      el('p',{txt:'-'+fmtDisplay(totalCogs),style:{color:'#f87171',fontWeight:900,fontSize:'1.4rem',margin:'0 0 4px'}}),
      el('p',{txt:'Cost of Goods Sold',style:{color:'rgba(248,113,113,.5)',fontSize:'.7rem',margin:0}})
    )
  ));

  var profitCard=el('div',{cls:'card',style:{gridColumn:'1/-1',borderColor:profit?'rgba(16,185,129,.4)':'rgba(239,68,68,.4)'}},
    el('div',{style:{padding:'16px',display:'flex',justifyContent:'space-between',alignItems:'flex-end'}},
      el('div',{},
        el('p',{txt:'กำไรสุทธิ (Net Profit)',style:{color:profit?'#10b981':'#f87171',fontSize:'.75rem',fontWeight:700,margin:'0 0 4px'}}),
        el('p',{txt:fmtDisplay(netProfit),style:{color:profit?'#10b981':'#f87171',fontWeight:900,fontSize:'2rem',margin:0}})
      ),
      el('div',{style:{textAlign:'right'}},
        el('p',{txt:'Margin',style:{color:profit?'rgba(16,185,129,.5)':'rgba(239,68,68,.5)',fontSize:'.7rem',margin:'0 0 2px'}}),
        el('p',{txt:margin.toFixed(1)+'%',style:{color:profit?'#10b981':'#f87171',fontWeight:700,fontSize:'1.1rem',margin:0}})
      )
    )
  );
  grid.appendChild(profitCard);
  wrap.appendChild(grid);

  var tableCard=el('div',{cls:'card'});
  tableCard.appendChild(el('div',{cls:'card-head',txt:'ประวัติการขายวันนี้ ('+orders.length+' บิล)'}));
  if(orders.length===0){
    tableCard.appendChild(el('div',{cls:'card-body'},el('p',{txt:'ยังไม่มีออเดอร์',style:{textAlign:'center',color:'#475569',padding:'24px 0',margin:0}})));
  }else{
    var sw=el('div',{style:{overflowX:'auto'}});
    var thead=el('thead',{},el('tr',{},
      el('th',{txt:'เวลา'}),el('th',{txt:'โหมด'}),el('th',{txt:'รายการ'}),
      el('th',{txt:'ยอดรับ (Net)',style:{textAlign:'right'}}),
      el('th',{txt:'ต้นทุน (COGS)',style:{textAlign:'right',color:'#f87171'}}),
      el('th',{txt:'กำไร',style:{textAlign:'right',color:'#10b981'}})
    ));
    var tbody=el('tbody',{});
    orders.forEach(function(o){
      var op=o.net-o.cogs;
      var badge=el('span',{cls:'badge '+(o.type==='storefront'?'badge-amber':'badge-rose'),txt:o.type==='storefront'?'หน้าร้าน':'เดลิเวอรี่'});
      tbody.appendChild(el('tr',{},
        el('td',{txt:o.time,style:{color:'#94a3b8'}}),
        el('td',{},badge),
        el('td',{txt:o.items,style:{color:'#fff',wordBreak:'break-word',maxWidth:'200px',whiteSpace:'normal'}}),
        el('td',{txt:fmtDisplay(o.net),style:{textAlign:'right',color:'#fff',fontWeight:700}}),
        el('td',{txt:'-'+fmtDisplay(o.cogs),style:{textAlign:'right',color:'#f87171'}}),
        el('td',{txt:fmtDisplay(op),style:{textAlign:'right',fontWeight:700,color:op>=0?'#10b981':'#f87171'}})
      ));
    });
    var tbl=el('table',{style:{minWidth:'700px'}},thead,tbody);
    sw.appendChild(tbl);
    tableCard.appendChild(sw);
  }
  wrap.appendChild(tableCard);
  return wrap;
}

// ─── POS ──────────────────────────────────────────────────────────────────────
function renderPOS(){
  var s=state;
  var grossTotal=s.cart.reduce(function(sum,item){return sum+(item.price*item.qty)},0);
  var gpDeduction=s.orderType==='delivery'?grossTotal*(s.gpPercent/100):0;
  var netRevenue=s.orderType==='delivery'?grossTotal-gpDeduction-s.adsDiscount:grossTotal;

  var wrap=el('div',{style:{display:'flex',flexDirection:'column',gap:'16px'}});

  // Toggle
  var toggle=el('div',{style:{display:'flex',gap:'8px',background:'#0f172a',padding:'8px',borderRadius:'16px',border:'1px solid #1e293b'}});
  ['storefront','delivery'].forEach(function(type){
    var active=s.orderType===type;
    var btn=el('button',{
      txt:type==='storefront'?'🏠 หน้าร้าน':'🛵 เดลิเวอรี่',
      style:{flex:1,padding:'12px',borderRadius:'12px',border:'none',cursor:'pointer',fontWeight:700,
             background:active?(type==='storefront'?'#f59e0b':'#f97316'):'transparent',
             color:active?'#020617':'#94a3b8',transition:'all .15s'},
      onClick:function(){state.orderType=type;render()}
    });
    toggle.appendChild(btn);
  });
  wrap.appendChild(toggle);

  // Menu grid
  var menuGrid=el('div',{style:{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'12px'}});
  s.recipes.forEach(function(r){
    var card=el('div',{cls:'card',
      style:{padding:'16px',cursor:'pointer',textAlign:'center',transition:'border-color .15s'},
      onClick:function(){addToCart(r)},
      onMouseover:function(){card.style.borderColor='#f59e0b'},
      onMouseout:function(){card.style.borderColor='#1e293b'}
    },
      el('div',{txt:'🥤',style:{fontSize:'2.5rem',marginBottom:'8px'}}),
      el('p',{txt:r.name,style:{color:'#fff',fontWeight:700,margin:'0 0 4px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}),
      el('p',{txt:fmtDisplay(r.price),style:{color:'#f59e0b',fontSize:'.875rem',margin:0}})
    );
    menuGrid.appendChild(card);
  });
  wrap.appendChild(menuGrid);

  // Cart
  var cartCard=el('div',{cls:'card'});
  cartCard.appendChild(el('div',{cls:'card-head',txt:'ตะกร้าออเดอร์'}));
  var cartBody=el('div',{style:{padding:'8px',minHeight:'60px'}});
  if(s.cart.length===0){
    cartBody.appendChild(el('p',{txt:'ยังไม่มีรายการ',style:{textAlign:'center',color:'#475569',padding:'24px 0',margin:0}}));
  }else{
    s.cart.forEach(function(item){
      cartBody.appendChild(el('div',{
        style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px',background:'#020617',borderRadius:'12px',border:'1px solid #1e293b',marginBottom:'8px'}},
        el('div',{style:{flex:1,minWidth:0}},
          el('p',{txt:item.name,style:{color:'#fff',fontWeight:700,fontSize:'.875rem',margin:'0 0 2px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}),
          el('p',{txt:fmtDisplay(item.price),style:{color:'#94a3b8',fontSize:'.75rem',margin:0}})
        ),
        el('div',{style:{display:'flex',alignItems:'center',gap:'10px',background:'#0f172a',borderRadius:'8px',padding:'4px 8px'}},
          el('button',{
            txt:item.qty===1?'🗑':'−',
            style:{background:'none',border:'none',cursor:'pointer',color:'#94a3b8',fontSize:'1rem',lineHeight:1},
            onClick:function(){updateQty(item.id,-1)}
          }),
          el('span',{txt:String(item.qty),style:{color:'#fff',fontWeight:700,minWidth:'16px',textAlign:'center'}}),
          el('button',{
            txt:'+',
            style:{background:'none',border:'none',cursor:'pointer',color:'#94a3b8',fontSize:'1rem',lineHeight:1},
            onClick:function(){updateQty(item.id,1)}
          })
        )
      ));
    });
  }
  cartCard.appendChild(cartBody);

  // Footer
  var footer=el('div',{style:{padding:'16px',background:'#020617',borderTop:'1px solid #1e293b',display:'flex',flexDirection:'column',gap:'10px'}});
  footer.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',color:'#94a3b8',fontSize:'.875rem'}},
    el('span',{txt:'ยอดรวมปกติ'}),el('span',{txt:fmtDisplay(grossTotal),style:{color:'#fff'}})
  ));

  if(s.orderType==='delivery'){
    var delivBox=el('div',{style:{background:'rgba(249,115,22,.1)',border:'1px solid rgba(249,115,22,.3)',padding:'12px',borderRadius:'12px',display:'flex',flexDirection:'column',gap:'8px'}});
    var gpI=mkInp({type:'number',value:s.gpPercent,style:{width:'64px',background:'#0f172a',border:'1px solid #334155',borderRadius:'6px',textAlign:'right',padding:'2px 6px',color:'#fff'}});
    gpI.addEventListener('input',function(e){state.gpPercent=Number(e.target.value);render()});
    delivBox.appendChild(el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',fontSize:'.875rem'}},
      el('span',{txt:'หัก GP Platform (%)',style:{color:'#fb923c'}}),gpI
    ));
    delivBox.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',color:'#f87171',fontSize:'.75rem'}},
      el('span',{txt:'มูลค่าที่โดนหัก'}),el('span',{txt:'-'+fmtDisplay(gpDeduction)})
    ));
    var adsI=mkInp({type:'number',value:s.adsDiscount,style:{width:'64px',background:'#0f172a',border:'1px solid #334155',borderRadius:'6px',textAlign:'right',padding:'2px 6px',color:'#fff'}});
    adsI.addEventListener('input',function(e){state.adsDiscount=Number(e.target.value);render()});
    delivBox.appendChild(el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',fontSize:'.875rem'}},
      el('span',{txt:'หักส่วนลด/Ads (฿)',style:{color:'#fb923c'}}),adsI
    ));
    footer.appendChild(delivBox);
  }

  footer.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
    el('span',{txt:'ยอดรับสุทธิ',style:{color:'#10b981',fontWeight:700,fontSize:'1rem'}}),

  });
  if(s.cart.length===0){ckBtn.disabled=true;ckBtn.style.background='#1e293b';ckBtn.style.color='#475569'}

function addToCart(recipe){
  var ex=state.cart.find(function(i){return i.id===recipe.id});
  if(ex)state.cart=state.cart.map(function(i){return i.id===recipe.id?Object.assign({},i,{qty:i.qty+1}):i});
  else state.cart=state.cart.concat([Object.assign({},recipe,{qty:1})]);
  render();
}

function updateQty(id,delta){
  state.cart=state.cart.map(function(i){return i.id===id?Object.assign({},i,{qty:Math.max(0,i.qty+delta)}):i}).filter(function(i){return i.qty>0});
  render();
}

function checkout(){
  if(state.cart.length===0)return;
  var s=state;
  var grossTotal=s.cart.reduce(function(sum,item){return sum+(item.price*item.qty)},0);
  var gpDeduction=s.orderType==='delivery'?grossTotal*(s.gpPercent/100):0;
  var netRevenue=s.orderType==='delivery'?grossTotal-gpDeduction-s.adsDiscount:grossTotal;
  var stockDed={};var totalCogs=0;
  s.cart.forEach(function(cartItem){
    var recipe=s.recipes.find(function(r){return r.id===cartItem.id});
    if(recipe){
      totalCogs+=calcRecipeCost(recipe.lines,s.ingredients)*cartItem.qty;
      recipe.lines.forEach(function(line){stockDed[line.ingId]=(stockDed[line.ingId]||0)+(line.qty*cartItem.qty)});
    }
  });
  state.ingredients=s.ingredients.map(function(ing){return stockDed[ing.id]?Object.assign({},ing,{stock:Math.max(0,ing.stock-stockDed[ing.id])}):ing});
  state.orders=[{
    type:s.orderType,items:s.cart.map(function(i){return i.name+' x'+i.qty}).join(', '),
    gross:grossTotal,net:netRevenue,cogs:totalCogs,
    time:new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})
  }].concat(s.orders);
  state.cart=[];state.adsDiscount=0;
  showToast('รับออเดอร์และตัดสต็อกสำเร็จ!');render();
}

    tbody3.appendChild(el('tr',{},
      el('td',{txt:ing.name,style:{color:'#fff'}}),tdQty,
      el('td',{txt:fmtCost(ing.costPerUnit*Number(line.qty)),style:{textAlign:'right',color:'#10b981'}}),
      el('td',{style:{textAlign:'center'}},delBtn)
    ));
  });
  sw2.appendChild(el('table',{style:{minWidth:'500px'}},
    el('thead',{},el('tr',{},el('th',{txt:'วัตถุดิบ'}),el('th',{txt:'ปริมาณใช้/แก้ว'}),el('th',{txt:'ต้นทุนย่อย',style:{textAlign:'right'}}),el('th',{}))),
    tbody3
  ));
  ingCard.appendChild(sw2);
  wrap.appendChild(ingCard);
  return wrap;
}

function openModalNewRecipe(){
  var form={name:'',price:''};
  var nI=mkInp({placeholder:'ชื่อเมนู'});nI.addEventListener('input',function(e){form.name=e.target.value});
  var pI=mkInp({type:'number',placeholder:'0'});pI.addEventListener('input',function(e){form.price=e.target.value});
  var btn=el('button',{cls:'btn btn-primary',txt:'ยืนยัน',style:{width:'100%'},onClick:function(){
    if(!form.name)return;
    var id=Math.max.apply(null,[0].concat(state.recipes.map(function(r){return r.id})))+1;
    state.recipes.push({id:id,name:form.name,price:Number(form.price||0),lines:[]});
    state.selectedRecipeId=id;closeModal();showToast('สร้างเมนูใหม่แล้ว');render();
  }});
  openModal('สร้างเมนูใหม่',el('div',{style:{display:'flex',flexDirection:'column',gap:'16px'}},mkField('ชื่อเมนู',nI),mkField('ราคาขาย (฿)',pI),btn));
}

function openModalAddIngToRecipe(recipe){
  var avail=state.ingredients.filter(function(i){return!recipe.lines.find(function(l){return l.ingId===i.id})});
  if(avail.length===0){showToast('ไม่มีวัตถุดิบเพิ่มแล้ว');return}
  var list=el('div',{style:{display:'flex',flexDirection:'column',gap:'8px',maxHeight:'280px',overflowY:'auto'}});
  avail.forEach(function(ing){
    var btn=el('button',{
      style:{padding:'12px',background:'#1e293b',borderRadius:'12px',border:'none',cursor:'pointer',color:'#fff',fontWeight:600,textAlign:'left',width:'100%',transition:'background .15s'},
      onMouseover:function(){btn.style.background='#293548'},onMouseout:function(){btn.style.background='#1e293b'},
      onClick:function(){
        state.recipes=state.recipes.map(function(r){return r.id===recipe.id?Object.assign({},r,{lines:r.lines.concat([{ingId:ing.id,qty:1}])}):r});
        closeModal();render();
      }
    },ing.name+' ',el('span',{txt:'('+fmtCost(ing.costPerUnit)+'/'+ing.unit+')',style:{color:'#94a3b8',fontWeight:400,fontSize:'.75rem'}}));
    list.appendChild(btn);
  });
  openModal('เลือกวัตถุดิบเข้าสูตร',list);
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
buildNav();
document.getElementById('header-title').textContent='Dashboard';
render();
</script>
