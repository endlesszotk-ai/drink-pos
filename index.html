    @keyframes spin{100%{transform:rotate(360deg)}}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}

    .btn:disabled{opacity:.4;cursor:not-allowed}
    .btn-primary{background:#f59e0b;color:#020617;padding:10px 16px;min-height:42px}
    .btn-primary:hover:not(:disabled){background:#fbbf24}

    .kot-item{font-size:14px;font-weight:700;padding:4px 0;border-bottom:1px dashed #000}

// ─── CLOUD DATA ───────────────────────────────────────────────────────────────
async function fetchCloudData(){
  try{
    var[r1,r2,r3,r4,r5,r6,r7,r8]=await Promise.all([
      _sb.from('ingredients').select('*').order('id'),
      _sb.from('recipes').select('*').order('id'),
      _sb.from('recipe_lines').select('*'),
      _sb.from('orders').select('*').order('created_at',{ascending:false}).limit(300),
      _sb.from('adjustments').select('*').order('created_at',{ascending:false}),
      _sb.from('platforms').select('*').order('id'),
      _sb.from('platform_prices').select('*'),
      _sb.from('shifts').select('*').order('opened_at',{ascending:false}).limit(50),
    ]);

    state.ingredients=(r1.data||[]).map(function(i){return{id:i.id,name:i.name,type:i.type,unit:i.unit,stock:Number(i.stock),costPerUnit:Number(i.cost_per_unit),minStock:Number(i.min_stock)}});

    state.recipes=(r2.data||[]).map(function(r){return{id:r.id,name:r.name,price:Number(r.price),lines:(r3.data||[]).filter(function(l){return l.recipe_id===r.id}).map(function(l){return{ingId:l.ingredient_id,qty:Number(l.qty)}})}});
    if(state.recipes.length>0&&!state.selectedRecipeId)state.selectedRecipeId=state.recipes[0].id;

    state.orders=(r4.data||[]).map(function(o){return{id:o.id,type:o.type,items:o.items,gross:Number(o.gross),net:Number(o.net),cogs:Number(o.cogs),gpPercent:Number(o.gp_percent||0),adsDiscount:Number(o.ads_discount||0),paymentMethod:o.payment_method||'cash',shiftId:o.shift_id||null,time:new Date(o.created_at).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}),dateStr:new Date(o.created_at).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'}),createdAt:o.created_at}});

    state.adjustments=(r5.data||[]).map(function(a){return{id:a.id,ingName:a.ing_name,type:a.type,qty:Number(a.qty),unit:a.unit,reason:a.reason,date:new Date(a.created_at).toLocaleDateString('th-TH')}});

    state.platforms=(r6.data||[]).map(function(p){return{id:p.id,name:p.name,gpPercent:Number(p.gp_percent),active:p.active}});
    state.platformPrices=(r7.data||[]).map(function(x){return{id:x.id,recipeId:x.recipe_id,platformId:x.platform_id,price:Number(x.price)}});

    var shiftsRaw=r8.data||[];
    state.currentShift=shiftsRaw.find(function(s){return s.status==='open'})||null;
    state.allShifts=shiftsRaw.map(function(s){return{id:s.id,openedAt:s.opened_at,closedAt:s.closed_at,openingCash:Number(s.opening_cash||0),closingCash:s.closing_cash!=null?Number(s.closing_cash):null,expectedCash:s.expected_cash!=null?Number(s.expected_cash):null,cashDiff:s.cash_diff!=null?Number(s.cash_diff):null,status:s.status,note:s.note}});

    // update shift GP if platform selected
    if(state.selectedPlatformId){
      var plat=state.platforms.find(function(p){return p.id===state.selectedPlatformId});
      if(plat)state.gpPercent=plat.gpPercent;
    }

    updateShiftIndicator();
  }catch(err){console.error('fetchCloudData:',err);showToast('⚠️ โหลดข้อมูลไม่สำเร็จ')}
}

  var ind=document.getElementById('shift-indicator');

  }
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function fmtCost(n){return '฿'+Number(n).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:4})}
function fmtDisplay(n){return '฿'+Number(n).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2})}
function fmtDateTime(isoStr){var d=new Date(isoStr);return d.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}
function calcRecipeCost(lines,ings){return lines.reduce(function(s,l){var i=ings.find(function(x){return x.id===l.ingId});return s+(i?i.costPerUnit*Number(l.qty):0)},0)}
function parseOrderItems(itemsStr){if(!itemsStr)return[];return itemsStr.split(',').map(function(seg){seg=seg.trim();var m=seg.match(/^(.+?)\s*x(\d+)$/i);return m?{name:m[1].trim(),qty:parseInt(m[2],10)}:{name:seg,qty:1}})}
function escHtml(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function payLabel(pm){var m=PAY_METHODS.find(function(x){return x.id===pm});return m?m.label:'💵 เงินสด'}

function el(tag,props){
  var e=document.createElement(tag);
  if(props)Object.keys(props).forEach(function(k){var v=props[k];if(k==='cls'){e.className=v}else if(k==='style'&&typeof v==='object'){Object.assign(e.style,v)}else if(k==='html'){e.innerHTML=v}else if(k==='txt'){e.textContent=v}else if(k.indexOf('on')===0){e.addEventListener(k.slice(2).toLowerCase(),v)}else{try{e.setAttribute(k,v)}catch(err){}}});
  for(var i=2;i<arguments.length;i++){var c=arguments[i];if(c==null||c===false)continue;if(typeof c==='string'||typeof c==='number'){e.appendChild(document.createTextNode(c))}else{e.appendChild(c)}}
  return e;
}
function mkField(labelTxt,inputEl,req){return el('div',{cls:'field'},el('label',{txt:labelTxt+(req?'*':'')}),inputEl)}
function mkInp(opts){var e=document.createElement('input');e.className='inp';if(opts){if(opts.type)e.type=opts.type;if(opts.placeholder)e.placeholder=opts.placeholder;if(opts.value!=null)e.value=opts.value;if(opts.style)Object.assign(e.style,opts.style)}return e}
function mkSel(options,value,onChange){var e=document.createElement('select');e.className='inp';options.forEach(function(opt){var o=document.createElement('option');o.value=opt.value!=null?opt.value:opt.label;o.textContent=opt.label;if(String(opt.value!=null?opt.value:opt.label)===String(value))o.selected=true;e.appendChild(o)});e.addEventListener('change',onChange);return e}
var _toastTimer;
function showToast(msg,color){var t=document.getElementById('toast');t.textContent=msg;t.style.background=color||'#10b981';t.style.display='flex';clearTimeout(_toastTimer);_toastTimer=setTimeout(function(){t.style.display='none'},3200)}
function closeModal(){document.getElementById('modal-container').innerHTML=''}
function openModal(title,bodyEl,maxWidth){
  var mc=document.getElementById('modal-container');mc.innerHTML='';

  var box=el('div',{cls:'modal-box',onClick:function(e){e.stopPropagation()}});

  box.appendChild(el('div',{cls:'modal-body'},bodyEl));
  bg.appendChild(box);mc.appendChild(bg);
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
function buildNav(){
  var nav=document.getElementById('sidebar-nav');nav.innerHTML='';
  PAGES.forEach(function(p){
    var active=state.active===p.id||(state.active==='stock_adj'&&p.id==='stock');
    var btn=el('button',{title:p.label,style:{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',padding:'10px',borderRadius:'10px',border:'none',cursor:'pointer',background:active?'#f59e0b':'transparent',color:active?'#020617':'#94a3b8',fontSize:'1.25rem',transition:'all .15s'},onClick:function(){navigate(p.id)}},p.icon);
    nav.appendChild(btn);
  });
}
function navigate(id){
  state.active=id;buildNav();
  var titles={dashboard:'Dashboard',pos:'ระบบ POS',shift:'รอบการขาย (Shift)',stock:'จัดการสต็อก',recipe:'สูตรอาหาร',stock_adj:'ประวัติสต็อก',settings:'ตั้งค่าร้าน / ใบเสร็จ'};
  document.getElementById('header-title').textContent=titles[id]||'';
  render();
}
function render(){
  var main=document.getElementById('main');main.innerHTML='';
  if(state.active==='dashboard')main.appendChild(renderDashboard());
  else if(state.active==='pos')main.appendChild(renderPOS());
  else if(state.active==='shift')main.appendChild(renderShift());
  else if(state.active==='stock')main.appendChild(renderInventory());
  else if(state.active==='stock_adj')main.appendChild(renderStockAdj());
  else if(state.active==='recipe')main.appendChild(renderRecipe());
  else if(state.active==='settings')main.appendChild(renderSettings());
}

// ═══════════════════════════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════
function renderDashboard(){
  var orders=state.orders;
  var totalNet=orders.reduce(function(s,o){return s+o.net},0);
  var totalCogs=orders.reduce(function(s,o){return s+(o.cogs||0)},0);
  var netProfit=totalNet-totalCogs;
  var margin=totalNet>0?(netProfit/totalNet)*100:0;
  var profit=netProfit>=0;
  var sfOrders=orders.filter(function(o){return o.type==='storefront'});
  var dvOrders=orders.filter(function(o){return o.type==='delivery'});
  function platStats(arr){var net=arr.reduce(function(s,o){return s+o.net},0);var cogs=arr.reduce(function(s,o){return s+(o.cogs||0)},0);return{count:arr.length,net:net,profit:net-cogs,pct:totalNet>0?(net/totalNet*100):0}}
  var sf=platStats(sfOrders);var dv=platStats(dvOrders);
  var itemMap={};orders.forEach(function(o){parseOrderItems(o.items).forEach(function(item){itemMap[item.name]=(itemMap[item.name]||0)+item.qty})});
  var bestSelling=Object.keys(itemMap).map(function(n){return{name:n,qty:itemMap[n]}}).sort(function(a,b){return b.qty-a.qty}).slice(0,8);

// RECEIPT & KOT

function genOrderNo(){return '#'+Date.now().toString().slice(-6)}

function buildReceipt(orderData){
  var s=state.settings;
  var orderNo=genOrderNo();
  var now=new Date();
  var timeStr=now.toLocaleString('th-TH',{hour:'2-digit',minute:'2-digit',day:'numeric',month:'short',year:'numeric'});
  var html='';
  if(s.logoUrl)html+='<div style="text-align:center;margin-bottom:6px"><img src="'+s.logoUrl+'" style="max-width:60px;max-height:60px;object-fit:contain"/></div>';
  html+='<div class="rcpt-shop-name">'+escHtml(s.shopName)+'</div>';
  html+='<div class="rcpt-addr">'+escHtml(s.address).replace(/\n/g,'<br>')+'</div>';
  html+='<hr class="rcpt-divider">';
  html+='<div class="rcpt-order-no">ออเดอร์ '+orderNo+'</div>';
  html+='<div class="rcpt-row"><span>'+timeStr+'</span><span>'+(orderData.type==='storefront'?'🏠 หน้าร้าน':'🛵 เดลิเวอรี่')+'</span></div>';
  html+='<div class="rcpt-row"><span>ชำระ:</span><span>'+payLabel(orderData.paymentMethod||'cash')+'</span></div>';
  html+='<hr class="rcpt-divider">';
  parseOrderItems(orderData.items).forEach(function(item){
    var recipe=state.recipes.find(function(r){return r.name===item.name});
    var price=recipe?recipe.price*item.qty:0;
    html+='<div class="rcpt-row"><span>'+escHtml(item.name)+' x'+item.qty+'</span><span>'+(price>0?fmtDisplay(price):'')+'</span></div>';
  });
  html+='<hr class="rcpt-divider">';
  html+='<div class="rcpt-row"><span>ยอดก่อนหัก</span><span>'+fmtDisplay(orderData.gross)+'</span></div>';
  if(orderData.type==='delivery'){
    var gpDed=orderData.gross-orderData.net-(orderData.adsDiscount||0);
    html+='<div class="rcpt-row" style="color:#d97706"><span>หัก GP ('+orderData.gpPercent+'%)</span><span>-'+fmtDisplay(gpDed)+'</span></div>';
    if(orderData.adsDiscount>0)html+='<div class="rcpt-row" style="color:#d97706"><span>หัก Ads/ส่วนลด</span><span>-'+fmtDisplay(orderData.adsDiscount)+'</span></div>';
  }
  html+='<div class="rcpt-row bold"><span>ยอดรับสุทธิ</span><span>'+fmtDisplay(orderData.net)+'</span></div>';
  html+='<hr class="rcpt-divider">';
  html+='<div class="rcpt-center">'+escHtml(s.receiptFooter).replace(/\n/g,'<br>')+'</div>';
  document.getElementById('receipt-print-area').innerHTML=html;
}

function buildKOT(orderData){
  var orderNo=genOrderNo();
  var now=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  var html='<div class="kot-title">KOT '+orderNo+'</div>';
  html+='<div style="text-align:center;font-size:11px;margin-bottom:8px">'+now+' — '+(orderData.type==='storefront'?'หน้าร้าน':'เดลิเวอรี่')+'</div>';
  html+='<hr class="rcpt-divider">';
  parseOrderItems(orderData.items).forEach(function(item){html+='<div class="kot-item">'+item.qty+' × '+escHtml(item.name)+'</div>'});
  document.getElementById('receipt-print-area').innerHTML=html;
}

function printReceipt(orderData){buildReceipt(orderData);setTimeout(function(){window.print()},120)}
function printKOT(orderData){buildKOT(orderData);setTimeout(function(){window.print()},120)}

function addToCart(recipe,overridePrice){
  var price=overridePrice!=null?overridePrice:recipe.price;
  var ex=state.cart.find(function(i){return i.id===recipe.id});
  if(ex)state.cart=state.cart.map(function(i){return i.id===recipe.id?Object.assign({},i,{qty:i.qty+1,price:price}):i});
  else state.cart=state.cart.concat([Object.assign({},recipe,{qty:1,price:price})]);
  render();
}
function updateQty(id,delta){
  state.cart=state.cart.map(function(i){return i.id===id?Object.assign({},i,{qty:Math.max(0,i.qty+delta)}):i}).filter(function(i){return i.qty>0});
  render();
}

  var testBtns=el('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap'}});
  testBtns.appendChild(el('button',{cls:'btn btn-ghost',txt:'🖨️ ทดสอบใบเสร็จ',onClick:function(){printReceipt({type:'storefront',items:'ชาไทยเย็น x2, กาแฟเย็น x1',gross:135,net:135,cogs:20,gpPercent:0,adsDiscount:0,paymentMethod:'cash'})}}));
  testBtns.appendChild(el('button',{cls:'btn btn-ghost',txt:'🍹 ทดสอบใบ KOT',onClick:function(){printKOT({type:'storefront',items:'ชาไทยเย็น x2, กาแฟเย็น x1'})}}));
  pb.appendChild(testBtns);
  var mockBox=el('div',{style:{background:'#fff',color:'#000',borderRadius:'8px',padding:'16px',fontFamily:"'Courier New',monospace",fontSize:'11px',maxWidth:'280px',lineHeight:'1.6',marginTop:'4px'}});
  mockBox.innerHTML='<div style="text-align:center;font-weight:700;font-size:14px">'+escHtml(s.shopName)+'</div>'+'<div style="text-align:center;font-size:10px;margin-bottom:6px">'+escHtml(s.address).replace(/\n/g,'<br>')+'</div>'+'<div style="border-top:1px dashed #000;margin:4px 0"></div>'+'<div style="display:flex;justify-content:space-between"><span>ชาไทยเย็น x2</span><span>฿90</span></div>'+'<div style="display:flex;justify-content:space-between"><span>กาแฟเย็น x1</span><span>฿45</span></div>'+'<div style="border-top:1px dashed #000;margin:4px 0"></div>'+'<div style="display:flex;justify-content:space-between;font-weight:700"><span>ยอดรับสุทธิ</span><span>฿135</span></div>'+'<div style="border-top:1px dashed #000;margin:4px 0"></div>'+'<div style="text-align:center;font-size:10px">'+escHtml(s.receiptFooter).replace(/\n/g,'<br>')+'</div>';

  previewCard.appendChild(pb);wrap.appendChild(previewCard);
  return wrap;
}

function openModalAddPlatform(){
  var form={name:'',gp:30};
  var nI=mkInp({placeholder:'ชื่อแพลตฟอร์ม เช่น Grab'});nI.addEventListener('input',function(e){form.name=e.target.value});
  var gpI=mkInp({type:'number',placeholder:'30',value:'30'});gpI.addEventListener('input',function(e){form.gp=e.target.value});
  var btn=el('button',{cls:'btn btn-primary',txt:'เพิ่มแพลตฟอร์ม',style:{width:'100%'},onClick:async function(){
    if(!form.name)return showToast('กรอกชื่อแพลตฟอร์ม');this.disabled=true;
    await _sb.from('platforms').insert([{name:form.name,gp_percent:Number(form.gp||0)}]);
    closeModal();showToast('เพิ่มแพลตฟอร์ม '+form.name+' แล้ว');await refreshView();
  }});
  openModal('เพิ่มแพลตฟอร์มเดลิเวอรี่',el('div',{style:{display:'flex',flexDirection:'column',gap:'16px'}},mkField('ชื่อแพลตฟอร์ม',nI),mkField('ค่า GP พื้นฐาน (%)',gpI),btn));
}

  buildNav();

}
bootUp();
