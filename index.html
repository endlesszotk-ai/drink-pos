<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drink POS & BOM System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 font-sans overscroll-none text-slate-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // ─── EMOJI ICONS (ลดขนาดไฟล์แทนการใช้ SVG) ──────────────────────────────────
        const Icon = { dashboard: "📊", pos: "🖥️", stock: "📦", recipe: "📝", plus: "➕", minus: "➖", trash: "🗑️", x: "❌", check: "✅", back: "◀️", inbox: "📥", trendUp: "📈", trendDown: "📉" };
        
        const SIDEBAR_ITEMS = [
          { id: "dashboard", label: "Dashboard",   icon: Icon.dashboard },
          { id: "pos",       label: "ระบบ POS",    icon: Icon.pos },
          { id: "stock",     label: "จัดการสต็อก", icon: Icon.stock },
          { id: "recipe",    label: "สูตรอาหาร",   icon: Icon.recipe },
        ];

        // ─── UNIT MULTIPLIERS ────────────────────────────────────────────────────────
        const UNIT_FAMILIES = {
          "กรัม": [{ name: "กรัม", mult: 1 }, { name: "กิโลกรัม", mult: 1000 }],
          "มล.": [{ name: "มล.", mult: 1 }, { name: "ลิตร", mult: 1000 }],
          "ชิ้น": [{ name: "ชิ้น", mult: 1 }, { name: "แพ็ค(50)", mult: 50 }, { name: "แพ็ค(100)", mult: 100 }],
        };

        // ─── MOCK DATA ────────────────────────────────────────────────────────────────
        const INIT_INGREDIENTS = [
          { id:1, name:"ใบชาไทย", type:"วัตถุดิบ", unit:"กรัม", stock:2000, costPerUnit:0.18, minStock:500 },
          { id:2, name:"นมข้นหวาน", type:"วัตถุดิบ", unit:"มล.", stock:3500, costPerUnit:0.05, minStock:500 },
          { id:3, name:"นมสด", type:"วัตถุดิบ", unit:"มล.", stock:8000, costPerUnit:0.04, minStock:1000 },
          { id:8, name:"แก้วพลาสติก", type:"แพคเกจจิ้ง", unit:"ชิ้น", stock:450, costPerUnit:2.0, minStock:100 }
        ];

        const INIT_RECIPES = [
          { id:1, name:"ชาไทยเย็น", price: 45, lines:[{ingId:1,qty:15},{ingId:2,qty:30},{ingId:3,qty:60},{ingId:8,qty:1}] }
        ];

        // ─── HELPERS ─────────────────────────────────────────────────────────────────
        const fmtCost = (n) => `฿${Number(n).toLocaleString('th-TH', {minimumFractionDigits: 2, maximumFractionDigits: 4})}`;
        const fmtDisplay = (n) => `฿${Number(n).toLocaleString('th-TH', {minimumFractionDigits: 0, maximumFractionDigits: 2})}`;
        const calcRecipeCost = (lines, ings) => lines.reduce((s, l) => { const i = ings.find(x => x.id === l.ingId); return s + (i ? i.costPerUnit * Number(l.qty) : 0); }, 0);

        function useToast() {
          const [msg, setMsg] = useState("");
          const show = (m) => { setMsg(m); setTimeout(() => setMsg(""), 3500); };
          return [msg, show];
        }

        // ─── SHARED UI COMPONENTS ─────────────────────────────────────────────────────
        const Badge = ({ children, color="slate" }) => {
          const map = { slate:"bg-slate-700 text-slate-300", amber:"bg-amber-500/20 text-amber-400", rose:"bg-rose-500/20 text-rose-400", emerald:"bg-emerald-500/20 text-emerald-400", violet:"bg-violet-500/20 text-violet-400" };
          return <span className={`inline-block text-xs font-semibold px-2 py-0.5 rounded-full whitespace-nowrap ${map[color]}`}>{children}</span>;
        };

        const Card = ({ title, action, children, className="" }) => (
          <div className={`bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden ${className}`}>
            {(title||action) && (
              <div className="flex items-center justify-between px-4 py-3 border-b border-slate-800 gap-2 font-bold text-white">
                {title && <p>{title}</p>} {action}
              </div>
            )}
            <div className="p-4">{children}</div>
          </div>
        );

        const Btn = ({ children, onClick, variant="primary", className="", disabled=false }) => {
          const va = { primary:"bg-amber-500 hover:bg-amber-400 text-slate-950", danger:"bg-rose-500/20 hover:bg-rose-500/30 text-rose-400 border border-rose-500/30", ghost:"bg-slate-800 hover:bg-slate-700 text-slate-300", emerald:"bg-emerald-500 hover:bg-emerald-400 text-slate-950" };
          return <button disabled={disabled} onClick={onClick} className={`inline-flex items-center justify-center gap-2 font-semibold rounded-xl px-4 py-2.5 text-sm touch-manipulation transition-all disabled:opacity-40 ${va[variant]} ${className}`}>{children}</button>;
        };

        const Field = ({ label, children }) => (
          <div className="flex flex-col gap-1.5"><label className="text-slate-400 text-xs font-semibold">{label}</label>{children}</div>
        );

        const inp = "bg-slate-800 border border-slate-700 text-white rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-amber-500 w-full";
        const sel = `${inp} appearance-none`;

        const Modal = ({ open, onClose, title, children }) => {
          if (!open) return null;
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm" onClick={onClose}>
              <div className="bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col max-h-[90vh]" onClick={e=>e.stopPropagation()}>
                <div className="flex items-center justify-between px-5 py-4 border-b border-slate-800"><p className="text-white font-bold text-base">{title}</p><button onClick={onClose} className="text-slate-400 hover:text-white">{Icon.x}</button></div>
                <div className="overflow-y-auto p-5">{children}</div>
              </div>
            </div>
          );
        };

        const Toast = ({ msg }) => msg ? (
          <div className="fixed top-6 right-6 z-[100] bg-emerald-500 text-slate-950 px-4 py-3 rounded-xl shadow-2xl flex items-center gap-2 font-bold animate-bounce">{Icon.check} {msg}</div>
        ) : null;

        // ─── DASHBOARD PAGE ────────────────────────────────────────────────────────
        function Dashboard({ orders }) {
          const totalNet = orders.reduce((sum, o) => sum + o.net, 0);
          const totalCogs = orders.reduce((sum, o) => sum + (o.cogs || 0), 0);
          const netProfit = totalNet - totalCogs;
          const isProfit = netProfit >= 0;

          return (
            <div className="flex flex-col gap-4">
              <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
                <Card className="bg-slate-800 border-slate-700 !p-0"><div className="p-4"><p className="text-slate-400 text-xs">ยอดขายรับสุทธิ (Net)</p><p className="text-2xl text-white font-black mt-1">{fmtDisplay(totalNet)}</p></div></Card>
                <Card className="bg-rose-900/20 border-rose-900/50 !p-0"><div className="p-4"><p className="text-rose-400 text-xs">ต้นทุนรวม (COGS)</p><p className="text-2xl text-rose-400 font-black mt-1">-{fmtDisplay(totalCogs)}</p></div></Card>
                <Card className={`!p-0 lg:col-span-2 border ${isProfit ? 'bg-emerald-900/20 border-emerald-500/50' : 'bg-rose-900/20 border-rose-500/50'}`}>
                  <div className="p-4 flex justify-between items-end">
                    <div><p className={`text-xs font-bold ${isProfit ? 'text-emerald-400' : 'text-rose-400'}`}>กำไรสุทธิ (Net Profit)</p><p className={`text-3xl font-black mt-1 ${isProfit ? 'text-emerald-400' : 'text-rose-400'}`}>{isProfit ? Icon.trendUp : Icon.trendDown} {fmtDisplay(netProfit)}</p></div>
                    <div className="text-right"><p className="text-xs text-slate-400">Margin (%)</p><p className={`text-xl font-bold ${isProfit ? 'text-emerald-400' : 'text-rose-400'}`}>{totalNet > 0 ? (netProfit / totalNet * 100).toFixed(1) : 0}%</p></div>
                  </div>
                </Card>
              </div>
              <Card title={`ประวัติการขายวันนี้ (${orders.length} บิล)`} className="!p-0">
                <div className="overflow-x-auto"><table className="w-full text-left text-sm whitespace-nowrap min-w-[600px]">
                  <thead><tr className="border-b border-slate-800 text-slate-400 bg-slate-900/50"><th className="p-3">เวลา</th><th className="p-3">รายการ</th><th className="p-3 text-right">ยอดรับ(Net)</th><th className="p-3 text-right text-rose-400">ต้นทุน</th><th className="p-3 text-right text-emerald-400">กำไร</th></tr></thead>
                  <tbody>{orders.map((o,i) => (
                    <tr key={i} className="border-b border-slate-800/50 hover:bg-slate-800/30"><td className="p-3 text-slate-400">{o.time}</td><td className="p-3 text-white max-w-[200px] truncate">{o.items}</td><td className="p-3 text-right font-bold">{fmtDisplay(o.net)}</td><td className="p-3 text-right text-rose-400">-{fmtDisplay(o.cogs)}</td><td className={`p-3 text-right font-bold ${o.net-o.cogs >= 0 ? 'text-emerald-400':'text-rose-400'}`}>{fmtDisplay(o.net-o.cogs)}</td></tr>
                  ))}</tbody>
                </table></div>
              </Card>
            </div>
          );
        }

        // ─── POS PAGE ──────────────────────────────────────────────────────────────
        function POSPage({ recipes, ingredients, setIngredients, onOrderComplete }) {
          const [type, setType] = useState('storefront');
          const [cart, setCart] = useState([]);
          const [gp, setGp] = useState(30);
          const [ads, setAds] = useState(0);

          const gross = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
          const gpDed = type === 'delivery' ? gross * (gp / 100) : 0;
          const net = type === 'delivery' ? gross - gpDed - ads : gross;

          const add = (r) => setCart(p => p.find(i=>i.id===r.id) ? p.map(i=>i.id===r.id?{...i,qty:i.qty+1}:i) : [...p,{...r,qty:1}]);
          const upQty = (id, d) => setCart(p => p.map(i=>i.id===id?{...i,qty:Math.max(0,i.qty+d)}:i).filter(i=>i.qty>0));

          const checkout = () => {
            if (!cart.length) return;
            let deds = {}, cogs = 0;
            cart.forEach(c => {
                const r = recipes.find(x => x.id === c.id);
                if(r) {
                    cogs += calcRecipeCost(r.lines, ingredients) * c.qty;
                    r.lines.forEach(l => deds[l.ingId] = (deds[l.ingId] || 0) + (l.qty * c.qty));
                }
            });
            setIngredients(p => p.map(i => deds[i.id] ? { ...i, stock: Math.max(0, i.stock - deds[i.id]) } : i));
            onOrderComplete({ id: `#${Math.floor(1000+Math.random()*9000)}`, type, items: cart.map(i=>`${i.name} x${i.qty}`).join(', '), gross, net, cogs, time: new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}) });
            setCart([]); setAds(0);
          };

          return (
            <div className="flex flex-col lg:flex-row gap-4 h-[calc(100vh-8rem)]">
              <div className="flex-1 flex flex-col gap-4 overflow-y-auto">
                <div className="flex gap-2 bg-slate-900 p-2 rounded-2xl flex-shrink-0"><button onClick={()=>setType('storefront')} className={`flex-1 py-3 rounded-xl font-bold ${type==='storefront'?'bg-amber-500 text-slate-950':'text-slate-400'}`}>หน้าร้าน</button><button onClick={()=>setType('delivery')} className={`flex-1 py-3 rounded-xl font-bold ${type==='delivery'?'bg-orange-500 text-white':'text-slate-400'}`}>เดลิเวอรี่</button></div>
                <div className="grid grid-cols-2 md:grid-cols-3 gap-3">{recipes.map(r => <button key={r.id} onClick={()=>add(r)} className="bg-slate-900 border border-slate-800 hover:border-amber-500 rounded-2xl p-4 text-center active:scale-95"><div className="text-4xl mb-2">🥤</div><p className="text-white font-bold truncate">{r.name}</p><p className="text-amber-400 text-sm mt-1">{fmtDisplay(r.price)}</p></button>)}</div>
              </div>
              <div className="w-full lg:w-96 flex flex-col bg-slate-900 rounded-2xl flex-shrink-0 lg:h-full max-h-[60vh]">
                <div className="p-4 border-b border-slate-800 font-bold text-white flex-shrink-0">ตะกร้า</div>
                <div className="flex-1 overflow-y-auto p-2">{cart.map(i => <div key={i.id} className="flex items-center justify-between p-3 bg-slate-950 rounded-xl mb-2 border border-slate-800"><div className="min-w-0"><p className="text-white font-bold truncate">{i.name}</p><p className="text-slate-400 text-xs">{fmtDisplay(i.price)}</p></div><div className="flex items-center gap-3 bg-slate-900 rounded-lg p-1"><button onClick={()=>upQty(i.id,-1)} className="p-2">{Icon.minus}</button><span className="text-white font-bold w-4 text-center">{i.qty}</span><button onClick={()=>upQty(i.id,1)} className="p-2">{Icon.plus}</button></div></div>)}</div>
                <div className="p-4 bg-slate-950 border-t border-slate-800 flex flex-col gap-3 flex-shrink-0">
                  <div className="flex justify-between text-slate-400 text-sm"><span>ยอดรวม</span><span className="text-white">{fmtDisplay(gross)}</span></div>
                  {type === 'delivery' && (
                    <div className="p-3 bg-orange-500/10 rounded-xl border border-orange-500/30 text-sm flex flex-col gap-2">
                      <div className="flex justify-between items-center"><span className="text-orange-400">หัก GP (%)</span><input type="number" value={gp} onChange={e=>setGp(Number(e.target.value))} className="w-16 bg-slate-900 text-white px-1 text-right rounded"/></div>
                      <div className="flex justify-between items-center"><span className="text-orange-400">ส่วนลด Ads (฿)</span><input type="number" value={ads} onChange={e=>setAds(Number(e.target.value))} className="w-16 bg-slate-900 text-white px-1 text-right rounded"/></div>
                    </div>
                  )}
                  <div className="flex justify-between items-center mt-2"><span className="text-lg text-emerald-400 font-bold">ยอดรับสุทธิ</span><span className="text-3xl text-emerald-400 font-black">{fmtDisplay(net)}</span></div>
                  <Btn onClick={checkout} variant="emerald" disabled={cart.length===0} className="w-full py-4 text-lg mt-2">ยืนยัน & ตัดสต็อก</Btn>
                </div>
              </div>
            </div>
          );
        }

        // ─── INVENTORY PAGE ────────────────────────────────────────────────────────
        function InventoryPage({ ings, setIngs, adjs, setAdjs, onNavAdj }) {
          const [mAdd, setMAdd] = useState(false); const [mRecv, setMRecv] = useState(false);
          const [fAdd, setFAdd] = useState({name:"",type:"วัตถุดิบ",unit:"กรัม",stock:"",costPerUnit:"",minStock:""});
          const [fRecv, setFRecv] = useState({ingId:"",qty:"",mult:1,totalPrice:""});
          const [toast, showToast] = useToast();

          const selIng = ings.find(i=>i.id===Number(fRecv.ingId));
          const opts = selIng ? (UNIT_FAMILIES[selIng.unit]||[{name:selIng.unit,mult:1}]) : [];
          useEffect(()=>{ if(selIng&&opts.length>0) setFRecv(f=>({...f,mult:opts[0].mult})); }, [fRecv.ingId]);

          const qtyAdd = Number(fRecv.qty||0)*Number(fRecv.mult||1);
          const oldVal = selIng ? selIng.stock*selIng.costPerUnit : 0;
          const avgCost = selIng && (selIng.stock+qtyAdd)>0 ? (oldVal+Number(fRecv.totalPrice||0))/(selIng.stock+qtyAdd) : 0;

          const saveAdd = () => { setIngs(p=>[...p,{...fAdd,id:Date.now(),stock:Number(fAdd.stock),costPerUnit:Number(fAdd.costPerUnit),minStock:Number(fAdd.minStock||0)}]); setMAdd(false); setFAdd({...fAdd,name:""}); showToast("บันทึกแล้ว"); };
          const saveRecv = () => {
            setIngs(p=>p.map(i=>i.id===Number(fRecv.ingId)?{...i,stock:i.stock+qtyAdd,costPerUnit:avgCost}:i));
            setAdjs(p=>[{id:Date.now(),ingName:selIng.name,type:"รับเข้า",qty:qtyAdd,unit:selIng.unit,date:new Date().toLocaleDateString('th-TH')},...p]);
            setMRecv(false); setFRecv({...fRecv,ingId:"",qty:"",totalPrice:""}); showToast("คำนวณคอสใหม่แล้ว");
          };

          return (
            <div className="flex flex-col gap-4">
              <div className="flex justify-between items-center"><div className="flex gap-2"><Btn onClick={()=>setMAdd(true)} variant="ghost">{Icon.plus} รายการใหม่</Btn><Btn onClick={()=>setMRecv(true)} variant="emerald">{Icon.inbox} ซื้อของเข้า</Btn></div><Btn variant="ghost" onClick={onNavAdj}>ตัดของทิ้ง</Btn></div>
              <Card className="!p-0"><div className="overflow-x-auto"><table className="w-full text-left text-sm whitespace-nowrap"><thead className="bg-slate-900/50 border-b border-slate-800"><tr><th className="p-3">ชื่อ</th><th className="p-3">สต็อก(ฐาน)</th><th className="p-3">ต้นทุน/หน่วย</th><th className="p-3"></th></tr></thead><tbody>{ings.map(i=><tr key={i.id} className="border-b border-slate-800/50"><td className="p-3 font-semibold text-white">{i.name}</td><td className={`p-3 font-bold ${i.stock<=i.minStock?'text-rose-400':'text-emerald-400'}`}>{i.stock} {i.unit}</td><td className="p-3 text-amber-400 font-bold">{fmtCost(i.costPerUnit)}</td><td className="p-3 text-center"><button onClick={()=>setIngs(p=>p.filter(x=>x.id!==i.id))} className="text-slate-500 hover:text-rose-400">{Icon.trash}</button></td></tr>)}</tbody></table></div></Card>
              <Modal open={mAdd} onClose={()=>setMAdd(false)} title="เพิ่มวัตถุดิบใหม่"><div className="flex flex-col gap-3"><Field label="ชื่อ"><input className={inp} value={fAdd.name} onChange={e=>setFAdd(f=>({...f,name:e.target.value}))}/></Field><div className="flex gap-3"><Field label="หน่วยฐาน"><select className={sel} value={fAdd.unit} onChange={e=>setFAdd(f=>({...f,unit:e.target.value}))}><option>กรัม</option><option>มล.</option><option>ชิ้น</option></select></Field><Field label="สต็อก"><input type="number" className={inp} value={fAdd.stock} onChange={e=>setFAdd(f=>({...f,stock:e.target.value}))}/></Field></div><Field label="ต้นทุนเบื้องต้น (฿)"><input type="number" className={inp} value={fAdd.costPerUnit} onChange={e=>setFAdd(f=>({...f,costPerUnit:e.target.value}))}/></Field><Btn onClick={saveAdd} disabled={!fAdd.name}>บันทึก</Btn></div></Modal>
              <Modal open={mRecv} onClose={()=>setMRecv(false)} title="ซื้อของเข้า (Moving Avg)"><div className="flex flex-col gap-3"><Field label="วัตถุดิบ"><select className={sel} value={fRecv.ingId} onChange={e=>setFRecv(f=>({...f,ingId:e.target.value}))}><option value="">--เลือก--</option>{ings.map(i=><option key={i.id} value={i.id}>{i.name}</option>)}</select></Field>{selIng&&<div className="flex gap-3"><Field label="จำนวน"><input type="number" className={inp} value={fRecv.qty} onChange={e=>setFRecv(f=>({...f,qty:e.target.value}))}/></Field><Field label="หน่วย"><select className={sel} value={fRecv.mult} onChange={e=>setFRecv(f=>({...f,mult:Number(e.target.value)}))}>{opts.map(u=><option key={u.name} value={u.mult}>{u.name}</option>)}</select></Field></div>}<Field label="ราคารวมที่จ่าย (฿)"><input type="number" className={inp} value={fRecv.totalPrice} onChange={e=>setFRecv(f=>({...f,totalPrice:e.target.value}))}/></Field>{fRecv.qty&&fRecv.totalPrice&&<div className="p-3 bg-emerald-500/10 rounded-xl text-center"><p className="text-emerald-500 text-xs">คอสเฉลี่ยใหม่</p><p className="text-emerald-400 text-xl font-bold">{fmtCost(avgCost)} / {selIng.unit}</p></div>}<Btn onClick={saveRecv} variant="emerald" disabled={!fRecv.ingId||!fRecv.totalPrice}>บันทึกรับเข้า</Btn></div></Modal>
            </div>
          );
        }

        // ─── STOCK ADJUST PAGE ─────────────────────────────────────────────────────
        function StockAdjPage({ ings, setIngs, adjs, setAdjs, onBack }) {
          const [f, setF] = useState({ingId:"",qty:"",mult:1});
          const selIng = ings.find(i=>i.id===Number(f.ingId));
          const opts = selIng ? (UNIT_FAMILIES[selIng.unit]||[{name:selIng.unit,mult:1}]) : [];
          useEffect(()=>{ if(selIng&&opts.length>0) setF(x=>({...x,mult:opts[0].mult})); }, [f.ingId]);
          const deduct = Number(f.qty||0)*Number(f.mult||1);

          const submit = () => {
            setIngs(p=>p.map(i=>i.id===selIng.id?{...i,stock:Math.max(0,i.stock-deduct)}:i));
            setAdjs(p=>[{id:Date.now(),ingName:selIng.name,type:"ปรับลด",qty:deduct,unit:selIng.unit,date:new Date().toLocaleDateString('th-TH')},...p]);
            setF({ingId:"",qty:"",mult:1});
          };

          return (
            <div className="flex flex-col gap-4">
              <button onClick={onBack} className="self-start text-slate-400 hover:text-white font-bold">{Icon.back} กลับไปหน้าสต็อก</button>
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                <Card title="แบบฟอร์มตัดสต็อกทิ้ง (Manual)">
                  <div className="flex flex-col gap-3"><Field label="วัตถุดิบ"><select className={sel} value={f.ingId} onChange={e=>setF(x=>({...x,ingId:e.target.value}))}><option value="">--เลือก--</option>{ings.map(i=><option key={i.id} value={i.id}>{i.name} ({i.stock}{i.unit})</option>)}</select></Field>{selIng&&<div className="flex gap-3"><Field label="จำนวน"><input type="number" className={inp} value={f.qty} onChange={e=>setF(x=>({...x,qty:e.target.value}))}/></Field><Field label="หน่วย"><select className={sel} value={f.mult} onChange={e=>setF(x=>({...x,mult:Number(e.target.value)}))}>{opts.map(u=><option key={u.name} value={u.mult}>{u.name}</option>)}</select></Field></div>}<Btn onClick={submit} variant="danger" disabled={!f.ingId||!f.qty}>ยืนยันตัดสต็อกทิ้ง</Btn></div>
                </Card>
                <Card title="ประวัติการรับเข้า / ปรับลด" className="!p-0">
                  <div className="overflow-x-auto p-4">{adjs.length===0?<p className="text-slate-500 text-center">ไม่มีประวัติ</p>:<table className="w-full text-left text-sm whitespace-nowrap"><thead className="border-b border-slate-800 text-slate-400"><tr><th className="pb-2">วันที่</th><th className="pb-2">รายการ</th><th className="pb-2 text-right">จำนวน</th></tr></thead><tbody>{adjs.map(a=>{const r = a.type==="รับเข้า"; return <tr key={a.id} className="border-b border-slate-800/50"><td className="py-2">{a.date}</td><td className="py-2 text-white">{a.ingName} <span className="text-xs text-slate-500">({a.type})</span></td><td className={`py-2 font-bold text-right ${r?'text-emerald-400':'text-rose-400'}`}>{r?'+':'-'}{a.qty}{a.unit}</td></tr>})}</tbody></table>}</div>
                </Card>
              </div>
            </div>
          );
        }

        // ─── RECIPE PAGE ───────────────────────────────────────────────────────────
        function RecipePage({ ings, recipes, setRecipes }) {
          const [sel, setSel] = useState(recipes[0]?.id||null);
          const [mNew, setMNew] = useState(false); const [mAdd, setMAdd] = useState(false);
          const [nName, setNName] = useState(""); const [nPrice, setNPrice] = useState("");
          const r = recipes.find(x=>x.id===sel);

          const create = () => { setRecipes(p=>[...p,{id:Date.now(),name:nName,price:Number(nPrice),lines:[]}]); setMNew(false); setSel(Date.now()); setNName(""); };
          const addIng = (id) => { setRecipes(p=>p.map(x=>x.id===r.id?{...x,lines:[...x.lines,{ingId:id,qty:1}]}:x)); setMAdd(false); };
          const chgQty = (id, v) => setRecipes(p=>p.map(x=>x.id===r.id?{...x,lines:x.lines.map(l=>l.ingId===id?{...l,qty:v}:l)}:x));

          return (
            <div className="flex flex-col lg:flex-row gap-4 h-full">
              <div className="w-full lg:w-1/3 flex flex-col gap-4"><Card title="เมนูทั้งหมด" action={<Btn size="sm" onClick={()=>setMNew(true)}>{Icon.plus} เมนูใหม่</Btn>} className="flex-1 !p-0"><div className="overflow-y-auto max-h-[60vh]">{recipes.map(x=><div key={x.id} onClick={()=>setSel(x.id)} className={`p-4 border-b border-slate-800 cursor-pointer ${sel===x.id?'bg-amber-500/10 border-l-4 border-l-amber-500':'hover:bg-slate-800/50'}`}><p className="font-bold text-white">{x.name}</p></div>)}</div></Card></div>
              <div className="w-full lg:w-2/3 flex flex-col gap-4">
                {r && (<><div className="bg-gradient-to-br from-amber-500/10 to-transparent p-4 rounded-xl border border-amber-500/20 flex justify-between"><div><p className="text-amber-400 text-xs">สูตรสำหรับ</p><p className="text-xl text-white font-black">{r.name}</p></div><div className="text-right"><p className="text-slate-400 text-xs">ต้นทุน / แก้ว</p><p className="text-2xl text-amber-400 font-black">{fmtCost(calcRecipeCost(r.lines,ings))}</p></div></div><Card title="วัตถุดิบ (หน่วยฐาน)" action={<Btn size="sm" onClick={()=>setMAdd(true)}>{Icon.plus} เพิ่ม</Btn>} className="!p-0"><div className="overflow-x-auto"><table className="w-full text-left text-sm whitespace-nowrap min-w-[400px]"><thead className="bg-slate-900/50 border-b border-slate-800"><tr><th className="p-3">วัตถุดิบ</th><th className="p-3">ปริมาณใช้</th><th className="p-3 text-right">ต้นทุน</th><th className="p-3"></th></tr></thead><tbody>{r.lines.map(l=>{ const i=ings.find(x=>x.id===l.ingId); if(!i)return null; return <tr key={l.ingId} className="border-b border-slate-800/50"><td className="p-3 text-white">{i.name}</td><td className="p-3"><input type="number" className="w-20 bg-slate-800 border-slate-700 rounded px-2 py-1 text-white" value={l.qty} onChange={e=>chgQty(l.ingId,e.target.value)}/> {i.unit}</td><td className="p-3 text-right text-emerald-400">{fmtCost(i.costPerUnit*l.qty)}</td><td className="p-3 text-center"><button onClick={()=>setRecipes(p=>p.map(x=>x.id===r.id?{...x,lines:x.lines.filter(y=>y.ingId!==l.ingId)}:x))} className="text-slate-500 hover:text-rose-400">{Icon.trash}</button></td></tr>})}</tbody></table></div></Card></>)}
              </div>
              <Modal open={mNew} onClose={()=>setMNew(false)} title="สร้างเมนูใหม่"><div className="flex flex-col gap-4"><Field label="ชื่อเมนู"><input className={inp} value={nName} onChange={e=>setNName(e.target.value)}/></Field><Field label="ราคาขาย (฿)"><input type="number" className={inp} value={nPrice} onChange={e=>setNPrice(e.target.value)}/></Field><Btn onClick={create} disabled={!nName}>ยืนยัน</Btn></div></Modal>
              <Modal open={mAdd} onClose={()=>setMAdd(false)} title="เลือกวัตถุดิบเข้าสูตร"><div className="flex flex-col gap-2 max-h-72 overflow-y-auto">{ings.filter(i=>!r?.lines.find(l=>l.ingId===i.id)).map(i=><button key={i.id} onClick={()=>addIng(i.id)} className="p-3 bg-slate-800 hover:bg-slate-700 text-left text-white rounded-xl font-semibold">{i.name}</button>)}</div></Modal>
            </div>
          );
        }

        // ─── APP ROOT ──────────────────────────────────────────────────────────────
        function POSApp() {
          const [act, setAct] = useState("dashboard"); const [sb, setSb] = useState(false);
          const [ings, setIngs] = useState(INIT_INGREDIENTS); const [recs, setRecs] = useState(INIT_RECIPES);
          const [adjs, setAdjs] = useState(INIT_ADJUSTMENTS); const [ords, setOrds] = useState([]);
          const [toast, showToast] = useToast();

          return (
            <div className="flex h-[100dvh] w-screen overflow-hidden bg-slate-950 font-sans">
              <Toast msg={toast} />
              <aside className={`flex flex-col bg-slate-900 border-r border-slate-800 z-20 transition-all ${sb?'w-56 absolute inset-y-0 shadow-2xl':'w-16 hidden md:flex'}`}>
                <div className="h-16 border-b border-slate-800 flex items-center px-4 justify-between text-xl">🧋 <span className={`ml-2 font-bold text-white text-base truncate ${sb?'block':'hidden'}`}>ระบบร้านน้ำ</span><button className="md:hidden text-slate-400" onClick={()=>setSb(false)}>{Icon.x}</button></div>
                <nav className="flex-1 p-2 space-y-2">{SIDEBAR_ITEMS.map(i=><button key={i.id} onClick={()=>{setAct(i.id);setSb(false);}} className={`w-full flex items-center gap-3 p-3 rounded-xl transition-all ${act===i.id||(act==='stock_adj'&&i.id==='stock')?'bg-amber-500 text-slate-950 font-bold':'text-slate-400 hover:bg-slate-800'}`}><span className="text-lg">{i.icon}</span><span className={`truncate ${sb?'block':'hidden'}`}>{i.label}</span></button>)}</nav>
              </aside>
              <div className="flex-1 flex flex-col min-w-0 h-full relative">
                <header className="h-16 flex-shrink-0 bg-slate-900 border-b border-slate-800 text-white font-bold flex items-center px-4 justify-between gap-2">
                  <div className="flex items-center gap-3"><button className="md:hidden text-slate-400 text-xl" onClick={()=>setSb(true)}>☰</button><span className="truncate">{SIDEBAR_ITEMS.find(i=>i.id===act)?.label || (act==='stock_adj'?'ประวัติสต็อก':'System')}</span></div>
                  <span className="text-emerald-400 text-xs bg-emerald-500/10 px-2 py-1 rounded-full border border-emerald-500/20 whitespace-nowrap">{Icon.check} Optimized & Merged</span>
                </header>
                <main className="flex-1 overflow-y-auto overflow-x-hidden p-2 md:p-4 pb-20 md:pb-4">
                  {act==="dashboard" && <Dashboard orders={ords} />}
                  {act==="pos" && <POSPage recipes={recs} ingredients={ings} setIngredients={setIngs} onOrderComplete={o=>{setOrds(p=>[o,...p]); showToast("รับออเดอร์และตัดสต็อกสำเร็จ!");}} />}
                  {act==="stock" && <InventoryPage ings={ings} setIngs={setIngs} adjs={adjs} setAdjs={setAdjs} onNavAdj={()=>setAct('stock_adj')} />}
                  {act==="stock_adj" && <StockAdjPage ings={ings} setIngs={setIngs} adjs={adjs} setAdjs={setAdjs} onBack={()=>setAct('stock')} />}
                  {act==="recipe" && <RecipePage ings={ings} recipes={recs} setRecipes={setRecs} />}
                </main>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<POSApp />);
    </script>
</body>
</html>
