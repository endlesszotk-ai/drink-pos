<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Drink POS &amp; Cloud BOM System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box}
    body{background:#020617;color:#cbd5e1;font-family:sans-serif;margin:0;overscroll-behavior:none}
    .toast{position:fixed;top:24px;right:24px;z-index:9999;background:#10b981;color:#020617;padding:12px 18px;border-radius:12px;font-weight:700;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,.4);animation:slideIn .25s ease}
    @keyframes slideIn{from{transform:translateX(60px);opacity:0}to{transform:none;opacity:1}}
    @keyframes spin{100%{transform:rotate(360deg)}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
    @keyframes pulse-red{0%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}70%{box-shadow:0 0 0 6px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
    .modal-box{background:#0f172a;border:1px solid #334155;border-radius:16px;width:100%;max-width:480px;max-height:90vh;display:flex;flex-direction:column}
    .modal-body{overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
    .inp{background:#1e293b;border:1px solid #334155;color:#fff;border-radius:10px;padding:10px 12px;font-size:.875rem;width:100%;outline:none;transition:border-color .15s}
    .inp:focus{border-color:#f59e0b}
    select.inp{appearance:none;-webkit-appearance:none}
    textarea.inp{resize:vertical;min-height:72px}
    .btn{display:inline-flex;align-items:center;gap:6px;font-weight:600;border-radius:10px;cursor:pointer;border:none;transition:all .15s;user-select:none;justify-content:center;white-space:nowrap;font-size:.875rem}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .btn-primary{background:#f59e0b;color:#020617;padding:10px 16px;min-height:42px}
    .btn-primary:hover:not(:disabled){background:#fbbf24}
    .btn-ghost{background:#1e293b;color:#cbd5e1;padding:10px 16px;min-height:42px}
    .btn-ghost:hover:not(:disabled){background:#293548}
    .btn-emerald{background:#10b981;color:#020617;padding:10px 16px;min-height:42px}
    .btn-emerald:hover:not(:disabled){background:#34d399}
    .btn-danger{background:rgba(239,68,68,.15);color:#f87171;padding:10px 16px;min-height:42px;border:1px solid rgba(239,68,68,.3)}
    .btn-danger:hover:not(:disabled){background:rgba(239,68,68,.25)}
    .btn-violet{background:rgba(139,92,246,.15);color:#a78bfa;padding:10px 16px;min-height:42px;border:1px solid rgba(139,92,246,.3)}
    .btn-violet:hover:not(:disabled){background:rgba(139,92,246,.25)}
    .btn-sm{padding:6px 12px;font-size:.75rem;min-height:32px;border-radius:8px}
    .card{background:#0f172a;border-radius:16px;border:1px solid #1e293b;overflow:hidden}
    .card-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #1e293b;font-weight:700;color:#fff;gap:8px}
    .card-body{padding:16px}
    .badge{display:inline-block;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap}
    .badge-amber{background:rgba(245,158,11,.2);color:#fbbf24}
    .badge-violet{background:rgba(139,92,246,.2);color:#a78bfa}
    .badge-rose{background:rgba(239,68,68,.2);color:#f87171}
    .badge-emerald{background:rgba(16,185,129,.2);color:#34d399}
    .badge-slate{background:rgba(100,116,139,.2);color:#94a3b8}
    .badge-blue{background:rgba(59,130,246,.2);color:#60a5fa}
    .field{display:flex;flex-direction:column;gap:6px}
    .field label{font-size:.75rem;font-weight:600;color:#94a3b8}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    table{width:100%;border-collapse:collapse;font-size:.875rem}
    th,td{padding:10px 12px;text-align:left;border-bottom:1px solid rgba(30,41,59,.8)}
    th{color:#94a3b8;background:rgba(15,23,42,.5)}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}

    /* ── LOGIN SCREEN ───────────────────────────────────── */
    #login-screen{position:fixed;inset:0;z-index:300;background:#020617;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:24px}
    .pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid #334155;background:transparent;transition:all .18s}
    .pin-dot.filled{background:#f59e0b;border-color:#f59e0b;transform:scale(1.15)}
    .numpad-btn{width:100%;background:#0f172a;border:1px solid #1e293b;color:#fff;font-size:1.4rem;font-weight:700;border-radius:14px;padding:0;min-height:68px;cursor:pointer;transition:background .1s,transform .1s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none}
    .numpad-btn:active{background:#f59e0b;color:#020617;border-color:#f59e0b;transform:scale(.92)}
    .numpad-btn.clear-btn{color:#f87171;border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.06)}
    .numpad-btn.back-btn{color:#94a3b8}
    .pin-shake{animation:shake .38s ease}

    /* ── LOADING ─────────────────────────────────────────── */
    #loading-overlay{position:fixed;inset:0;background:rgba(2,6,23,.97);z-index:99999;display:none;flex-direction:column;align-items:center;justify-content:center;color:#10b981;font-weight:bold;font-size:1.2rem}
    #loading-overlay .spin{animation:spin 1s linear infinite;font-size:3rem;margin-bottom:16px;display:block}

    /* ── PAYMENT CHIPS ───────────────────────────────────── */
    .pay-opt{flex:1;padding:10px 4px;border-radius:10px;border:2px solid #1e293b;background:#0f172a;color:#94a3b8;cursor:pointer;text-align:center;font-size:.72rem;font-weight:700;transition:all .15s;min-height:48px;display:flex;align-items:center;justify-content:center}
    .pay-opt.active{border-color:#f59e0b;background:rgba(245,158,11,.1);color:#f59e0b}

    /* ── SHIFT BANNER ────────────────────────────────────── */
    .shift-banner{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:12px;font-size:.8rem;font-weight:700;margin-bottom:4px}
    .shift-open{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#10b981}
    .shift-closed{background:rgba(100,116,139,.1);border:1px solid rgba(100,116,139,.3);color:#64748b}

    /* ── RECEIPT PRINT ───────────────────────────────────── */
    #receipt-print-area{display:none}
    @media print{
      body>*{display:none !important}
      #receipt-print-area{display:block !important;width:80mm;margin:0 auto;font-family:'Courier New',Courier,monospace;font-size:12px;color:#000;background:#fff;padding:8px 4px}
      #receipt-print-area *{color:#000 !important;background:none !important}
      @page{size:80mm auto;margin:4mm 2mm}
    }
    .rcpt-shop-name{font-size:16px;font-weight:700;text-align:center;margin-bottom:2px}
    .rcpt-addr{font-size:10px;text-align:center;margin-bottom:2px;line-height:1.4}
    .rcpt-divider{border:none;border-top:1px dashed #000;margin:6px 0}
    .rcpt-row{display:flex;justify-content:space-between;font-size:11px;margin:2px 0}
    .rcpt-row.bold{font-weight:700;font-size:13px}
    .rcpt-center{text-align:center;font-size:10px;margin-top:6px;line-height:1.6}
    .rcpt-order-no{font-size:11px;text-align:center;margin-bottom:4px;font-weight:700}
    .kot-title{font-size:18px;font-weight:700;text-align:center;letter-spacing:2px;margin:4px 0}
    .kot-item{font-size:14px;font-weight:700;padding:4px 0;border-bottom:1px dashed #000}
  </style>
</head>
<body>

<div id="login-screen">
  <div style="font-size:4rem;line-height:1">🧋</div>

    <p style="color:#fff;font-size:1.3rem;font-weight:800;margin:0 0 4px">Drink POS</p>

    <button class="numpad-btn" onclick="numpad(1)">1</button>
    <button class="numpad-btn" onclick="numpad(2)">2</button>
    <button class="numpad-btn" onclick="numpad(3)">3</button>

    <button class="numpad-btn" onclick="numpad(7)">7</button>
    <button class="numpad-btn" onclick="numpad(8)">8</button>
    <button class="numpad-btn" onclick="numpad(9)">9</button>

</div>

<div id="receipt-print-area"></div>

<div id="loading-overlay">
  <span class="spin">🔄</span>
  <p id="loading-msg">กำลังโหลดข้อมูล...</p>
</div>

<div id="app" style="display:none;height:100dvh;width:100vw;overflow:hidden;flex-direction:row">
  <aside id="sidebar" style="display:flex;flex-direction:column;background:#0f172a;border-right:1px solid #1e293b;width:58px;flex-shrink:0;z-index:20">
    <div style="height:64px;border-bottom:1px solid #1e293b;display:flex;align-items:center;justify-content:center;font-size:1.4rem">🧋</div>
    <nav id="sidebar-nav" style="flex:1;padding:8px;display:flex;flex-direction:column;gap:6px;overflow-y:auto"></nav>
  </aside>
  <div style="flex:1;display:flex;flex-direction:column;min-width:0;height:100%;overflow:hidden">
    <header style="height:64px;flex-shrink:0;background:#0f172a;border-bottom:1px solid #1e293b;display:flex;align-items:center;padding:0 12px;justify-content:space-between;gap:8px">
      <span id="header-title" style="font-weight:700;color:#fff;font-size:1rem;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        <span id="shift-indicator" style="font-size:.7rem;padding:4px 8px;border-radius:999px;display:none"></span>
        <button id="staff-badge" onclick="doLogout()" title="ออกจากระบบ" style="background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3);color:#a78bfa;font-size:.7rem;font-weight:700;padding:4px 10px;border-radius:999px;cursor:pointer;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></button>
        <span style="font-size:.65rem;color:#10b981;background:rgba(16,185,129,.1);padding:4px 8px;border-radius:999px;border:1px solid rgba(16,185,129,.2);flex-shrink:0">✓ Cloud</span>
      </div>
    </header>
    <main id="main" style="flex:1;overflow-y:auto;overflow-x:hidden;padding:12px;padding-bottom:80px"></main>
  </div>
</div>

<div id="toast" class="toast" style="display:none"></div>
<div id="modal-container"></div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
var SUPABASE_URL = 'https://bxxnockrzvvmwwpjabve.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4eG5vY2tyenZ2bXd3cGphYnZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNzMyOTMsImV4cCI6MjA5NDY0OTI5M30.lbHiUdTEhqxkH9EZUkNhHODo_PxfcTDwNaqG1pJvN90';
var _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

var POINTS_PER_THB = 50; 
var POINTS_VALUE   = 1;  

var DEFAULT_SETTINGS = {
  shopName:'ร้านชาไทย', logoUrl:'',
  address:'123 ถนนตัวอย่าง กรุงเทพฯ\nโทร: 02-xxx-xxxx',
  receiptFooter:'ขอบคุณที่ใช้บริการ 🙏',
  printOnCheckout:true, paperSize:'80mm',
};
function loadSettings(){try{return Object.assign({},DEFAULT_SETTINGS,JSON.parse(localStorage.getItem('pos_settings')||'{}'))}catch(e){return Object.assign({},DEFAULT_SETTINGS)}}
function saveSettings(obj){localStorage.setItem('pos_settings',JSON.stringify(obj))}

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
var state = {
  active:'dashboard',
  currentStaff: null, staffList: [],
  ingredients:[], wipFormulas:[], recipes:[], adjustments:[], orders:[],
  platforms:[], platformPrices:[], currentShift:null, allShifts:[],
  orderType:'storefront', selectedPlatformId:null, paymentMethod:'cash', cart:[],
  gpPercent:0, adsDiscount:0, selectedRecipeId:null,
  currentMember:null, memberSearchPhone:'', memberNotFound:false, pointsToUse:0,
  extraDiscount:0, extraDiscountReason:'', showDiscountForm:false,
  settings:loadSettings(),
};

var UNIT_FAMILIES = {
  'กรัม':[{name:'กรัม',mult:1},{name:'กิโลกรัม',mult:1000}],
  'มล.':[{name:'มล.',mult:1},{name:'ลิตร',mult:1000}],
  'ชิ้น':[{name:'ชิ้น',mult:1},{name:'แพ็ค (50 ชิ้น)',mult:50},{name:'แพ็ค (100 ชิ้น)',mult:100}],
};

var PAY_METHODS = [
  {id:'cash', label:'💵 เงินสด'}, {id:'qr', label:'📱 QR/โอน'},
  {id:'card', label:'💳 บัตร'}, {id:'delivery_credit',label:'🛵 เครดิต'},
];

var ALL_PAGES = [
  {id:'dashboard', label:'Dashboard',    icon:'⊞', roles:['admin']},
  {id:'pos',       label:'ระบบ POS',    icon:'🖥', roles:['admin','cashier']},
  {id:'shift',     label:'รอบการขาย',  icon:'🔄', roles:['admin','cashier']},
  {id:'stock',     label:'จัดการสต็อก', icon:'📦', roles:['admin']},
  {id:'recipe',    label:'สูตรอาหาร',  icon:'📋', roles:['admin']},
  {id:'settings',  label:'ตั้งค่าร้าน', icon:'⚙️', roles:['admin']},
];

// ═══════════════════════════════════════════════════════
// LOGIN & APP BOOT
// ═══════════════════════════════════════════════════════
var _pin = '';
function numpad(d){if(_pin.length>=4)return;_pin+=String(d);updatePinDisplay();if(_pin.length===4)setTimeout(tryLogin,80)}
function numpadBack(){_pin=_pin.slice(0,-1);updatePinDisplay()}
function numpadClear(){_pin='';updatePinDisplay();document.getElementById('login-err').textContent=''}
function updatePinDisplay(){for(var i=0;i<4;i++){var dot=document.getElementById('pd'+i);if(dot)dot.classList.toggle('filled',i<_pin.length)}}

async function tryLogin() {
  document.getElementById('login-err').textContent = '';
  try {
    var { data } = await _sb.from('staff').select('*').eq('pin', _pin).eq('active', true).limit(1);
    if (data && data.length > 0) {
      state.currentStaff = data[0]; _pin = ''; updatePinDisplay();
      var lo = document.getElementById('loading-overlay');
      lo.style.display = 'flex'; document.getElementById('login-screen').style.display = 'none';
      await fetchCloudData();
      lo.style.display = 'none'; document.getElementById('app').style.display = 'flex';
      var sb = document.getElementById('staff-badge'); if (sb) sb.textContent = '👤 ' + state.currentStaff.name;
      navigate(state.currentStaff.role === 'cashier' ? 'pos' : 'dashboard');
    } else {
      _pin = ''; updatePinDisplay();
      var err = document.getElementById('login-err'); err.textContent = 'PIN ไม่ถูกต้อง กรุณาลองใหม่';
      var dots = document.getElementById('pin-dots'); dots.classList.add('pin-shake');
      setTimeout(function(){ dots.classList.remove('pin-shake'); err.textContent = ''; }, 600);
    }
  } catch(e) { _pin = ''; updatePinDisplay(); document.getElementById('login-err').textContent = 'ไม่สามารถเชื่อมต่อ Cloud ได้'; }
}
function doLogout() {
  if (!confirm('ออกจากระบบ (' + (state.currentStaff ? state.currentStaff.name : '') + ') ใช่ไหม?')) return;
  state.currentStaff = null; state.cart = []; state.currentMember = null; state.memberSearchPhone = ''; state.memberNotFound = false; state.pointsToUse = 0; state.extraDiscount = 0; state.extraDiscountReason = ''; state.showDiscountForm = false; state.paymentMethod = 'cash';
  document.getElementById('app').style.display = 'none'; document.getElementById('login-screen').style.display = 'flex'; _pin = ''; updatePinDisplay(); document.getElementById('login-err').textContent = '';
}

// ═══════════════════════════════════════════════════════
// CLOUD DATA
// ═══════════════════════════════════════════════════════
async function fetchCloudData() {
  try {
    var isAdmin = state.currentStaff && state.currentStaff.role === 'admin';
    var baseQueries = [
      _sb.from('ingredients').select('*').order('id'),
      _sb.from('recipes').select('*').order('id'),
      _sb.from('recipe_lines').select('*'),
      _sb.from('orders').select('*').order('created_at',{ascending:false}).limit(300),
      _sb.from('adjustments').select('*').order('created_at',{ascending:false}),
      _sb.from('platforms').select('*').order('id'),
      _sb.from('platform_prices').select('*'),
      _sb.from('shifts').select('*').order('opened_at',{ascending:false}).limit(50),
      _sb.from('wip_formulas').select('*') // ── SPRINT 8: WIP Formulas ──
    ];
    if (isAdmin) baseQueries.push(_sb.from('staff').select('*').order('id'));

    var results = await Promise.all(baseQueries);
    var [r1,r2,r3,r4,r5,r6,r7,r8,r9] = results;

    // ── Update Ingredients to include WIP fields ──
    state.ingredients = (r1.data||[]).map(i => ({id:i.id,name:i.name,type:i.type,unit:i.unit,stock:Number(i.stock),costPerUnit:Number(i.cost_per_unit),minStock:Number(i.min_stock),yieldPerBatch:Number(i.yield_per_batch||1)}));
    
    // ── Extract WIP Formulas ──
    state.wipFormulas = (r9.data||[]).map(x => ({id:x.id, wipIngId:x.wip_ing_id, rawIngId:x.raw_ing_id, qty:Number(x.qty)}));

    state.recipes = (r2.data||[]).map(r => ({
      id:r.id, name:r.name, price:Number(r.price),
      lines:(r3.data||[]).filter(l=>l.recipe_id===r.id).map(l=>({ingId:l.ingredient_id,qty:Number(l.qty)}))
    }));
    if (state.recipes.length > 0 && !state.selectedRecipeId) state.selectedRecipeId = state.recipes[0].id;

    state.orders = (r4.data||[]).map(o => ({
      id:o.id, type:o.type, items:o.items, gross:Number(o.gross), net:Number(o.net), cogs:Number(o.cogs), gpPercent:Number(o.gp_percent||0), adsDiscount:Number(o.ads_discount||0), paymentMethod:o.payment_method||'cash', shiftId:o.shift_id||null, staffId:o.staff_id||null, memberId:o.member_id||null, pointsEarned:Number(o.points_earned||0), pointsUsed:Number(o.points_used||0), discountAmount:Number(o.discount_amount||0), discountReason:o.discount_reason||'', time:new Date(o.created_at).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}), dateStr:new Date(o.created_at).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'})
    }));

    state.adjustments = (r5.data||[]).map(a => ({id:a.id,ingName:a.ing_name,type:a.type,qty:Number(a.qty),unit:a.unit,reason:a.reason,date:new Date(a.created_at).toLocaleDateString('th-TH')}));
    state.platforms = (r6.data||[]).map(p => ({id:p.id,name:p.name,gpPercent:Number(p.gp_percent),active:p.active}));
    state.platformPrices = (r7.data||[]).map(x => ({id:x.id,recipeId:x.recipe_id,platformId:x.platform_id,price:Number(x.price)}));

    var shiftsRaw = r8.data||[];
    state.currentShift = shiftsRaw.find(s=>s.status==='open')||null;
    state.allShifts = shiftsRaw.map(s => ({id:s.id,openedAt:s.opened_at,closedAt:s.closed_at,openingCash:Number(s.opening_cash||0),closingCash:s.closing_cash!=null?Number(s.closing_cash):null,expectedCash:s.expected_cash!=null?Number(s.expected_cash):null,cashDiff:s.cash_diff!=null?Number(s.cash_diff):null,status:s.status,note:s.note}));

    if (isAdmin && results[9]) state.staffList = results[9].data||[];

    if (state.orderType === 'delivery') {
      if (!state.selectedPlatformId && state.platforms.length > 0) {
        var ap = state.platforms.filter(p=>p.active);
        if (ap.length > 0) state.selectedPlatformId = ap[0].id;
      }
      if (state.selectedPlatformId) {
        var pl = state.platforms.find(p=>p.id===state.selectedPlatformId);
        if (pl) state.gpPercent = pl.gpPercent;

function parseOrderItems(itemsStr){if(!itemsStr)return[];return itemsStr.split(',').map(seg=>{seg=seg.trim();var m=seg.match(/^(.+?)\s*x(\d+)$/i);return m?{name:m[1].trim(),qty:parseInt(m[2],10)}:{name:seg,qty:1}})}

function buildReceipt(d) {
  var s=state.settings; var html='';
  if(s.logoUrl)html+='<div style="text-align:center;margin-bottom:6px"><img src="'+s.logoUrl+'" style="max-width:60px;max-height:60px;object-fit:contain"/></div>';
  html+='<div class="rcpt-shop-name">'+escHtml(s.shopName)+'</div>';
  html+='<div class="rcpt-addr">'+escHtml(s.address).replace(/\n/g,'<br>')+'</div><hr class="rcpt-divider">';
  html+='<div class="rcpt-order-no">ออเดอร์ '+genOrderNo()+'</div>';
  html+='<div class="rcpt-row"><span>'+(d.dateStr?d.dateStr+' '+d.time:new Date().toLocaleString('th-TH'))+'</span><span>'+(d.type==='storefront'?'หน้าร้าน':'เดลิเวอรี่')+'</span></div>';
  html+='<div class="rcpt-row"><span>ชำระโดย:</span><span>'+payLabel(d.paymentMethod||'cash')+'</span></div>';
  if(d.staffName)html+='<div class="rcpt-row"><span>พนักงาน:</span><span>'+escHtml(d.staffName)+'</span></div>';
  html+='<hr class="rcpt-divider">';
  parseOrderItems(d.items).forEach(item=>{html+='<div class="rcpt-row"><span>'+escHtml(item.name)+' x'+item.qty+'</span><span></span></div>'});
  html+='<hr class="rcpt-divider"><div class="rcpt-row"><span>ยอดก่อนหัก</span><span>'+fmtDisplay(d.gross)+'</span></div>';
  if(d.type==='delivery'&&d.gpPercent>0)html+='<div class="rcpt-row" style="color:#666"><span>หัก GP ('+d.gpPercent+'%)</span><span>-'+fmtDisplay(d.gross*(d.gpPercent/100))+'</span></div>';
  if(d.adsDiscount>0)html+='<div class="rcpt-row" style="color:#666"><span>หัก Ads/ส่วนลด</span><span>-'+fmtDisplay(d.adsDiscount)+'</span></div>';
  if(d.discountAmount>0)html+='<div class="rcpt-row" style="color:#666"><span>ส่วนลด'+(d.discountReason?' ('+escHtml(d.discountReason)+')':'')+'</span><span>-'+fmtDisplay(d.discountAmount)+'</span></div>';
  if(d.pointsUsed>0)html+='<div class="rcpt-row" style="color:#666"><span>แลกแต้ม ('+d.pointsUsed+' แต้ม)</span><span>-'+fmtDisplay(d.pointsUsed*POINTS_VALUE)+'</span></div>';
  html+='<div class="rcpt-row bold"><span>ยอดชำระสุทธิ</span><span>'+fmtDisplay(d.net)+'</span></div><hr class="rcpt-divider">';
  if(d.memberName){
    html+='<div class="rcpt-row"><span>👤 '+escHtml(d.memberName)+'</span><span>'+escHtml(d.memberPhone||'')+'</span></div>';
    if(d.pointsEarned>0)html+='<div class="rcpt-row"><span>แต้มที่ได้รับ</span><span>+'+d.pointsEarned+' แต้ม</span></div>';
    if(d.newMemberPoints!=null)html+='<div class="rcpt-row"><span>แต้มสะสมทั้งหมด</span><span>'+d.newMemberPoints+' แต้ม</span></div>';
    html+='<hr class="rcpt-divider">';
  }
  html+='<div class="rcpt-center">'+escHtml(s.receiptFooter).replace(/\n/g,'<br>')+'</div>';
  document.getElementById('receipt-print-area').innerHTML=html;
}

function addToCart(recipe,overridePrice){
  var price=overridePrice!=null?overridePrice:recipe.price;
  var ex=state.cart.find(i=>i.id===recipe.id);
  if(ex)state.cart=state.cart.map(i=>i.id===recipe.id?Object.assign({},i,{qty:i.qty+1,price}):i);
  else state.cart=state.cart.concat([Object.assign({},recipe,{qty:1,price})]);
  render();
}
function updateQty(id,delta){
  state.cart=state.cart.map(i=>i.id===id?Object.assign({},i,{qty:Math.max(0,i.qty+delta)}):i).filter(i=>i.qty>0);
  render();
}

async function checkoutLogic(e,grossTotal,netRevenue){
  if(!state.cart.length)return;
  var btn=e.currentTarget;btn.disabled=true;btn.textContent='กำลังบันทึก...';
  var s=state;var stockDed={};var totalCogs=0;
  s.cart.forEach(cartItem=>{
    var recipe=s.recipes.find(r=>r.id===cartItem.id);
    if(recipe){
      totalCogs+=calcRecipeCost(recipe.lines,s.ingredients)*cartItem.qty;
      recipe.lines.forEach(line=>stockDed[line.ingId]=(stockDed[line.ingId]||0)+(line.qty*cartItem.qty));
    }
  });

  var pointsEarned=Math.floor(grossTotal/POINTS_PER_THB);
  var pointsUsed=s.pointsToUse;
  var itemsStr=s.cart.map(i=>i.name+' x'+i.qty).join(', ');

  try{
    await _sb.from('orders').insert([{
      type:s.orderType, items:itemsStr, gross:grossTotal, net:netRevenue, cogs:totalCogs, gp_percent:s.gpPercent, ads_discount:s.adsDiscount, payment_method:s.paymentMethod, shift_id:s.currentShift?s.currentShift.id:null, staff_id:s.currentStaff?s.currentStaff.id:null, member_id:s.currentMember?s.currentMember.id:null, points_earned:pointsEarned, points_used:pointsUsed, discount_amount:s.extraDiscount, discount_reason:s.extraDiscountReason,
    }]);

    for(var i=0;i<s.ingredients.length;i++){
      var ing=s.ingredients[i];
      if(stockDed[ing.id])await _sb.from('ingredients').update({stock:Math.max(0,ing.stock-stockDed[ing.id])}).eq('id',ing.id);
    }

    var newMemberPoints=null;
    if(s.currentMember){
      newMemberPoints=Math.max(0,s.currentMember.points+pointsEarned-pointsUsed);
      await _sb.from('members').update({points:newMemberPoints,total_spent:(s.currentMember.total_spent||0)+netRevenue}).eq('id',s.currentMember.id);
    }

    var rcptData={ type:s.orderType, items:itemsStr, gross:grossTotal, net:netRevenue, gpPercent:s.gpPercent, adsDiscount:s.adsDiscount, paymentMethod:s.paymentMethod, staffName:s.currentStaff?s.currentStaff.name:null, memberName:s.currentMember?s.currentMember.name:null, memberPhone:s.currentMember?s.currentMember.phone:null, pointsEarned, pointsUsed, discountAmount:s.extraDiscount, discountReason:s.extraDiscountReason, newMemberPoints };

    state.cart=[];state.adsDiscount=0; state.currentMember=null;state.memberSearchPhone='';state.memberNotFound=false;state.pointsToUse=0; state.extraDiscount=0;state.extraDiscountReason='';state.showDiscountForm=false;

    if(s.settings.printOnCheckout)printReceipt(rcptData);
    showToast('✓ บันทึกสำเร็จ!'); await refreshView();
  }catch(err){ console.error(err);alert('Error: '+err.message); btn.disabled=false;btn.textContent='✅ ยืนยันคำสั่งซื้อ'; }
}

// ── SPRINT 8: Produce WIP (Batching) ──
function openModalProduceWIP() {
  var form={ wipId:'', batches:1, actualYield:0 };
  var wrap = el('div',{style:{display:'flex',flexDirection:'column',gap:'16px'}});
  var wipOpts = [{label:'-- เลือกเบสที่ต้องการต้ม --',value:''}].concat(state.ingredients.filter(i=>i.type==='WIP/เบส').map(i=>({label:i.name,value:i.id})));
  var extra = el('div',{style:{display:'flex',flexDirection:'column',gap:'16px'}});
  
  var wipSel = mkSel(wipOpts,'',e=>{form.wipId=e.target.value; renderProdExtra()});
  
  function renderProdExtra() {
    extra.innerHTML=''; var wipIng = state.ingredients.find(i=>i.id===Number(form.wipId)); if(!wipIng)return;
    var formulas = state.wipFormulas.filter(f=>f.wipIngId === wipIng.id);
    if(!formulas.length) { extra.appendChild(el('p',{txt:'⚠️ ยังไม่ได้ตั้งสูตรเบสนี้ กรุณาไปตั้งสูตรก่อน',style:{color:'#f87171'}})); return; }
    
    var bI = mkInp({type:'number',value:'1',min:'1'}); 
    var yI = mkInp({type:'number',value:wipIng.yieldPerBatch});
    
    function recalcExpected() { yI.value = wipIng.yieldPerBatch * Number(bI.value||1); form.actualYield = Number(yI.value); }
    bI.addEventListener('input',e=>{form.batches=Number(e.target.value); recalcExpected();});
    yI.addEventListener('input',e=>form.actualYield=Number(e.target.value));
    recalcExpected(); // init

    var cBtn = el('button',{cls:'btn btn-violet',txt:'✅ บันทึกการผลิตเบส',style:{width:'100%'},onClick:async function(){
      if(form.actualYield <= 0) return showToast('ปริมาณที่ได้ต้องมากกว่า 0','#f87171');
      this.disabled=true; this.textContent='กำลังคำนวณและตัดสต็อก...';
      
      var totalRawCost = 0;
      // 1. Calculate raw materials usage & total cost
      for(var i=0; i<formulas.length; i++) {
        var f = formulas[i]; var raw = state.ingredients.find(ri=>ri.id===f.rawIngId);
        if(raw) {
          var useQty = f.qty * form.batches;
          totalRawCost += (useQty * raw.costPerUnit);
          // Deduct Raw Stock
          await _sb.from('ingredients').update({stock: Math.max(0, raw.stock - useQty)}).eq('id', raw.id);
        }
      }
      
      // 2. Add to WIP Stock & Calculate new moving average cost
      var newStock = wipIng.stock + form.actualYield;
      var newTotalCostValue = (wipIng.stock * wipIng.costPerUnit) + totalRawCost;
      var newCostPerUnit = newStock > 0 ? (newTotalCostValue / newStock) : 0;
      
      await _sb.from('ingredients').update({stock: newStock, cost_per_unit: newCostPerUnit}).eq('id', wipIng.id);
      
      // 3. Log Adjustment
      await _sb.from('adjustments').insert([{ingredient_id:wipIng.id, ing_name:wipIng.name, type:'Produce WIP', qty:form.actualYield, unit:wipIng.unit, reason:'ต้มไป '+form.batches+' รอบ (ต้นทุนรับเข้า '+fmtCost(totalRawCost)+')'}]);
      
      closeModal(); showToast('✓ ผลิตเบสสำเร็จ!'); await refreshView();
    }});

    extra.appendChild(mkField('จำนวนรอบ (สูตร) ที่ต้ม',bI));
    extra.appendChild(mkField('ปริมาณที่ได้จริง (Actual Yield) หน่วย: '+wipIng.unit,yI));
    extra.appendChild(el('p',{txt:'*ระบบจะตัดวัตถุดิบตามสูตร × จำนวนรอบ และคำนวณต้นทุน/หน่วยใหม่ให้อัตโนมัติ',style:{color:'#94a3b8',fontSize:'.75rem',margin:0}}));
    extra.appendChild(cBtn);
  }
  
  wrap.appendChild(mkField('เลือกเบส (WIP)', wipSel)); wrap.appendChild(extra);
  openModal('🍳 บันทึกต้มเบสเครื่องดื่ม', wrap);
}

function openModalAddPlatform(){
  var form={name:'',gp:30};
  var nI=mkInp({placeholder:'เช่น Grab, LINE MAN'});nI.addEventListener('input',e=>form.name=e.target.value);
  var gpI=mkInp({type:'number',placeholder:'30',value:'30'});gpI.addEventListener('input',e=>form.gp=e.target.value);
  var btn=el('button',{cls:'btn btn-primary',txt:'เพิ่มแพลตฟอร์ม',style:{width:'100%'},onClick:async function(){
    if(!form.name)return;this.disabled=true;
    await _sb.from('platforms').insert([{name:form.name,gp_percent:Number(form.gp||0)}]);
    closeModal();showToast('เพิ่มแอปเรียบร้อย');await refreshView();
  }});
  openModal('เพิ่มแพลตฟอร์มเดลิเวอรี่',el('div',{style:{display:'flex',flexDirection:'column',gap:'16px'}},mkField('ชื่อแพลตฟอร์ม',nI),mkField('ค่า GP หักร้าน (%)',gpI),btn));
}

function bootUp() { updatePinDisplay(); }
bootUp();
</script>
