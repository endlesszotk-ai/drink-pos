<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drink POS & BOM System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --bg: #020617; --card: #0f172a; --gold: #f59e0b; --text: #cbd5e1; }
    body { background: var(--bg); color: var(--text); font-family: sans-serif; }
    .card { background: var(--card); border: 1px solid #1e293b; border-radius: 12px; }
  </style>
</head>
<body>
<div id="app" class="flex h-screen">
  <aside class="w-16 bg-[#0f172a] border-r border-[#1e293b] flex flex-col items-center py-4 gap-4">
    <button onclick="navigate('dashboard')" class="text-xl">⊞</button>
    <button onclick="navigate('pos')" class="text-xl">🖥</button>
    <button onclick="navigate('stock')" class="text-xl">📦</button>
    <button onclick="navigate('recipe')" class="text-xl">📋</button>
  </aside>
  <main id="main" class="flex-1 p-6 overflow-y-auto"></main>
</div>

<div id="modal-container"></div>

<script>
// SUPABASE & CONFIG
const _sb = window.supabase.createClient('https://bxxnockrzvvmwwpjabve.supabase.co', 'YOUR_ANON_KEY');
let state = { ingredients: [], recipes: [], wipFormulas: [], active: 'dashboard', recipeTab: 'menu' };

// CORE FUNCTIONS
async function refreshData() {
  const [i, r, w, l] = await Promise.all([
    _sb.from('ingredients').select('*'),
    _sb.from('recipes').select('*'),
    _sb.from('wip_formulas').select('*'),
    _sb.from('recipe_lines').select('*')
  ]);
  state.ingredients = i.data || [];
  state.wipFormulas = w.data || [];
  state.recipes = (r.data || []).map(rec => ({ ...rec, lines: (l.data || []).filter(line => line.recipe_id === rec.id) }));
  render();
}

function el(tag, props, ...children) {
  const e = document.createElement(tag);
  Object.assign(e, props);
  children.forEach(c => typeof c === 'string' ? e.appendChild(document.createTextNode(c)) : e.appendChild(c));
  return e;
}

function navigate(id) { state.active = id; render(); }

// ── WIP & PRODUCTION LOGIC ──
async function produceWIP(wipId, batches, actualYield) {
  const formulas = state.wipFormulas.filter(f => f.wip_ing_id === wipId);
  for (let f of formulas) {
    const raw = state.ingredients.find(i => i.id === f.raw_ing_id);
    await _sb.from('ingredients').update({ stock: raw.stock - (f.qty * batches) }).eq('id', raw.id);
  }
  const wip = state.ingredients.find(i => i.id === wipId);
  await _sb.from('ingredients').update({ stock: wip.stock + Number(actualYield) }).eq('id', wipId);
  alert('ผลิตเบสเรียบร้อย!');
  refreshData();
}

// ── UI RENDERER ──
function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  if (state.active === 'recipe') {
    main.appendChild(el('div', {className: 'flex gap-2 mb-4'}, 
      el('button', {className: 'btn btn-primary', txt: 'เมนูเครื่องดื่ม', onclick: () => {state.recipeTab='menu'; render();}}),
      el('button', {className: 'btn btn-violet', txt: 'สูตรเบส (WIP)', onclick: () => {state.recipeTab='base'; render();}})
    ));
    if (state.recipeTab === 'base') {
      state.ingredients.filter(i => i.type === 'WIP/เบส').forEach(wip => {
        main.appendChild(el('div', {className: 'card p-4 mb-2'}, el('h3', {txt: wip.name}), 
          el('button', {className: 'btn btn-emerald', txt: '🍳 ผลิตเบส', onclick: () => produceWIP(wip.id, 1, wip.yield_per_batch)})
        ));
      });
    }
  }
}

// BOOT
document.getElementById('app').style.display = 'flex';
refreshData();
</script>
</body>
</html>
