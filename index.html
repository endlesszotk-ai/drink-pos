// ─── CLOUD DATA ───────────────────────────────────────────────────────────────
async function fetchCloudData(){
  try{
    var[r1,r2,r3,r4,r5,r6,r7,r8]=await Promise.all([
      _sb.from('ingredients').select('*').order('id'),
      _sb.from('recipes').select('*').order('id'),
      _sb.from('recipe_lines').select('*'),
      _sb.from('orders').select('*').order('created_at',{ascending:false}).limit(300),
      _sb.from('adjustments').select('*').order('created_at',{ascending:false}),
      _sb.from('platforms').select('*').order('id'),
      _sb.from('platform_prices').select('*'),
      _sb.from('shifts').select('*').order('opened_at',{ascending:false}).limit(50),
    ]);

    state.ingredients=(r1.data||[]).map(function(i){return{id:i.id,name:i.name,type:i.type,unit:i.unit,stock:Number(i.stock),costPerUnit:Number(i.cost_per_unit),minStock:Number(i.min_stock)}});
    state.recipes=(r2.data||[]).map(function(r){return{id:r.id,name:r.name,price:Number(r.price),lines:(r3.data||[]).filter(function(l){return l.recipe_id===r.id}).map(function(l){return{ingId:l.ingredient_id,qty:Number(l.qty)}})}});
    if(state.recipes.length>0&&!state.selectedRecipeId)state.selectedRecipeId=state.recipes[0].id;
    state.orders=(r4.data||[]).map(function(o){return{id:o.id,type:o.type,items:o.items,gross:Number(o.gross),net:Number(o.net),cogs:Number(o.cogs),gpPercent:Number(o.gp_percent||0),adsDiscount:Number(o.ads_discount||0),paymentMethod:o.payment_method||'cash',shiftId:o.shift_id||null,time:new Date(o.created_at).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}),dateStr:new Date(o.created_at).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'})}});
    state.adjustments=(r5.data||[]).map(function(a){return{id:a.id,ingName:a.ing_name,type:a.type,qty:Number(a.qty),unit:a.unit,reason:a.reason,date:new Date(a.created_at).toLocaleDateString('th-TH')}});
    state.platforms=(r6.data||[]).map(function(p){return{id:p.id,name:p.name,gpPercent:Number(p.gp_percent),active:p.active}});
    state.platformPrices=(r7.data||[]).map(function(x){return{id:x.id,recipeId:x.recipe_id,platformId:x.platform_id,price:Number(x.price)}});

    var shiftsRaw=r8.data||[];
    state.currentShift=shiftsRaw.find(function(s){return s.status==='open'})||null;
    state.allShifts=shiftsRaw.map(function(s){return{id:s.id,openedAt:s.opened_at,closedAt:s.closed_at,openingCash:Number(s.opening_cash||0),closingCash:s.closing_cash!=null?Number(s.closing_cash):null,expectedCash:s.expected_cash!=null?Number(s.expected_cash):null,cashDiff:s.cash_diff!=null?Number(s.cash_diff):null,status:s.status,note:s.note}});

    // Set auto GP based on platform selection
    if(state.orderType === 'delivery') {
       if(!state.selectedPlatformId && state.platforms.length > 0) {
           var activePlats = state.platforms.filter(p => p.active);
           if(activePlats.length > 0) state.selectedPlatformId = activePlats[0].id;
       }
       if(state.selectedPlatformId){
          var plat=state.platforms.find(p => p.id===state.selectedPlatformId);
          if(plat) state.gpPercent=plat.gpPercent;
       }
    } else {
       state.gpPercent = 0;
       state.selectedPlatformId = null;
    }

    updateShiftIndicator();
  }catch(err){console.error('fetchCloudData:',err);showToast('⚠️ โหลดข้อมูลไม่สำเร็จ','#f87171')}
}

function updateShiftIndicator(){
  var ind=document.getElementById('shift-indicator');
  if(!ind)return;
  if(state.currentShift){
    ind.style.display='inline-block';ind.style.background='rgba(16,185,129,.15)';ind.style.border='1px solid rgba(16,185,129,.4)';ind.style.color='#10b981';ind.textContent='🟢 กะเปิดอยู่';

  }
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function fmtCost(n){return '฿'+Number(n).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:4})}
function fmtDisplay(n){return '฿'+Number(n).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2})}
function fmtDateTime(isoStr){var d=new Date(isoStr);return d.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}
function calcRecipeCost(lines,ings){return lines.reduce(function(s,l){var i=ings.find(function(x){return x.id===l.ingId});return s+(i?i.costPerUnit*Number(l.qty):0)},0)}
function parseOrderItems(itemsStr){if(!itemsStr)return[];return itemsStr.split(',').map(function(seg){seg=seg.trim();var m=seg.match(/^(.+?)\s*x(\d+)$/i);return m?{name:m[1].trim(),qty:parseInt(m[2],10)}:{name:seg,qty:1}})}
function escHtml(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function payLabel(pm){var m=PAY_METHODS.find(function(x){return x.id===pm});return m?m.label:'💵 เงินสด'}

function el(tag,props){
  var e=document.createElement(tag);
  if(props)Object.keys(props).forEach(function(k){var v=props[k];if(k==='cls'){e.className=v}else if(k==='style'&&typeof v==='object'){Object.assign(e.style,v)}else if(k==='html'){e.innerHTML=v}else if(k==='txt'){e.textContent=v}else if(k.indexOf('on')===0){e.addEventListener(k.slice(2).toLowerCase(),v)}else{try{e.setAttribute(k,v)}catch(err){}}});
  for(var i=2;i<arguments.length;i++){var c=arguments[i];if(c==null||c===false)continue;if(typeof c==='string'||typeof c==='number'){e.appendChild(document.createTextNode(c))}else{e.appendChild(c)}}
  return e;
}
function mkField(labelTxt,inputEl,req){return el('div',{cls:'field'},el('label',{txt:labelTxt+(req?'*':'')}),inputEl)}
function mkInp(opts){var e=document.createElement('input');e.className='inp';if(opts){if(opts.type)e.type=opts.type;if(opts.placeholder)e.placeholder=opts.placeholder;if(opts.value!=null)e.value=opts.value;if(opts.style)Object.assign(e.style,opts.style)}return e}
function mkSel(options,value,onChange){var e=document.createElement('select');e.className='inp';options.forEach(function(opt){var o=document.createElement('option');o.value=opt.value!=null?opt.value:opt.label;o.textContent=opt.label;if(String(opt.value!=null?opt.value:opt.label)===String(value))o.selected=true;e.appendChild(o)});e.addEventListener('change',onChange);return e}
var _toastTimer;
function showToast(msg,color){var t=document.getElementById('toast');t.textContent=msg;t.style.background=color||'#10b981';t.style.display='flex';clearTimeout(_toastTimer);_toastTimer=setTimeout(function(){t.style.display='none'},3000)}
function closeModal(){document.getElementById('modal-container').innerHTML=''}
function openModal(title,bodyEl,maxWidth){
  var mc=document.getElementById('modal-container');mc.innerHTML='';
  var bg=el('div',{cls:'modal-bg',onClick:closeModal});
  var box=el('div',{cls:'modal-box',onClick:function(e){e.stopPropagation()}});
  if(maxWidth)box.style.maxWidth=maxWidth;
  box.appendChild(el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 20px',borderBottom:'1px solid #1e293b'}},el('p',{txt:title,style:{fontWeight:700,color:'#fff',margin:0}}),el('button',{txt:'✕',style:{background:'none',border:'none',color:'#94a3b8',cursor:'pointer',fontSize:'1.2rem'},onClick:closeModal})));
  box.appendChild(el('div',{cls:'modal-body'},bodyEl));
  bg.appendChild(box);mc.appendChild(bg);
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
function buildNav(){

    nav.appendChild(btn);
  });
}
function navigate(id){
  state.active=id;buildNav();
  var titles={dashboard:'Dashboard',pos:'ระบบ POS',shift:'รอบการขาย (Shift)',stock:'จัดการสต็อก',recipe:'สูตรอาหาร',stock_adj:'ประวัติสต็อก',settings:'ตั้งค่าร้าน / ใบเสร็จ'};

  else if(state.active==='stock_adj')main.appendChild(renderStockAdj());
  else if(state.active==='recipe')main.appendChild(renderRecipe());
  else if(state.active==='settings')main.appendChild(renderSettings());
}

// ═══════════════════════════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════
function renderDashboard(){
  var orders=state.orders;
  var totalNet=orders.reduce((s,o)=>s+o.net,0);
  var totalCogs=orders.reduce((s,o)=>s+(o.cogs||0),0);
  var netProfit=totalNet-totalCogs;
  var sf=orders.filter(o=>o.type==='storefront');
  var dv=orders.filter(o=>o.type==='delivery');
  function platStats(arr){var net=arr.reduce((s,o)=>s+o.net,0);var cogs=arr.reduce((s,o)=>s+(o.cogs||0),0);return{count:arr.length,net:net,profit:net-cogs,pct:totalNet>0?(net/totalNet*100):0}}
  var sfStats=platStats(sf);var dvStats=platStats(dv);
  var itemMap={};orders.forEach(o=>{parseOrderItems(o.items).forEach(item=>{itemMap[item.name]=(itemMap[item.name]||0)+item.qty})});
  var bestSelling=Object.keys(itemMap).map(n=>({name:n,qty:itemMap[n]})).sort((a,b)=>b.qty-a.qty).slice(0,8);
  
  var wrap=el('div',{style:{display:'flex',flexDirection:'column',gap:'16px'}});

  // KPI

function genOrderNo(){return '#'+Date.now().toString().slice(-6)}

function buildReceipt(orderData){
  var s=state.settings;
  var orderNo=genOrderNo();
  var html='';
  if(s.logoUrl)html+='<div style="text-align:center;margin-bottom:6px"><img src="'+s.logoUrl+'" style="max-width:60px;max-height:60px;object-fit:contain"/></div>';
  html+='<div class="rcpt-shop-name">'+escHtml(s.shopName)+'</div>';
  html+='<div class="rcpt-addr">'+escHtml(s.address).replace(/\n/g,'<br>')+'</div>';
  html+='<hr class="rcpt-divider">';
  html+='<div class="rcpt-order-no">ออเดอร์ '+orderNo+'</div>';
  html+='<div class="rcpt-row"><span>'+(orderData.dateStr?orderData.dateStr+' '+orderData.time:new Date().toLocaleString('th-TH'))+'</span><span>'+(orderData.type==='storefront'?'หน้าร้าน':'เดลิเวอรี่')+'</span></div>';
  html+='<div class="rcpt-row"><span>ชำระโดย:</span><span>'+payLabel(orderData.paymentMethod||'cash')+'</span></div>';
  html+='<hr class="rcpt-divider">';
  parseOrderItems(orderData.items).forEach(item=>{
    var recipe=state.recipes.find(r=>r.name===item.name);
    // Find approximate price per unit from total if needed, or just show name
    html+='<div class="rcpt-row"><span>'+escHtml(item.name)+' x'+item.qty+'</span><span></span></div>';
  });
  html+='<hr class="rcpt-divider">';
  html+='<div class="rcpt-row"><span>ยอดก่อนหัก</span><span>'+fmtDisplay(orderData.gross)+'</span></div>';
  if(orderData.type==='delivery'){
    var gpDed=orderData.gross-orderData.net-(orderData.adsDiscount||0);
    html+='<div class="rcpt-row" style="color:#666"><span>หัก GP ('+orderData.gpPercent+'%)</span><span>-'+fmtDisplay(gpDed)+'</span></div>';
    if(orderData.adsDiscount>0)html+='<div class="rcpt-row" style="color:#666"><span>หัก Ads/ส่วนลด</span><span>-'+fmtDisplay(orderData.adsDiscount)+'</span></div>';
  }
  html+='<div class="rcpt-row bold"><span>ยอดชำระสุทธิ</span><span>'+fmtDisplay(orderData.net)+'</span></div>';
  html+='<hr class="rcpt-divider">';
  html+='<div class="rcpt-center">'+escHtml(s.receiptFooter).replace(/\n/g,'<br>')+'</div>';
  document.getElementById('receipt-print-area').innerHTML=html;
}
function buildKOT(orderData){
  var orderNo=genOrderNo();
  var now=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  var html='<div class="kot-title">KOT '+orderNo+'</div>';
  html+='<div style="text-align:center;font-size:11px;margin-bottom:8px">'+now+' — '+(orderData.type==='storefront'?'หน้าร้าน':'เดลิเวอรี่')+'</div>';
  html+='<hr class="rcpt-divider">';
  parseOrderItems(orderData.items).forEach(item=>{html+='<div class="kot-item">'+item.qty+' × '+escHtml(item.name)+'</div>'});
  document.getElementById('receipt-print-area').innerHTML=html;
}
function printReceipt(orderData){buildReceipt(orderData);setTimeout(()=>window.print(),100)}
function printKOT(orderData){buildKOT(orderData);setTimeout(()=>window.print(),100)}

function addToCart(recipe,overridePrice){
  var price=overridePrice!=null?overridePrice:recipe.price;
  var ex=state.cart.find(i=>i.id===recipe.id);
  if(ex)state.cart=state.cart.map(i=>i.id===recipe.id?Object.assign({},i,{qty:i.qty+1,price:price}):i);
  else state.cart=state.cart.concat([Object.assign({},recipe,{qty:1,price:price})]);
  render();
}
function updateQty(id,delta){
  state.cart=state.cart.map(i=>i.id===id?Object.assign({},i,{qty:Math.max(0,i.qty+delta)}):i).filter(i=>i.qty>0);
  render();
}

async function checkoutLogic(e,grossTotal,netRevenue){
  if(state.cart.length===0)return;
  var btn=e.currentTarget;btn.disabled=true;btn.textContent='กำลังบันทึก...';
  var s=state;var stockDed={};var totalCogs=0;
  s.cart.forEach(cartItem=>{
    var recipe=s.recipes.find(r=>r.id===cartItem.id);
    if(recipe){
      totalCogs+=calcRecipeCost(recipe.lines,s.ingredients)*cartItem.qty;
      recipe.lines.forEach(line=>{stockDed[line.ingId]=(stockDed[line.ingId]||0)+(line.qty*cartItem.qty)});
    }
  });
  try{
    var itemsStr=s.cart.map(i=>i.name+' x'+i.qty).join(', ');
    await _sb.from('orders').insert([{type:s.orderType,items:itemsStr,gross:grossTotal,net:netRevenue,cogs:totalCogs,gp_percent:s.gpPercent,ads_discount:s.adsDiscount,payment_method:s.paymentMethod,shift_id:s.currentShift?s.currentShift.id:null}]);
    for(var i=0;i<state.ingredients.length;i++){
      var ing=state.ingredients[i];
      if(stockDed[ing.id]){await _sb.from('ingredients').update({stock:Math.max(0,ing.stock-stockDed[ing.id])}).eq('id',ing.id)}
    }
    
    var receiptSnapshot={type:s.orderType,items:itemsStr,gross:grossTotal,net:netRevenue,gpPercent:s.gpPercent,paymentMethod:s.paymentMethod};
    if(s.settings.printOnCheckout) printReceipt(receiptSnapshot);

    state.cart=[];state.adsDiscount=0;
    showToast('✓ บันทึกสำเร็จ');
    await refreshView();
  }catch(err){console.error(err);alert('Error: '+err.message);btn.disabled=false;btn.textContent='✅ ยืนยันคำสั่งซื้อ'}
}

    var sumBox=el('div',{style:{background:'rgba(30,41,59,.4)',borderRadius:'12px',padding:'14px',display:'flex',flexDirection:'column',gap:'10px'}});
    sumBox.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',borderBottom:'1px solid rgba(255,255,255,.1)',paddingBottom:'6px'}},el('span',{txt:'ยอดขายรวมในกะนี้ ('+shiftOrders.length+' บิล)'}),el('span',{txt:fmtDisplay(shiftOrders.reduce((s,o)=>s+o.net,0)),style:{fontWeight:700}})));
    Object.keys(pmTotals).forEach(pmKey=>{
      if(pmTotals[pmKey]>0||pmKey==='cash')sumBox.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'.8rem'}},el('span',{txt:payLabel(pmKey),style:{color:'#94a3b8'}}),el('span',{txt:fmtDisplay(pmTotals[pmKey]),style:{color:'#fff'}})));

      var pp=state.platformPrices.find(x=>x.recipeId===recipe.id && x.platformId===plat.id);
      var cp=pp?pp.price:recipe.price;
      pTbody.appendChild(buildPriceRow('delivery', plat.id, '🛵 '+plat.name, plat.gpPercent, cp));
    });
  }

  pTable.appendChild(pTbody);
  var twrap=el('div',{style:{overflowX:'auto',border:'1px solid #1e293b',borderRadius:'12px'}});
  twrap.appendChild(pTable);
  
  pBody.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',background:'rgba(248,113,113,.05)',padding:'10px 14px',borderRadius:'10px',border:'1px solid rgba(248,113,113,.2)'}},
    el('span',{txt:'ต้นทุนวัตถุดิบ (COGS) ปัจจุบัน',style:{color:'#f87171',fontSize:'.875rem'}}),
    el('span',{txt:fmtCost(cost)+' / แก้ว',style:{color:'#f87171',fontWeight:700,fontSize:'1.1rem'}})
  ));
  pBody.appendChild(twrap);
  priceCard.appendChild(pBody);
  wrap.appendChild(priceCard);

  // Ingredients (BOM)
  var ingCard=el('div',{cls:'card'});
  ingCard.appendChild(el('div',{cls:'card-head'},el('span',{txt:'📋 สูตรวัตถุดิบ (หน่วยฐาน)'}),el('button',{cls:'btn btn-primary btn-sm',txt:'+ เพิ่มวัตถุดิบ',onClick:()=>openModalAddIngToRecipe(recipe)})));
  var sw2=el('div',{style:{overflowX:'auto'}});
  var tbody3=el('tbody',{});
  recipe.lines.forEach(line=>{
    var ing=state.ingredients.find(i=>i.id===line.ingId);if(!ing)return;
    var qI=el('input',{type:'number',style:{width:'72px',background:'#1e293b',border:'1px solid #334155',borderRadius:'6px',padding:'4px 8px',color:'#fff',fontSize:'.875rem'}});
    qI.value=line.qty;
    qI.addEventListener('change',async e=>{await _sb.from('recipe_lines').update({qty:Number(e.target.value)}).eq('recipe_id',recipe.id).eq('ingredient_id',ing.id);await refreshView()});
    var delBtn=el('button',{txt:'🗑',style:{background:'none',border:'none',cursor:'pointer',color:'#475569',padding:'8px',fontSize:'1rem'},onMouseover:function(){this.style.color='#f87171'},onMouseout:function(){this.style.color='#475569'},onClick:async function(){await _sb.from('recipe_lines').delete().eq('recipe_id',recipe.id).eq('ingredient_id',ing.id);await refreshView()}});
    tbody3.appendChild(el('tr',{},el('td',{txt:ing.name,style:{color:'#fff'}}),el('td',{},qI,el('span',{txt:' '+ing.unit,style:{color:'#94a3b8',marginLeft:'4px'}})),el('td',{txt:fmtCost(ing.costPerUnit*Number(line.qty)),style:{textAlign:'right',color:'#10b981'}}),el('td',{style:{textAlign:'center'}},delBtn)));
  });
  sw2.appendChild(el('table',{style:{minWidth:'500px'}},el('thead',{},el('tr',{},el('th',{txt:'วัตถุดิบ'}),el('th',{txt:'ปริมาณใช้/แก้ว'}),el('th',{txt:'ต้นทุนย่อย',style:{textAlign:'right'}}),el('th',{}))),tbody3));
  ingCard.appendChild(sw2);wrap.appendChild(ingCard);
  
  return wrap;
}

function openModalNewRecipe(){
  var form={name:'',price:''};
  var nI=mkInp({placeholder:'ชื่อเมนู'});nI.addEventListener('input',e=>form.name=e.target.value);
  var pI=mkInp({type:'number',placeholder:'0'});pI.addEventListener('input',e=>form.price=e.target.value);
  var btn=el('button',{cls:'btn btn-primary',txt:'ยืนยันสร้างเมนูบน Cloud',style:{width:'100%'},onClick:async function(){
    if(!form.name)return;this.disabled=true;
    var result=await _sb.from('recipes').insert([{name:form.name,price:Number(form.price||0)}]).select();
    if(result.data&&result.data.length>0)state.selectedRecipeId=result.data[0].id;
    closeModal();showToast('สร้างเมนูใหม่แล้ว');await refreshView();
  }});
  openModal('สร้างเมนูใหม่',el('div',{style:{display:'flex',flexDirection:'column',gap:'16px'}},mkField('ชื่อเมนู',nI),mkField('ราคาขายหน้าร้าน (฿)',pI),btn));
}
function openModalAddIngToRecipe(recipe){
  var avail=state.ingredients.filter(i=>!recipe.lines.find(l=>l.ingId===i.id));
  if(avail.length===0){showToast('ไม่มีวัตถุดิบเพิ่มแล้ว');return}
  var list=el('div',{style:{display:'flex',flexDirection:'column',gap:'8px',maxHeight:'280px',overflowY:'auto'}});
  avail.forEach(ing=>{
    list.appendChild(el('button',{style:{padding:'12px',background:'#1e293b',borderRadius:'12px',border:'none',cursor:'pointer',color:'#fff',fontWeight:600,textAlign:'left',width:'100%',transition:'background .15s'},onMouseover:function(){this.style.background='#293548'},onMouseout:function(){this.style.background='#1e293b'},onClick:async function(){await _sb.from('recipe_lines').insert([{recipe_id:recipe.id,ingredient_id:ing.id,qty:1}]);closeModal();await refreshView()}},ing.name+' ',el('span',{txt:'('+fmtCost(ing.costPerUnit)+'/'+ing.unit+')',style:{color:'#94a3b8',fontWeight:400,fontSize:'.75rem'}})));
  });
  openModal('เลือกวัตถุดิบเข้าสูตร',list);
}

// ═══════════════════════════════════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════════════════════════════════
function renderSettings(){
  var s=state.settings;
  var wrap=el('div',{style:{display:'flex',flexDirection:'column',gap:'16px',maxWidth:'640px'}});

  // Delivery Platforms Setup
  var platCard=el('div',{cls:'card',style:{borderColor:'rgba(249,115,22,.4)'}});
  platCard.appendChild(el('div',{cls:'card-head'},el('span',{txt:'🛵 จัดการแอปเดลิเวอรี่ (GP%)'}),el('button',{cls:'btn btn-primary btn-sm',txt:'+ เพิ่มแอป',onClick:openModalAddPlatform})));
  var platBody=el('div',{cls:'card-body',style:{display:'flex',flexDirection:'column',gap:'10px'}});
  
  if(state.platforms.length===0){
    platBody.appendChild(el('p',{txt:'ยังไม่มีแอปเดลิเวอรี่ — กด "+ เพิ่มแอป" เพื่อสร้าง',style:{color:'#475569',textAlign:'center',margin:0}}));
  }else{
    state.platforms.forEach(p=>{
      var row=el('div',{style:{display:'flex',alignItems:'center',gap:'10px',background:'rgba(30,41,59,.4)',borderRadius:'10px',padding:'10px 12px'}});
      var tog=el('button',{txt:p.active?'🟢':'⚫',style:{background:'none',border:'none',cursor:'pointer',fontSize:'1.1rem'},onClick:async()=>{await _sb.from('platforms').update({active:!p.active}).eq('id',p.id);await refreshView()}});
      row.appendChild(tog);
      row.appendChild(el('span',{txt:p.name,style:{color:'#fff',fontWeight:700,flex:1}}));
      var gpI=el('input',{type:'number',style:{width:'70px',background:'#1e293b',border:'1px solid #334155',borderRadius:'6px',padding:'4px 8px',color:'#fff',fontSize:'.875rem'}});
      gpI.value=p.gpPercent;
      row.appendChild(el('span',{txt:'GP:',style:{color:'#94a3b8',fontSize:'.8rem'}}));
      row.appendChild(gpI);
      row.appendChild(el('span',{txt:'%',style:{color:'#94a3b8',fontSize:'.8rem'}}));
      row.appendChild(el('button',{cls:'btn btn-ghost btn-sm',txt:'เซฟ GP',onClick:async()=>{await _sb.from('platforms').update({gp_percent:Number(gpI.value)}).eq('id',p.id);showToast('อัปเดต GP แล้ว');await refreshView()}}));
      row.appendChild(el('button',{txt:'🗑',style:{background:'none',border:'none',cursor:'pointer',color:'#475569',fontSize:'1rem'},onMouseover:function(){this.style.color='#f87171'},onMouseout:function(){this.style.color='#475569'},onClick:async()=>{if(confirm('ลบ '+p.name+' ข้อมูลราคาที่ผูกไว้จะหายไปนะ?')){await _sb.from('platforms').delete().eq('id',p.id);await refreshView()}}}));
      platBody.appendChild(row);
    });
  }
  platCard.appendChild(platBody); wrap.appendChild(platCard);

  // Shop info
  var shopCard=el('div',{cls:'card'});
  shopCard.appendChild(el('div',{cls:'card-head',txt:'🏪 ข้อมูลร้านและใบเสร็จ'}));
  var fb=el('div',{cls:'card-body',style:{display:'flex',flexDirection:'column',gap:'14px'}});
  var nameI=mkInp({placeholder:'ชื่อร้าน',value:s.shopName});
  var logoI=mkInp({placeholder:'URL รูปโลโก้',value:s.logoUrl});
  var addrTA=document.createElement('textarea');addrTA.className='inp';addrTA.rows=3;addrTA.value=s.address;
  var footerTA=document.createElement('textarea');footerTA.className='inp';footerTA.rows=3;footerTA.value=s.receiptFooter;
  var paperSel=mkSel([{label:'80mm (ทั่วไป)',value:'80mm'},{label:'58mm (มือถือ/เล็ก)',value:'58mm'}],s.paperSize,e=>s.paperSize=e.target.value);
  var autoLbl=el('label',{style:{display:'flex',alignItems:'center',gap:'10px',cursor:'pointer'}});
  var autoChk=document.createElement('input');autoChk.type='checkbox';autoChk.checked=s.printOnCheckout;autoChk.style.width='18px';autoChk.style.height='18px';autoChk.style.accentColor='#f59e0b';
  autoLbl.appendChild(autoChk);autoLbl.appendChild(el('span',{txt:'พิมพ์ใบเสร็จอัตโนมัติ',style:{color:'#cbd5e1',fontSize:'.875rem'}}));
  var saveBtn=el('button',{cls:'btn btn-primary',txt:'💾 บันทึกการตั้งค่า',style:{width:'100%'},onClick:()=>{
    s.shopName=nameI.value.trim()||DEFAULT_SETTINGS.shopName;s.logoUrl=logoI.value.trim();s.address=addrTA.value.trim();s.receiptFooter=footerTA.value.trim();s.printOnCheckout=autoChk.checked;s.paperSize=paperSel.value;
    saveSettings(s);showToast('✓ บันทึกการตั้งค่าแล้ว');
  }});
  fb.appendChild(mkField('ชื่อร้าน',nameI));fb.appendChild(mkField('URL โลโก้ (ถ้ามี)',logoI));fb.appendChild(mkField('ที่อยู่ / เบอร์โทร',addrTA));fb.appendChild(mkField('ข้อความท้ายใบเสร็จ',footerTA));fb.appendChild(el('div',{cls:'grid2'},mkField('ขนาดกระดาษ',paperSel),el('div',{style:{paddingTop:'22px'}},autoLbl)));fb.appendChild(saveBtn);
  shopCard.appendChild(fb);wrap.appendChild(shopCard);

  return wrap;
}

function openModalAddPlatform(){
  var form={name:'',gp:30};
  var nI=mkInp({placeholder:'เช่น Grab, LINE MAN'});nI.addEventListener('input',e=>form.name=e.target.value);
  var gpI=mkInp({type:'number',placeholder:'30',value:'30'});gpI.addEventListener('input',e=>form.gp=e.target.value);
  var btn=el('button',{cls:'btn btn-primary',txt:'เพิ่มแพลตฟอร์ม',style:{width:'100%'},onClick:async function(){
    if(!form.name)return;this.disabled=true;
    await _sb.from('platforms').insert([{name:form.name,gp_percent:Number(form.gp||0)}]);
    closeModal();showToast('เพิ่มแอปเรียบร้อย');await refreshView();
  }});
  openModal('เพิ่มแพลตฟอร์มเดลิเวอรี่',el('div',{style:{display:'flex',flexDirection:'column',gap:'16px'}},mkField('ชื่อแพลตฟอร์ม',nI),mkField('ค่า GP หักร้าน (%)',gpI),btn));
}

async function bootUp(){
  buildNav(); document.getElementById('header-title').textContent='Dashboard';
  await fetchCloudData();
  document.getElementById('loading-overlay').style.display='none';
  render();
}
bootUp();
