<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poopee Desktop Pet — Preview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:100vw;height:100vh;overflow:hidden;background:linear-gradient(135deg,#0f1b2d 0%,#1a2a4a 50%,#0d1520 100%);font-family:"Segoe UI",Tahoma,sans-serif;user-select:none}

/* taskbar */
#taskbar{position:fixed;bottom:0;left:0;right:0;height:44px;background:rgba(20,30,50,0.92);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;z-index:100}
#taskbar-clock{position:absolute;right:16px;color:#ccc;font-size:12px}
#taskbar-icon{width:28px;height:28px;cursor:pointer;image-rendering:pixelated;filter:drop-shadow(0 0 6px rgba(100,180,255,0.5))}

/* status */
#status{position:fixed;top:10px;right:14px;color:rgba(255,255,255,0.4);font-size:11px;z-index:50;pointer-events:none}

/* cat */
#cat-wrap{position:fixed;cursor:grab;z-index:200;touch-action:none}
#cat-wrap:active{cursor:grabbing}
#cat-img{display:block;width:160px;filter:drop-shadow(0 8px 18px rgba(0,0,0,0.6))}

/* bubble */
#bubble{position:fixed;z-index:300;display:none;max-width:280px;min-width:140px;background:rgba(255,255,255,0.97);border:2px solid #222;border-radius:16px;padding:10px 14px;font-size:13px;line-height:1.5;color:#111;box-shadow:0 4px 20px rgba(0,0,0,0.3);pointer-events:none;opacity:0;transition:opacity 0.3s}
#bubble.show{opacity:1}
#bubble::after{content:"";position:absolute;bottom:-12px;left:24px;border:6px solid transparent;border-top-color:#222}
#bubble::before{content:"";position:absolute;bottom:-9px;left:25px;border:5px solid transparent;border-top-color:rgba(255,255,255,0.97);z-index:1}

/* context menu */
#menu{position:fixed;z-index:500;display:none;background:rgba(245,246,250,0.97);backdrop-filter:blur(16px);border:1px solid rgba(0,0,0,0.12);border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,0.22);padding:4px 0;min-width:180px;font-size:13px}
.menu-item{padding:7px 16px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:8px;color:#111;position:relative}
.menu-item:hover{background:rgba(0,100,220,0.12)}
.menu-sep{height:1px;background:rgba(0,0,0,0.1);margin:4px 0}
.menu-arrow::after{content:"▶";position:absolute;right:12px;font-size:10px;opacity:0.5}
.submenu{position:absolute;left:100%;top:0;display:none;background:rgba(245,246,250,0.97);backdrop-filter:blur(16px);border:1px solid rgba(0,0,0,0.12);border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,0.22);padding:4px 0;min-width:160px}
.menu-item:hover>.submenu{display:block}

/* chat dialog */
#chat-dialog{position:fixed;z-index:600;display:none;width:320px;background:#f3f3f3;border:1px solid #999;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,0.4);overflow:hidden}
#chat-title{background:linear-gradient(to right,#0050c8,#0078d4);color:#fff;padding:8px 14px;font-size:13px;font-weight:600;cursor:move;display:flex;justify-content:space-between;align-items:center}
#chat-body{padding:14px}
#chat-label{font-size:13px;color:#222;margin-bottom:8px}
#chat-input{width:100%;border:1px solid #aaa;border-radius:4px;padding:6px 8px;font-size:13px;outline:none;font-family:inherit}
#chat-input:focus{border-color:#0078d4;box-shadow:0 0 0 2px rgba(0,120,212,0.2)}
#chat-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:10px}
.chat-btn{padding:5px 18px;border-radius:4px;border:1px solid #aaa;font-size:12px;cursor:pointer;font-family:inherit}
#btn-ok{background:#0078d4;color:#fff;border-color:#0078d4}
#btn-ok:hover{background:#005fa3}
#btn-cancel{background:#f0f0f0}
#btn-cancel:hover{background:#ddd}
</style>
</head>
<body>

<div id="taskbar">
  <img id="taskbar-icon" src="" alt="">
  <span id="taskbar-clock"></span>
</div>
<div id="status">idle_sleepy</div>

<div id="cat-wrap" style="left:200px;top:300px">
  <img id="cat-img" src="" alt="Poopee">
</div>

<div id="bubble"></div>

<div id="menu">
  <div class="menu-item menu-arrow">เปลี่ยนท่า
    <div class="submenu" id="pose-submenu"></div>
  </div>
  <div class="menu-item menu-arrow">ขนาด
    <div class="submenu">
      <div class="menu-item" onclick="setScale(0.75)">75%</div>
      <div class="menu-item" onclick="setScale(1.0)">100%</div>
      <div class="menu-item" onclick="setScale(1.25)">125%</div>
      <div class="menu-item" onclick="setScale(1.5)">150%</div>
    </div>
  </div>
  <div class="menu-item" id="top-toggle" onclick="toggleTop()">Always on Top ✓</div>
  <div class="menu-item" onclick="openChat()">คุยกับโปสตี้</div>
  <div class="menu-sep"></div>
  <div class="menu-item" onclick="quit()" style="color:#c00">ออกจากแอป</div>
</div>

<div id="chat-dialog">
  <div id="chat-title">
    <span>คุยกับโปสตี้</span>
    <span onclick="closeChat()" style="cursor:pointer;font-size:16px;line-height:1">✕</span>
  </div>
  <div id="chat-body">
    <div id="chat-label">อยากบอกอะไรโปสตี้?</div>
    <input id="chat-input" type="text" placeholder="พิมพ์ที่นี่…" autocomplete="off">
    <div id="chat-btns">
      <button class="chat-btn" id="btn-cancel" onclick="closeChat()">ยกเลิก</button>
      <button class="chat-btn" id="btn-ok" onclick="submitChat()">ตกลง</button>
    </div>
  </div>
</div>

};

// Pose → sprite key mapping (fallback to nearest available)
const POSE_MAP = {
  walk:'walk', walk2:'walk', walk3:'walk',
  stand:'idle_sleepy', idle_front:'idle_sleepy',
  idle_sleepy:'idle_sleepy',
  sit_yawn:'peek', peek:'peek', sit_alert:'peek', sit_side:'idle_sleepy',
  crouch_yawn:'peek', curl_sleep:'curl_sleep', crouch:'curl_sleep',
  sleep_side:'sleep_side', sleep_stretch:'sleep_side',
  sleep_long_left:'sleep_side', sleep_low_left:'sleep_side', sleep_low_right:'sleep_side',
  surprised:'surprised', sleep_flat:'sleep_side',
  sleep_roll:'sleep_side', sleep_back:'sleep_side', sleep_curl2:'curl_sleep',
};

const ALL_POSES = Object.keys(POSE_MAP);
const IDLE_POOL = ['idle_sleepy','walk','peek','sleep_side','curl_sleep','surprised'];

const DUMMY_REPLIES = [
  'เมี๊ยว~ ตอนนี้ยังไม่ได้ต่อ API นะ',
  'โปสตี้รับทราบแล้ว เดี๋ยวให้ต่อสมองก่อนนะ',
  'แง่ว… ขอ GEMINI_API_KEY ก่อน แล้วจะฉลาดขึ้น!',
  'เข้าใจแล้วเมี๊ยว แต่ตอนนี้ยังเป็นโหมดทดลองอยู่',
  'ถามมาดีมากเลย แต่ขอ API key ก่อนนะจ๊ะ ~',
];

let currentPose = 'idle_sleepy';
let scale = 1.0;
let alwaysOnTop = true;
let bubbleTimer = null;
let idleTimer = null;

const catWrap = document.getElementById('cat-wrap');
const catImg  = document.getElementById('cat-img');
const bubble  = document.getElementById('bubble');
const menu    = document.getElementById('menu');
const status  = document.getElementById('status');
const tbIcon  = document.getElementById('taskbar-icon');

function getSprite(pose){
  return SPRITES[POSE_MAP[pose] || 'idle_sleepy'];
}

function setPose(pose){
  currentPose = pose;
  catImg.src = getSprite(pose);
  status.textContent = pose;
  tbIcon.src = getSprite('idle_sleepy');
}

function setScale(s){
  scale = s;
  catImg.style.width = (160 * s) + 'px';
  hideMenu();
}

function showBubble(text, ms=8000){
  clearTimeout(bubbleTimer);
  bubble.textContent = text;
  const r = catWrap.getBoundingClientRect();
  bubble.style.left = r.left + 'px';
  bubble.style.top  = Math.max(10, r.top - 80) + 'px';
  bubble.style.display = 'block';
  requestAnimationFrame(()=>bubble.classList.add('show'));
  bubbleTimer = setTimeout(()=>{
    bubble.classList.remove('show');
    setTimeout(()=>bubble.style.display='none', 300);
  }, ms);
}

function hideMenu(){ menu.style.display='none'; }

// Build pose submenu
const poseSubmenu = document.getElementById('pose-submenu');
ALL_POSES.forEach(p=>{
  const el = document.createElement('div');
  el.className = 'menu-item';
  el.textContent = p;
  el.onclick = ()=>{ setPose(p); hideMenu(); };
  poseSubmenu.appendChild(el);
});

// Drag
let drag = false, ox=0, oy=0;
catWrap.addEventListener('mousedown', e=>{
  if(e.button!==0) return;
  drag=true; ox=e.clientX-catWrap.offsetLeft; oy=e.clientY-catWrap.offsetTop;
  catWrap.style.transition='none';
});
document.addEventListener('mousemove', e=>{
  if(!drag) return;
  const maxX = window.innerWidth - catWrap.offsetWidth;
  const maxY = window.innerHeight - catWrap.offsetHeight - 44;
  catWrap.style.left = Math.max(0,Math.min(maxX,e.clientX-ox))+'px';
  catWrap.style.top  = Math.max(0,Math.min(maxY,e.clientY-oy))+'px';
});
document.addEventListener('mouseup', ()=>{ drag=false; });

// Double-click
catWrap.addEventListener('dblclick', ()=>openChat());

// Right-click
catWrap.addEventListener('contextmenu', e=>{
  e.preventDefault();
  menu.style.display='block';
  const mx = Math.min(e.clientX, window.innerWidth-200);
  const my = Math.min(e.clientY, window.innerHeight-300);
  menu.style.left=mx+'px'; menu.style.top=my+'px';
});
document.addEventListener('click', e=>{ if(!menu.contains(e.target)) hideMenu(); });
document.addEventListener('contextmenu', e=>{ if(!catWrap.contains(e.target)){e.preventDefault();hideMenu();} });

// Always on top toggle
function toggleTop(){
  alwaysOnTop=!alwaysOnTop;
  document.getElementById('top-toggle').textContent = alwaysOnTop ? 'Always on Top ✓' : 'Always on Top';
  hideMenu();
}

// Chat
function openChat(){
  hideMenu();
  const d = document.getElementById('chat-dialog');
  d.style.display='block';
  d.style.left = Math.min(window.innerWidth/2-160, window.innerWidth-340)+'px';
  d.style.top  = Math.max(40, window.innerHeight/2-100)+'px';
  document.getElementById('chat-input').focus();
}
function closeChat(){
  document.getElementById('chat-dialog').style.display='none';
  document.getElementById('chat-input').value='';
}
function submitChat(){
  const txt = document.getElementById('chat-input').value.trim();
  if(!txt) return;
  closeChat();
  setPose('peek');
  const reply = DUMMY_REPLIES[Math.floor(Math.random()*DUMMY_REPLIES.length)];
  showBubble(reply, 8000);
  setTimeout(()=>setPose('idle_sleepy'), 3000);
}
document.getElementById('chat-input').addEventListener('keydown', e=>{
  if(e.key==='Enter') submitChat();
  if(e.key==='Escape') closeChat();
});

// Chat dialog drag
let cdrag=false, cdx=0, cdy=0;
document.getElementById('chat-title').addEventListener('mousedown', e=>{
  cdrag=true;
  const d=document.getElementById('chat-dialog');
  cdx=e.clientX-d.offsetLeft; cdy=e.clientY-d.offsetTop;
});
document.addEventListener('mousemove', e=>{ if(!cdrag) return;
  const d=document.getElementById('chat-dialog');
  d.style.left=Math.max(0,e.clientX-cdx)+'px';
  d.style.top =Math.max(0,e.clientY-cdy)+'px';
});
document.addEventListener('mouseup', ()=>cdrag=false);

// Quit
function quit(){
  setPose('surprised');
  showBubble('เมี๊ยว… ลาก่อนนะ!', 3000);
  setTimeout(()=>{ catWrap.style.transition='opacity 1s'; catWrap.style.opacity='0'; },1500);
}

// Idle animation
function scheduleIdle(){
  idleTimer = setTimeout(()=>{
    if(!drag && document.getElementById('chat-dialog').style.display==='none'){
      const p = IDLE_POOL[Math.floor(Math.random()*IDLE_POOL.length)];
      setPose(p);
    }
    scheduleIdle();
  }, 8000 + Math.random()*6000);
}

// Clock
function updateClock(){
  const n=new Date();
  document.getElementById('taskbar-clock').textContent =
    n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
}
updateClock(); setInterval(updateClock,10000);

// Boot
setPose('idle_sleepy');
scheduleIdle();
showBubble('สวัสดีค่ะ~ โปสตี้ยินดีที่ได้รู้จัก!', 5000);
</script>
