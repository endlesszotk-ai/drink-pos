<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Drink POS &amp; BOM — Sprint 8</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f8fafc;--card:#ffffff;--txt:#0f172a;--muted:#64748b;
  --border:#e2e8f0;--gold:#b45309;--gold-h:#92400e;--gold-l:#fef3c7;
  --green:#059669;--red:#e11d48;--violet:#6d28d9;--blue:#2563eb;
  --gold-mid:#d97706;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;overscroll-behavior:none}
@keyframes slideIn{from{transform:translateX(60px);opacity:0}to{transform:none;opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-8px)}50%{transform:translateX(8px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── TOAST ── */
.toast{position:fixed;top:20px;right:20px;z-index:9999;padding:12px 20px;border-radius:12px;font-weight:700;font-size:.9rem;display:flex;align-items:center;gap:8px;box-shadow:0 8px 30px rgba(0,0,0,.15);animation:slideIn .25s ease;max-width:320px}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:20px;width:100%;max-width:500px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border)}
.modal-body{overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:14px}

/* ── FORM ── */
.inp{background:#f8fafc;border:1.5px solid var(--border);color:var(--txt);border-radius:10px;padding:10px 14px;font-size:.875rem;width:100%;outline:none;transition:border-color .15s,box-shadow .15s;font-family:inherit}
.inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(217,119,6,.12)}
select.inp{cursor:pointer}
textarea.inp{resize:vertical;min-height:70px}
.field{display:flex;flex-direction:column;gap:5px}
.field>label{font-size:.75rem;font-weight:700;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-weight:700;border-radius:10px;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;font-size:.875rem;font-family:inherit}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.btn-primary{background:linear-gradient(135deg,var(--gold-mid),var(--gold));color:#fff;padding:10px 18px;min-height:42px;box-shadow:0 2px 8px rgba(180,83,9,.2)}
.btn-primary:hover{background:linear-gradient(135deg,var(--gold),var(--gold-h));box-shadow:0 4px 14px rgba(180,83,9,.3)}
.btn-ghost{background:#f1f5f9;color:var(--txt);padding:10px 18px;min-height:42px}
.btn-ghost:hover{background:#e2e8f0}
.btn-emerald{background:var(--green);color:#fff;padding:10px 18px;min-height:42px}
.btn-emerald:hover{background:#047857}
.btn-danger{background:#fff1f2;color:var(--red);padding:10px 18px;min-height:42px;border:1px solid #fecdd3}
.btn-danger:hover{background:#ffe4e6}
.btn-violet{background:#f5f3ff;color:var(--violet);padding:10px 18px;min-height:42px;border:1px solid #ddd6fe}
.btn-violet:hover{background:#ede9fe}
.btn-sm{padding:5px 12px;font-size:.78rem;min-height:30px;border-radius:8px}
.btn-xs{padding:3px 10px;font-size:.72rem;min-height:26px;border-radius:6px}

/* ── CARD ── */
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04)}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);font-weight:800;color:var(--txt);gap:8px;font-size:.925rem;letter-spacing:-.01em}
.card-body{padding:18px}

/* ── BADGE ── */
.badge{display:inline-block;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap}
.b-amber{background:#fef3c7;color:#92400e}
.b-violet{background:#f3e8ff;color:#5b21b6}
.b-rose{background:#ffe4e6;color:#be123c}
.b-green{background:#d1fae5;color:#065f46}
.b-slate{background:#f1f5f9;color:#475569}
.b-blue{background:#dbeafe;color:#1e40af}
.b-gold{background:var(--gold-l);color:var(--gold-h)}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:.875rem}
th{background:#f8fafc;color:var(--muted);font-size:.72rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:10px 14px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:#fafafa}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:24px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid #cbd5e1;background:transparent;transition:all .18s}
.pin-dot.on{background:var(--gold);border-color:var(--gold);transform:scale(1.2)}
.pin-dot.err{background:var(--red);border-color:var(--red)}
.pin-shake{animation:shake .4s ease}
.np-btn{background:var(--card);border:1.5px solid var(--border);color:var(--txt);font-size:1.5rem;font-weight:700;border-radius:14px;padding:0;min-height:68px;cursor:pointer;transition:all .1s;user-select:none;box-shadow:0 2px 6px rgba(0,0,0,.06);width:100%;touch-action:manipulation}
.np-btn:active{background:var(--gold);color:#fff;border-color:var(--gold);transform:scale(.93)}
.np-clear{color:var(--red);border-color:#fecdd3;background:#fff1f2}
.np-back{color:var(--muted)}

/* ── LOADING ── */
#loading-overlay{position:fixed;inset:0;background:rgba(248,250,252,.95);backdrop-filter:blur(4px);z-index:9998;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--gold);font-weight:700}
.loader{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}

/* ── APP LAYOUT ── */
#app{display:none;height:100dvh;width:100vw;flex-direction:row;overflow:hidden}
#sidebar{display:flex;flex-direction:column;background:var(--card);border-right:1px solid var(--border);width:64px;flex-shrink:0;z-index:10;box-shadow:1px 0 8px rgba(0,0,0,.04)}
#sidebar-logo{height:64px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.5rem}
#sidebar-nav{flex:1;padding:8px;display:flex;flex-direction:column;gap:6px;overflow-y:auto}
.nav-btn{width:100%;display:flex;align-items:center;justify-content:center;padding:11px;border-radius:12px;border:none;cursor:pointer;font-size:1.25rem;transition:all .15s;background:transparent;color:var(--muted)}
.nav-btn:hover{background:#f8fafc;color:var(--txt)}
.nav-btn.active{background:var(--gold-l);color:var(--gold);border-left:3px solid var(--gold);border-radius:0 10px 10px 0;margin-left:-8px;padding-left:11px}
#sidebar-foot{padding:8px;border-top:1px solid var(--border)}
#content-col{flex:1;display:flex;flex-direction:column;min-width:0;height:100%;overflow:hidden}
#app-header{height:64px;flex-shrink:0;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;justify-content:space-between;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
#app-header-title{font-weight:900;font-size:1.1rem;letter-spacing:-.02em;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#app-main{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px;padding-bottom:80px}

/* ── HEADER CHIPS ── */
.hchip{font-size:.7rem;font-weight:700;padding:4px 10px;border-radius:999px;white-space:nowrap;cursor:pointer}
.hchip-green{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}
.hchip-slate{background:#f1f5f9;color:#475569;border:1px solid var(--border)}
.hchip-gold{background:var(--gold-l);color:var(--gold-h);border:1px solid #fde68a}

/* ── PAY CHIPS ── */
.pay-opt{flex:1;padding:9px 4px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;text-align:center;font-size:.72rem;font-weight:700;transition:all .15s;min-height:44px;display:flex;align-items:center;justify-content:center}
.pay-opt.on{border-color:var(--gold);background:var(--gold-l);color:var(--gold-h)}

/* ── SHIFT BANNER ── */
.shift-banner{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-radius:12px;font-size:.875rem;font-weight:800}
.s-open{background:#ecfdf5;border:1.5px solid #6ee7b7;color:#065f46}
.s-closed{background:#f8fafc;border:1.5px solid var(--border);color:var(--muted)}

/* ── MEMBER CARD ── */
.member-box{background:#ecfdf5;border:1.5px solid #a7f3d0;border-radius:12px;padding:14px}
.member-box.not-found{background:#fff7ed;border-color:#fed7aa}

/* ── RECEIPT PRINT ── */
#rp{display:none}
@media print{
  body>*{display:none!important}
  #rp{display:block!important;width:80mm;margin:0 auto;font-family:'Courier New',monospace;font-size:12px;color:#000;background:#fff;padding:8px 4px}
  #rp *{color:#000!important;background:none!important}
  @page{size:80mm auto;margin:4mm 2mm}
}
.rr{display:flex;justify-content:space-between;font-size:11px;margin:2px 0}
.rr.bold{font-weight:700;font-size:13px;margin:4px 0}
.rdv{border:none;border-top:1px dashed #000;margin:6px 0}
.rshop{font-size:16px;font-weight:700;text-align:center;margin-bottom:2px}
.raddr{font-size:10px;text-align:center;margin-bottom:4px;line-height:1.5}
.rfoot{text-align:center;font-size:10px;margin-top:8px;line-height:1.7}
.ron{font-size:11px;text-align:center;font-weight:700;margin-bottom:4px}
.kt{font-size:20px;font-weight:700;text-align:center;letter-spacing:3px;margin:4px 0}
.ki{font-size:14px;font-weight:700;padding:4px 0;border-bottom:1px dashed #000}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div style="font-size:3.5rem;line-height:1;margin-bottom:4px">🧋</div>
  <div style="text-align:center">
    <p style="font-size:1.5rem;font-weight:900;color:var(--txt);margin:0 0 4px;letter-spacing:-.02em">Drink POS</p>
    <p style="font-size:.875rem;color:var(--muted)">กรุณากรอก PIN เพื่อเข้าระบบ</p>
  </div>
  <div id="pin-dots" style="display:flex;gap:18px">
    <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
  </div>
  <p id="pin-err" style="color:var(--red);font-size:.85rem;min-height:20px;font-weight:700;text-align:center"></p>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:280px">
    <button class="np-btn" onclick="window.numpad(1)">1</button>
    <button class="np-btn" onclick="window.numpad(2)">2</button>
    <button class="np-btn" onclick="window.numpad(3)">3</button>
    <button class="np-btn" onclick="window.numpad(4)">4</button>
    <button class="np-btn" onclick="window.numpad(5)">5</button>
    <button class="np-btn" onclick="window.numpad(6)">6</button>
    <button class="np-btn" onclick="window.numpad(7)">7</button>
    <button class="np-btn" onclick="window.numpad(8)">8</button>
    <button class="np-btn" onclick="window.numpad(9)">9</button>
    <button class="np-btn np-clear" onclick="window.numpadClear()">C</button>
    <button class="np-btn" onclick="window.numpad(0)">0</button>
    <button class="np-btn np-back" onclick="window.numpadBack()">&#9003;</button>
  </div>
  <p style="color:#cbd5e1;font-size:.72rem">Demo: Admin=1234 · Cashier=0001</p>
</div>

<!-- LOADING -->
<div id="loading-overlay"><div class="loader"></div><p>กำลังโหลดข้อมูล...</p></div>

<!-- RECEIPT PRINT AREA -->
<div id="rp"></div>

<!-- APP -->
<div id="app">
  <aside id="sidebar">
    <div id="sidebar-logo">🧋</div>
    <nav id="sidebar-nav"></nav>
    <div id="sidebar-foot">
      <button class="nav-btn" title="ออกจากระบบ" onclick="window.doLogout()" onmouseover="this.style.color='var(--red)';this.style.background='#fff1f2'" onmouseout="this.style.color='var(--muted)';this.style.background='transparent'">🚪</button>
    </div>
  </aside>
  <div id="content-col">
    <header id="app-header">
      <span id="app-header-title"></span>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        <span id="hchip-shift" class="hchip hchip-slate" style="display:none"></span>
        <span id="hchip-staff" class="hchip hchip-gold" style="display:none;cursor:pointer" onclick="window.doLogout()"></span>
        <span class="hchip hchip-green">✓ Cloud</span>
      </div>
    </header>
    <main id="app-main"></main>
  </div>
</div>

<div id="toast-el" class="toast" style="display:none"></div>
<div id="modal-root"></div>
<script>
/* ════ SUPABASE ════ */
var SB=window.supabase.createClient(
  'https://bxxnockrzvvmwwpjabve.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4eG5vY2tyenZ2bXd3cGphYnZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNzMyOTMsImV4cCI6MjA5NDY0OTI5M30.lbHiUdTEhqxkH9EZUkNhHODo_PxfcTDwNaqG1pJvN90'
);

/* ════ CONSTANTS ════ */
var POINTS_RATE=50;   // ทุก 50 บาท = 1 แต้ม
var POINT_VAL=1;      // 1 แต้ม = 1 บาท
var MAX_PT_PCT=0.30;  // ใช้แต้มได้สูงสุด 30% ของยอด

var DEF_SETTINGS={
  shopName:'ร้านชาไทย',logoUrl:'',
  address:'123 ถนนตัวอย่าง กรุงเทพฯ\nโทร 02-xxx-xxxx',
  footer:'ขอบคุณที่ใช้บริการ 🙏',
  autoPrint:true,paper:'80mm'
};
function loadS(){try{return Object.assign({},DEF_SETTINGS,JSON.parse(localStorage.getItem('pos_s')||'{}'))}catch(e){return Object.assign({},DEF_SETTINGS)}}
function saveS(o){localStorage.setItem('pos_s',JSON.stringify(o))}

var UNIT_FAM={
  'กรัม':[{n:'กรัม',m:1},{n:'กิโลกรัม',m:1000}],
  'มล.':[{n:'มล.',m:1},{n:'ลิตร',m:1000}],
  'ชิ้น':[{n:'ชิ้น',m:1},{n:'แพ็ค(50)',m:50},{n:'แพ็ค(100)',m:100}]
};
var PM=[
  {id:'cash',lb:'💵 เงินสด'},
  {id:'qr',lb:'📱 QR/โอน'},
  {id:'card',lb:'💳 บัตร'},
  {id:'platform',lb:'🛵 Platform'}
];
var ALL_PAGES=[
  {id:'dashboard',lb:'Dashboard',ic:'⊞',roles:['admin']},
  {id:'pos',lb:'POS',ic:'🖥',roles:['admin','cashier']},
  {id:'shift',lb:'รอบการขาย',ic:'🔄',roles:['admin','cashier']},
  {id:'stock',lb:'สต็อก',ic:'📦',roles:['admin']},
  {id:'stock_adj',lb:'ประวัติสต็อก',ic:'📋',roles:['admin']},
  {id:'recipe',lb:'สูตร',ic:'🍹',roles:['admin']},
  {id:'settings',lb:'ตั้งค่า',ic:'⚙️',roles:['admin']}
];

/* ════ STATE ════ */
var S={
  page:'pos', staff:null, staffList:[],
  ings:[], wips:[], recipes:[], adjs:[], orders:[],
  platforms:[], platPrices:[], shift:null, shifts:[],
  orderType:'storefront', platId:null, payMethod:'cash',
  cart:[], gpPct:0, adsDsc:0,
  recipeTab:'menu', recipeId:null, wipId:null,
  member:null, memberPhone:'', memberNotFound:false, ptsUse:0,
  extraDsc:0, extraDscReason:'', showDscForm:false,
  settings:loadS()
};

/* ════ LOGIN ════ */
var _pin='';
window.numpad=function(d){
  if(_pin.length>=4)return;
  _pin+=String(d);
  _updPin();
  if(_pin.length===4)setTimeout(_tryLogin,80);
};
window.numpadBack=function(){_pin=_pin.slice(0,-1);_updPin()};
window.numpadClear=function(){_pin='';_updPin();$('pin-err').textContent=''};

function _updPin(){
  for(var i=0;i<4;i++){
    var d=$('pd'+i);
    d.className='pin-dot'+(i<_pin.length?' on':'');
  }
}

async function _tryLogin(){
  $('pin-err').textContent='';
  try{
    var r=await SB.from('staff').select('*').eq('pin',_pin).eq('active',true).limit(1);
    if(r.data&&r.data.length>0){
      S.staff=r.data[0];
      _pin='';_updPin();
      $('loading-overlay').style.display='flex';
      $('login-screen').style.display='none';
      await fetchAll();
      $('loading-overlay').style.display='none';
      $('app').style.display='flex';
      _updateHeaderChips();
      navigate(S.staff.role==='cashier'?'pos':'dashboard');
    }else{
      _pin='';_updPin();
      $('pin-err').textContent='PIN ไม่ถูกต้อง';
      var dots=$('pin-dots');
      dots.classList.add('pin-shake');
      Array.from(dots.children).forEach(function(d){d.classList.add('err')});
      setTimeout(function(){
        dots.classList.remove('pin-shake');
        Array.from(dots.children).forEach(function(d){d.className='pin-dot'});
      },500);
    }
  }catch(e){
    _pin='';_updPin();
    $('pin-err').textContent='ไม่สามารถเชื่อมต่อได้';
  }
}

window.doLogout=function(){
  if(!confirm('ออกจากระบบ?'))return;
  S.staff=null;S.cart=[];S.member=null;S.memberPhone='';
  S.memberNotFound=false;S.ptsUse=0;S.extraDsc=0;S.extraDscReason='';
  S.showDscForm=false;S.payMethod='cash';
  $('app').style.display='none';
  $('login-screen').style.display='flex';
  _pin='';_updPin();$('pin-err').textContent='';
};

/* ════ CLOUD DATA ════ */
async function fetchAll(){
  try{
    var isAdmin=S.staff&&S.staff.role==='admin';
    var qs=[
      SB.from('ingredients').select('*').order('name'),
      SB.from('recipes').select('*').order('name'),
      SB.from('recipe_lines').select('*'),
      SB.from('orders').select('*').order('created_at',{ascending:false}).limit(300),
      SB.from('adjustments').select('*').order('created_at',{ascending:false}).limit(200),
      SB.from('platforms').select('*').order('id'),
      SB.from('platform_prices').select('*'),
      SB.from('shifts').select('*').order('opened_at',{ascending:false}).limit(60),
      SB.from('wip_formulas').select('*')
    ];
    if(isAdmin)qs.push(SB.from('staff').select('*').order('id'));
    var res=await Promise.all(qs);
    var r1=res[0],r2=res[1],r3=res[2],r4=res[3],r5=res[4],
        r6=res[5],r7=res[6],r8=res[7],r9=res[8];

    S.ings=(r1.data||[]).map(function(i){
      return{id:i.id,name:i.name,type:i.type,unit:i.unit,
             stock:+i.stock,cpu:+i.cost_per_unit,
             minStock:+i.min_stock,ypb:+(i.yield_per_batch||1)};
    });
    S.wips=(r9.data||[]).map(function(x){
      return{id:x.id,wipId:x.wip_ing_id,rawId:x.raw_ing_id,qty:+x.qty};
    });
    S.recipes=(r2.data||[]).map(function(r){
      return{id:r.id,name:r.name,price:+r.price,
             lines:(r3.data||[]).filter(function(l){return l.recipe_id===r.id})
                   .map(function(l){return{ingId:l.ingredient_id,qty:+l.qty}})};
    });
    if(S.recipes.length&&!S.recipeId)S.recipeId=S.recipes[0].id;
    var wipIngs=S.ings.filter(function(i){return i.type==='WIP/เบส'});
    if(wipIngs.length&&!S.wipId)S.wipId=wipIngs[0].id;

    S.orders=(r4.data||[]).map(function(o){
      return{

/* ════ DOM BUILDER ════ */
function el(tag,props){
  var e=document.createElement(tag);
  if(props)Object.keys(props).forEach(function(k){
    var v=props[k];
    if(k==='cls')e.className=v;
    else if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k==='html')e.innerHTML=v;
    else if(k==='txt')e.textContent=v;
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else try{e.setAttribute(k,v)}catch(x){}
  });
  for(var i=2;i<arguments.length;i++){
    var c=arguments[i];
    if(c==null||c===false)continue;
    e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c);
  }
  return e;
}
function mkF(label,inp,req){return el('div',{cls:'field'},el('label',{txt:label+(req?'*':'')}),inp)}
function mkI(o){
  var e=document.createElement('input');e.className='inp';
  if(o){
    if(o.type)e.type=o.type;
    if(o.pl)e.placeholder=o.pl;
    if(o.val!=null)e.value=o.val;
    if(o.st)Object.assign(e.style,o.st);
    if(o.ml)e.maxLength=o.ml;
    if(o.min!=null)e.min=o.min;
    if(o.max!=null)e.max=o.max;
    if(o.step)e.step=o.step;
  }
  return e;
}
function mkSel(opts,val,onCh){
  var e=document.createElement('select');e.className='inp';
  opts.forEach(function(o){
    var op=document.createElement('option');
    op.value=o.v!=null?o.v:o.l;op.textContent=o.l;
    if(String(o.v!=null?o.v:o.l)===String(val))op.selected=true;
    e.appendChild(op);
  });
  if(onCh)e.addEventListener('change',onCh);
  return e;
}

  ft.appendChild(ckBtn);

    onClick:function(){printK({type:S.orderType,items:S.cart.map(function(i){return i.name+' x'+i.qty}).join(', ')})}}));

  rCol.appendChild(cartCard);

/* ── Member Section ── */
function mkMemberSection(gross){
  var wrap=el('div',{style:{background:'#ecfdf5',border:'1.5px solid #a7f3d0',borderRadius:'12px',padding:'12px',display:'flex',flexDirection:'column',gap:'8px'}});
  wrap.appendChild(el('p',{txt:'👤 สมาชิก & แต้มสะสม',style:{color:'#065f46',fontWeight:800,margin:0,fontSize:'.82rem'}}));

  if(S.member){
    var m=S.member;
    wrap.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
      el('div',{},
        el('p',{txt:'✅ '+m.name,style:{color:'#065f46',fontWeight:800,margin:'0 0 2px',fontSize:'.9rem'}}),
        el('p',{txt:'📱 '+(m.phone||''),style:{color:'#059669',fontSize:'.78rem',margin:0}})
      ),
      el('div',{style:{textAlign:'right'}},
        el('p',{txt:(m.points||0)+' แต้ม',style:{color:'#059669',fontWeight:800,fontSize:'1.1rem',margin:0}}),
        el('button',{cls:'btn btn-ghost btn-xs',txt:'✕ เปลี่ยน',style:{marginTop:'4px'},
          onClick:function(){S.member=null;S.memberPhone='';S.memberNotFound=false;S.ptsUse=0;render()}})
      )
    ));
    // Points slider
    var pts=m.points||0;
    if(pts>0&&gross>0){
      var maxPts=Math.min(pts,Math.floor(gross*MAX_PT_PCT));
      if(maxPts>0){
        var pb=el('div',{style:{background:'#d1fae5',borderRadius:'8px',padding:'8px',display:'flex',flexDirection:'column',gap:'5px'}});
        var pLbl=el('span',{txt:S.ptsUse+' แต้ม = -฿'+(S.ptsUse*POINT_VAL),style:{color:'#4f46e5',fontWeight:700,fontSize:'.78rem'}});
        pb.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'.78rem',alignItems:'center'}},
          el('span',{txt:'ใช้แต้มลดราคา (max '+maxPts+')',style:{color:'var(--muted)'}}),pLbl));
        var slider=el('input',{type:'range',min:'0',max:String(maxPts),value:String(S.ptsUse),style:{width:'100%',accentColor:'#4f46e5'}});
        slider.addEventListener('input',function(e){
          S.ptsUse=+e.target.value;
          pLbl.textContent=S.ptsUse+' แต้ม = -฿'+(S.ptsUse*POINT_VAL);
          render();
        });
        pb.appendChild(slider);wrap.appendChild(pb);
      }
    }
  }else{
    var sRow=el('div',{style:{display:'flex',gap:'6px'}});
    var ph=mkI({type:'tel',pl:'เบอร์โทรลูกค้า...',val:S.memberPhone});
    ph.addEventListener('input',function(e){S.memberPhone=e.target.value});
    ph.addEventListener('keydown',function(e){if(e.key==='Enter')searchMember(S.memberPhone)});
    sRow.appendChild(ph);
    sRow.appendChild(el('button',{cls:'btn btn-emerald btn-sm',txt:'ค้นหา',style:{flexShrink:0},
      onClick:function(){searchMember(S.memberPhone)}}));
    wrap.appendChild(sRow);
    if(S.memberNotFound&&S.memberPhone){
      wrap.appendChild(el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',background:'#fff1f2',borderRadius:'8px',padding:'8px 12px'}},
        el('p',{txt:'ไม่พบเบอร์นี้',style:{color:'var(--red)',fontSize:'.8rem',margin:0,fontWeight:700}}),
        el('button',{cls:'btn btn-primary btn-sm',txt:'+ สมัครใหม่',onClick:function(){openRegisterMember(S.memberPhone)}})
      ));
    }
    wrap.appendChild(el('p',{txt:'(ข้ามได้ถ้าไม่ใช้สมาชิก)',style:{color:'#94a3b8',fontSize:'.72rem',textAlign:'center',margin:0}}));
  }
  return wrap;
}

async function searchMember(phone){
  phone=(phone||'').trim();
  if(phone.length<6)return toast('กรุณากรอกเบอร์อย่างน้อย 6 หลัก','#e11d48');
  var r=await SB.from('members').select('*').eq('phone',phone).limit(1);
  if(r.data&&r.data.length>0){S.member=r.data[0];S.memberNotFound=false;}
  else{S.member=null;S.memberNotFound=true;}
  S.ptsUse=0;render();
}

function openRegisterMember(phone){
  var nI=mkI({pl:'ชื่อ-นามสกุล'});
  var btn=el('button',{cls:'btn btn-primary',txt:'สมัครสมาชิก',style:{width:'100%'},
    onClick:async function(){
      if(!nI.value.trim())return toast('กรุณากรอกชื่อ');
      this.disabled=true;
      var r=await SB.from('members').insert([{phone:phone,name:nI.value.trim(),points:0,total_spent:0}]).select();
      if(r.data&&r.data.length>0){S.member=r.data[0];S.memberNotFound=false;}
      closeModal();toast('✓ สมัครสมาชิกสำเร็จ');render();
    }
  });
  openModal('สมัครสมาชิกใหม่',el('div',{style:{display:'flex',flexDirection:'column',gap:'14px'}},
    mkF('เบอร์โทร',mkI({val:phone,st:{background:'#f8fafc',color:'var(--muted)'}})),
    mkF('ชื่อ-นามสกุล',nI,true),btn));
}

/* ── Cart Actions ── */
function addCart(r,overridePrice){
  var price=overridePrice!=null?overridePrice:r.price;
  var ex=S.cart.find(function(i){return i.id===r.id});
  if(ex)S.cart=S.cart.map(function(i){return i.id===r.id?Object.assign({},i,{qty:i.qty+1,price:price}):i});
  else S.cart=S.cart.concat([Object.assign({},r,{qty:1,price:price})]);
  render();
}
function updQty(id,delta){
  S.cart=S.cart.map(function(i){return i.id===id?Object.assign({},i,{qty:Math.max(0,i.qty+delta)}):i})
              .filter(function(i){return i.qty>0});
  render();
}

/* ── CHECKOUT ── */
async function doCheckout(e,gross,net){
  if(!S.cart.length)return;
  var btn=e.currentTarget;btn.disabled=true;btn.textContent='กำลังบันทึก...';
  var stockDed={},cogs=0;
  S.cart.forEach(function(ci){
    var r=S.recipes.find(function(x){return x.id===ci.id});
    if(r){cogs+=recipeCost(r.lines)*ci.qty;r.lines.forEach(function(l){stockDed[l.ingId]=(stockDed[l.ingId]||0)+(l.qty*ci.qty)});}
  });
  try{
    var items=S.cart.map(function(i){return i.name+' x'+i.qty}).join(', ');
    var ptsEarned=S.member?Math.floor(gross/POINTS_RATE):0;
    var ptsUsed=S.member?S.ptsUse:0;

    // Insert order — total = netRevenue (as per SQL View using o.total)
    var r=await SB.from('orders').insert([{
      type:S.orderType,
      items:items,
      total:net,          // v_shift_summary uses o.total
      gross:gross,
      net:net,
      cogs:cogs,
      gp_percent:S.gpPct,
      ads_discount:S.adsDsc,
      payment_method:S.payMethod,
      shift_id:S.shift?S.shift.id:null,
      staff_id:S.staff?S.staff.id:null,
      member_id:S.member?S.member.id:null,
      platform_id:S.orderType==='delivery'&&S.platId?S.platId:null,
      points_earned:ptsEarned,
      points_used:ptsUsed,
      discount_amount:(S.extraDsc||0)+(ptsUsed*POINT_VAL),
      discount_reason:S.extraDscReason||null
    }]);
    if(r.error)throw r.error;

    // Deduct stock
    for(var i=0;i<S.ings.length;i++){
      var ing=S.ings[i];
      if(stockDed[ing.id])await SB.from('ingredients').update({stock:Math.max(0,ing.stock-stockDed[ing.id])}).eq('id',ing.id);
    }

    // Update member points + tier
    var newMemberPts=null;
    if(S.member){
      newMemberPts=Math.max(0,(S.member.points||0)+ptsEarned-ptsUsed);
      var newTotalSpent=(S.member.total_spent||0)+net;
      var newTier='bronze';
      if(newTotalSpent>=50000)newTier='platinum';
      else if(newTotalSpent>=20000)newTier='gold';
      else if(newTotalSpent>=5000)newTier='silver';
      await SB.from('members').update({
        points:newMemberPts,
        total_spent:newTotalSpent,
        tier:newTier,
        last_visit:new Date().toISOString()
      }).eq('id',S.member.id);
    }

    var snap={type:S.orderType,items:items,gross:gross,net:net,total:net,gpPct:S.gpPct,
              payMethod:S.payMethod,staffName:S.staff?S.staff.name:null,
              memberName:S.member?S.member.name:null,memberPts:newMemberPts,
              ptsEarned:ptsEarned,ptsUsed:ptsUsed,dscAmt:S.extraDsc,dscReason:S.extraDscReason};
    Object.assign(S,{cart:[],adsDsc:0,extraDsc:0,extraDscReason:'',ptsUse:0,
                     member:null,memberPhone:'',memberNotFound:false,showDscForm:false});
    if(S.settings.autoPrint)printR(snap);
    toast('✓ บันทึกสำเร็จ'+(ptsEarned>0?' 🌟 +'+ptsEarned+' แต้ม':''));
    await reload();
  }catch(err){
    console.error(err);alert('Error: '+(err.message||err));
    btn.disabled=false;btn.textContent='✅ ยืนยันคำสั่งซื้อ';
  }

/* ════ PRODUCE WIP ════ */
function modalProduceWIP(forceWipId){
  var f={wipId:forceWipId||'',batches:1,actualYield:0};
  var wrap=el('div',{style:{display:'flex',flexDirection:'column',gap:'14px'}});
  var extra=el('div',{style:{display:'flex',flexDirection:'column',gap:'12px'}});

  function buildProdExtra(){
    extra.innerHTML='';
    var wipIng=S.ings.find(function(i){return i.id===+f.wipId});
    if(!wipIng)return;
    var fmls=S.wips.filter(function(fm){return fm.wipId===wipIng.id});
    if(!fmls.length){
      extra.appendChild(el('p',{txt:'⚠️ ยังไม่ได้ผูกวัตถุดิบในเบสนี้ — กรุณาไปผูกสูตรก่อน',style:{color:'var(--red)',fontWeight:700,background:'#fff1f2',padding:'12px',borderRadius:'8px'}}));
      return;
    }

    var bI=mkI({type:'number',val:'1',min:'1',st:{fontSize:'1rem'}});
    var yI=mkI({type:'number',val:String(wipIng.ypb),st:{fontSize:'1rem'}});

    function recalc(){
      var b=+bI.value||1;
      yI.value=wipIng.ypb*b;
      f.batches=b;f.actualYield=+yI.value;
      // Update preview
      fmls.forEach(function(fm,idx){
        var raw=S.ings.find(function(i){return i.id===fm.rawId});if(!raw)return;
        var useQty=fm.qty*b;
        var row=pv.children[idx+1];
        if(row){
          var span=row.querySelector('.use-qty');
          if(span)span.textContent=useQty+' '+raw.unit+' (เหลือ '+(raw.stock-useQty).toFixed(2)+')';
          if(span)span.style.color=raw.stock>=useQty?'var(--green)':'var(--red)';
        }
      });
    }
    bI.addEventListener('input',recalc);
    yI.addEventListener('input',function(e){f.actualYield=+e.target.value});

    // Preview box
    var pv=el('div',{style:{background:'#fefce8',border:'1px solid #fde68a',borderRadius:'10px',padding:'12px',display:'flex',flexDirection:'column',gap:'5px'}});
    pv.appendChild(el('p',{txt:'รายการที่จะตัดสต็อก (1 รอบ):',style:{fontWeight:800,color:'#92400e',margin:'0 0 4px'}}));
    fmls.forEach(function(fm){
      var raw=S.ings.find(function(i){return i.id===fm.rawId});if(!raw)return;
      var useQty=fm.qty*(+bI.value||1);
      pv.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'.875rem'}},
        el('span',{txt:raw.name}),
        el('span',{cls:'use-qty',txt:useQty+' '+raw.unit+' (เหลือ '+(raw.stock-useQty).toFixed(2)+')',
          style:{color:raw.stock>=useQty?'var(--green)':'var(--red)',fontWeight:700}})
      ));
    });

    extra.appendChild(el('div',{cls:'grid2'},mkF('จำนวนรอบที่ผลิต',bI,true),mkF('ปริมาณที่ได้จริง ('+wipIng.unit+')',yI,true)));
    extra.appendChild(pv);
    extra.appendChild(el('p',{txt:'*ตัดสต็อก Raw Material ตามสูตร × รอบ และคำนวณต้นทุนถัวเฉลี่ยใหม่อัตโนมัติ',style:{color:'var(--muted)',fontSize:'.78rem',margin:0}}));

    var cBtn=el('button',{cls:'btn btn-violet',txt:'✅ ยืนยันผลิตเบส',style:{width:'100%',padding:'13px',fontSize:'1rem',borderRadius:'12px'},
      onClick:async function(){
        if(f.actualYield<=0)return toast('ปริมาณที่ได้ต้องมากกว่า 0','#e11d48');
        this.disabled=true;this.textContent='กำลังตัดสต็อก...';
        try{
          var totalRawCost=0;
          for(var i2=0;i2<fmls.length;i2++){
            var fm=fmls[i2];
            var raw=S.ings.find(function(ri){return ri.id===fm.rawId});
            if(raw){
              var useQ=fm.qty*f.batches;
              totalRawCost+=(useQ*raw.cpu);
              await SB.from('ingredients').update({stock:Math.max(0,raw.stock-useQ)}).eq('id',raw.id);
            }
          }
          var newStock=wipIng.stock+f.actualYield;
          var newTotalCost=(wipIng.stock*wipIng.cpu)+totalRawCost;
          var newCPU=newStock>0?newTotalCost/newStock:0;
          await SB.from('ingredients').update({stock:newStock,cost_per_unit:newCPU}).eq('id',wipIng.id);
          await SB.from('adjustments').insert([{ingredient_id:wipIng.id,ing_name:wipIng.name,type:'Produce WIP',qty:f.actualYield,unit:wipIng.unit,reason:'ผลิต '+f.batches+' รอบ (ต้นทุน '+fmtC(totalRawCost)+')'}]);
          closeModal();toast('✓ ผลิตเบสสำเร็จ! CPUnit ใหม่: '+fmtC(newCPU));await reload();
        }catch(err){alert(err.message);this.disabled=false;this.textContent='✅ ยืนยันผลิตเบส'}
      }
    });
    extra.appendChild(cBtn);
  }

  if(forceWipId){
    var wi=S.ings.find(function(i){return i.id===forceWipId});
    if(wi)wrap.appendChild(el('p',{txt:'ผลิตเบส: '+wi.name,style:{fontWeight:900,color:'var(--txt)',fontSize:'1.05rem'}}));
    buildProdExtra();wrap.appendChild(extra);
  }else{
    var wipOpts=[{l:'-- เลือกเบส --',v:''}].concat(S.ings.filter(function(i){return i.type==='WIP/เบส'}).map(function(i){return{l:i.name,v:i.id}}));
    var ws=mkSel(wipOpts,'',function(e){f.wipId=e.target.value;buildProdExtra()});
    wrap.appendChild(mkF('เลือกเบสที่ต้องการผลิต',ws,true));
    wrap.appendChild(extra);
  }
  openModal('🍳 ผลิตเบสเข้าสต็อก',wrap,'540px');
}
