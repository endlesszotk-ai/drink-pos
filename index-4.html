<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Drink POS &amp; BOM — Sprint 8</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  /* ── Odama Design System ── */
  --bg:#ECEDEF;
  --card:#FFFFFF;
  --txt:#0A0A0A;
  --muted:#6B7280;
  --border:#E2E8F0;

  /* Primary / Accent */
  --gold:#FE5E37;
  --gold-h:#e04e2a;
  --gold-l:#fff0ec;
  --gold-mid:#FE5E37;

  /* Status */
  --green:#8AC389;
  --green-bg:#edf7ed;
  --red:#e11d48;
  --violet:#6d28d9;
  --blue:#2563eb;

  /* Sidebar */
  --sidebar-bg:#0A0A0A;
  --sidebar-icon:#6B7280;
  --sidebar-icon-active:#FFFFFF;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:var(--bg);
  color:var(--txt);
  font-family:'Inter',system-ui,sans-serif;
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
}

@keyframes slideIn{from{transform:translateX(60px);opacity:0}to{transform:none;opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-8px)}50%{transform:translateX(8px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── TOAST ── */
.toast{
  position:fixed;top:20px;right:20px;z-index:9999;
  padding:12px 20px;border-radius:14px;
  font-weight:600;font-size:.875rem;
  display:flex;align-items:center;gap:8px;
  box-shadow:0 8px 30px rgba(0,0,0,.12);
  animation:slideIn .25s ease;max-width:320px;
  font-family:'Inter',sans-serif;
}

/* ── MODAL ── */
.modal-bg{
  position:fixed;inset:0;
  background:rgba(10,10,10,.45);
  backdrop-filter:blur(6px);
  z-index:100;display:flex;
  align-items:center;justify-content:center;padding:16px;
}
.modal-box{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  width:100%;max-width:500px;max-height:90vh;
  display:flex;flex-direction:column;
  box-shadow:0 24px 64px rgba(0,0,0,.12);
}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 24px;border-bottom:1px solid var(--border);
  font-weight:700;font-size:.975rem;
}
.modal-body{overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:14px}

/* ── FORM ── */
.inp{
  background:#f8f9fa;
  border:1.5px solid var(--border);
  color:var(--txt);
  border-radius:10px;
  padding:10px 14px;
  font-size:.875rem;
  width:100%;outline:none;
  transition:border-color .15s,box-shadow .15s;
  font-family:'Inter',sans-serif;
}
.inp:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(254,94,55,.12);
  background:#fff;
}
select.inp{cursor:pointer}
textarea.inp{resize:vertical;min-height:70px}
.field{display:flex;flex-direction:column;gap:5px}
.field>label{
  font-size:.72rem;font-weight:700;
  color:var(--muted);letter-spacing:.05em;text-transform:uppercase;
}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  gap:6px;font-weight:600;border-radius:10px;cursor:pointer;border:none;
  transition:all .15s;white-space:nowrap;font-size:.875rem;
  font-family:'Inter',sans-serif;letter-spacing:-.01em;
}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}

.btn-primary{
  background:var(--gold);color:#fff;
  padding:10px 18px;min-height:42px;
  box-shadow:0 2px 8px rgba(254,94,55,.25);
}
.btn-primary:hover{
  background:var(--gold-h);
  box-shadow:0 4px 16px rgba(254,94,55,.35);
  transform:translateY(-1px);
}
.btn-primary:active{transform:translateY(0);box-shadow:0 1px 4px rgba(254,94,55,.2)}

.btn-ghost{
  background:#f4f5f7;color:var(--txt);
  padding:10px 18px;min-height:42px;
  border:1px solid var(--border);
}
.btn-ghost:hover{background:#ECEDEF}

.btn-emerald{
  background:var(--green);color:#fff;
  padding:10px 18px;min-height:42px;
  box-shadow:0 2px 8px rgba(138,195,137,.3);
}
.btn-emerald:hover{background:#7ab579;transform:translateY(-1px)}

.btn-danger{
  background:#fff1f2;color:var(--red);
  padding:10px 18px;min-height:42px;
  border:1px solid #fecdd3;
}
.btn-danger:hover{background:#ffe4e6}

.btn-violet{
  background:#f5f3ff;color:var(--violet);
  padding:10px 18px;min-height:42px;
  border:1px solid #ddd6fe;
}
.btn-violet:hover{background:#ede9fe}

.btn-sm{padding:5px 12px;font-size:.78rem;min-height:30px;border-radius:8px}
.btn-xs{padding:3px 10px;font-size:.72rem;min-height:26px;border-radius:6px}

/* ── CARD ── */
.card{
  background:var(--card);
  border-radius:14px;
  border:1px solid var(--border);
  overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,.04),0 4px 20px rgba(0,0,0,.04);
}
.card-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-bottom:1px solid var(--border);
  font-weight:700;color:var(--txt);
  gap:8px;font-size:.9rem;letter-spacing:-.01em;
}
.card-body{padding:18px}

/* ── BADGE ── */
.badge{
  display:inline-block;font-size:.68rem;font-weight:700;
  padding:3px 9px;border-radius:999px;white-space:nowrap;
  letter-spacing:.02em;
}
.b-amber{background:#fff0ec;color:#c04827}
.b-violet{background:#f3e8ff;color:#5b21b6}
.b-rose{background:#ffe4e6;color:#be123c}
.b-green{background:var(--green-bg);color:#2d7a2c}
.b-slate{background:#f4f5f7;color:#475569}
.b-blue{background:#dbeafe;color:#1e40af}
.b-gold{background:var(--gold-l);color:var(--gold-h)}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:.875rem}
th{
  background:#f8f9fa;color:var(--muted);
  font-size:.7rem;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;
  padding:10px 14px;text-align:left;
  border-bottom:1.5px solid var(--border);white-space:nowrap;
}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:#fafbfc}

/* ── LOGIN ── */
#login-screen{
  position:fixed;inset:0;z-index:200;
  background:var(--sidebar-bg);
  display:flex;
}
.pin-dot{
  width:12px;height:12px;border-radius:50%;
  border:2px solid #374151;background:transparent;
  transition:all .18s;
}
.pin-dot.on{
  background:var(--gold);border-color:var(--gold);
  transform:scale(1.3);
  box-shadow:0 0 0 4px rgba(254,94,55,.2);
}
.pin-dot.err{background:var(--red);border-color:var(--red)}
.pin-shake{animation:shake .4s ease}

.np-btn{
  background:#1a1a1a;
  border:1px solid #2d2d2d;
  color:#e5e7eb;
  font-size:1.3rem;font-weight:600;
  border-radius:12px;padding:0;min-height:62px;
  cursor:pointer;transition:all .12s;
  user-select:none;
  width:100%;touch-action:manipulation;
  font-family:'Inter',sans-serif;
}
.np-btn:hover{background:#222;border-color:#3d3d3d;color:#fff}
.np-btn:active{
  background:var(--gold);color:#fff;
  border-color:var(--gold);transform:scale(.93);
}
.np-clear{color:#FE5E37;border-color:#3d1a14;background:#1a0e0b}
.np-back{color:#6B7280}

/* ── LOADING ── */
#loading-overlay{
  position:fixed;inset:0;
  background:rgba(236,237,239,.95);
  backdrop-filter:blur(4px);
  z-index:9998;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  gap:16px;color:var(--gold);font-weight:600;
  font-family:'Inter',sans-serif;
}
.loader{
  width:40px;height:40px;
  border:3px solid var(--border);
  border-top-color:var(--gold);
  border-radius:50%;animation:spin 1s linear infinite;
}

/* ── APP LAYOUT ── */
#app{display:none;height:100dvh;width:100vw;flex-direction:row;overflow:hidden}

/* Black icon-only sidebar */
#sidebar{
  display:flex;flex-direction:column;
  background:var(--sidebar-bg);
  width:64px;flex-shrink:0;z-index:10;
}
#sidebar-logo{
  height:64px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;
  border-bottom:1px solid rgba(255,255,255,.08);
}
#sidebar-nav{
  flex:1;padding:10px 8px;
  display:flex;flex-direction:column;gap:4px;overflow-y:auto;
}
.nav-btn{
  width:100%;display:flex;align-items:center;justify-content:center;
  padding:12px;border-radius:10px;border:none;cursor:pointer;
  font-size:1.15rem;transition:all .15s;
  background:transparent;color:var(--sidebar-icon);
}
.nav-btn:hover{
  background:rgba(255,255,255,.08);
  color:#fff;
}
.nav-btn.active{
  background:var(--gold);color:#fff;
  border-radius:10px;
  margin-left:0;padding-left:12px;
  box-shadow:0 2px 12px rgba(254,94,55,.35);
}
#sidebar-foot{
  padding:10px 8px;
  border-top:1px solid rgba(255,255,255,.08);
}

#content-col{flex:1;display:flex;flex-direction:column;min-width:0;height:100%;overflow:hidden}

#app-header{
  height:60px;flex-shrink:0;
  background:var(--card);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 22px;
  justify-content:space-between;gap:12px;
  box-shadow:0 1px 0 rgba(0,0,0,.04);
}
#app-header-title{
  font-weight:800;font-size:1.05rem;
  letter-spacing:-.02em;flex:1;min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  color:var(--txt);
}

#app-main{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:22px;padding-bottom:80px;
  background:var(--bg);
}

/* ── HEADER CHIPS ── */
.hchip{
  font-size:.7rem;font-weight:600;
  padding:4px 11px;border-radius:999px;
  white-space:nowrap;cursor:pointer;
  letter-spacing:.01em;
}
.hchip-green{
  background:var(--green-bg);color:#2d7a2c;
  border:1px solid rgba(138,195,137,.4);
}
.hchip-slate{background:#f4f5f7;color:#475569;border:1px solid var(--border)}
.hchip-gold{background:var(--gold-l);color:var(--gold-h);border:1px solid rgba(254,94,55,.2)}

/* ── PAY CHIPS ── */
.pay-opt{
  flex:1;padding:9px 4px;border-radius:10px;
  border:1.5px solid var(--border);background:#f8f9fa;
  color:var(--muted);cursor:pointer;text-align:center;
  font-size:.72rem;font-weight:700;transition:all .15s;
  min-height:44px;display:flex;align-items:center;justify-content:center;
  font-family:'Inter',sans-serif;
}
.pay-opt.on{
  border-color:var(--gold);
  background:var(--gold-l);color:var(--gold);
  box-shadow:0 0 0 2px rgba(254,94,55,.12);
}

/* ── SHIFT BANNER ── */
.shift-banner{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-radius:12px;
  font-size:.875rem;font-weight:700;
}
.s-open{
  background:var(--green-bg);
  border:1.5px solid rgba(138,195,137,.5);
  color:#2d7a2c;
}
.s-closed{
  background:#f4f5f7;
  border:1.5px solid var(--border);color:var(--muted);
}

/* ── MEMBER CARD ── */
.member-box{
  background:var(--green-bg);
  border:1.5px solid rgba(138,195,137,.4);
  border-radius:12px;padding:14px;
}
.member-box.not-found{
  background:#fff7ed;border-color:#fed7aa;
}

/* ── SIDEBAR TOOLTIP ── */
.nav-btn{position:relative}
.nav-btn::after{
  content:attr(title);
  position:absolute;left:calc(100% + 10px);
  background:#1a1a1a;color:#fff;
  padding:5px 10px;border-radius:7px;
  font-size:.75rem;font-weight:600;
  white-space:nowrap;pointer-events:none;
  opacity:0;transform:translateX(-4px);
  transition:all .15s;z-index:50;
  font-family:'Inter',sans-serif;
  box-shadow:0 4px 12px rgba(0,0,0,.3);
}
.nav-btn:hover::after{opacity:1;transform:translateX(0)}

/* ── STATUS BADGES in table ── */
.status-available{color:#2d7a2c;background:var(--green-bg);padding:3px 10px;border-radius:999px;font-size:.72rem;font-weight:700}
.status-outofstock{color:#be123c;background:#ffe4e6;padding:3px 10px;border-radius:999px;font-size:.72rem;font-weight:700}
.status-active{color:#1e40af;background:#dbeafe;padding:3px 10px;border-radius:999px;font-size:.72rem;font-weight:700}

/* ── PRODUCT ADD BUTTON ── */
.btn-add-product{
  background:var(--gold);color:#fff;
  padding:8px 16px;border-radius:9px;
  font-weight:700;font-size:.82rem;
  border:none;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;
  font-family:'Inter',sans-serif;
  box-shadow:0 2px 8px rgba(254,94,55,.25);
}
.btn-add-product:hover{background:var(--gold-h);transform:translateY(-1px)}

/* ── SCROLLBAR styling ── */
#app-main::-webkit-scrollbar{width:5px}
#app-main::-webkit-scrollbar-track{background:transparent}
#app-main::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:99px}
#app-main::-webkit-scrollbar-thumb:hover{background:#9ca3af}

/* ── CART BODY scrollbar ── */
[style*="overflowY: auto"]::-webkit-scrollbar{width:4px}
[style*="overflowY: auto"]::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:99px}

/* ── SHIFT BANNER ── */
.shift-banner{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-radius:12px;
  font-size:.875rem;font-weight:700;
}
.s-open{
  background:var(--green-bg);
  border:1.5px solid rgba(138,195,137,.4);color:#2d7a2c;
}
.s-closed{background:#f4f5f7;border:1.5px solid var(--border);color:var(--muted)}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  #sidebar{width:54px}
  #app-main{padding:14px;padding-bottom:70px}
  #app-header{padding:0 14px}
  .grid2{grid-template-columns:1fr}
  #login-screen>div{flex-direction:column}
  #login-screen>div>div:first-child{display:none}
  #login-screen>div>div:last-child{min-height:100dvh}
}
#rp{display:none}
@media print{
  body>*{display:none!important}
  #rp{display:block!important;width:80mm;margin:0 auto;font-family:'Courier New',monospace;font-size:12px;color:#000;background:#fff;padding:8px 4px}
  #rp *{color:#000!important;background:none!important}
  @page{size:80mm auto;margin:4mm 2mm}
}
.rr{display:flex;justify-content:space-between;font-size:11px;margin:2px 0}
.rr.bold{font-weight:700;font-size:13px;margin:4px 0}
.rdv{border:none;border-top:1px dashed #000;margin:6px 0}
.rshop{font-size:16px;font-weight:700;text-align:center;margin-bottom:2px}
.raddr{font-size:10px;text-align:center;margin-bottom:4px;line-height:1.5}
.rfoot{text-align:center;font-size:10px;margin-top:8px;line-height:1.7}
.ron{font-size:11px;text-align:center;font-weight:700;margin-bottom:4px}
.kt{font-size:20px;font-weight:700;text-align:center;letter-spacing:3px;margin:4px 0}
.ki{font-size:14px;font-weight:700;padding:4px 0;border-bottom:1px dashed #000}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" style="background:var(--sidebar-bg)">
  <!-- Left brand panel -->
  <div style="position:absolute;inset:0;display:flex">
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px;border-right:1px solid rgba(255,255,255,.06)">
      <div style="font-size:4rem;line-height:1">🧋</div>
      <div style="text-align:center">
        <p style="font-size:2rem;font-weight:900;color:#fff;margin:0 0 8px;letter-spacing:-.03em">Drink POS</p>
        <p style="font-size:.875rem;color:#6B7280;line-height:1.6;max-width:220px">ระบบ POS และจัดการวัตถุดิบ<br>สำหรับร้านเครื่องดื่ม</p>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:16px;width:100%;max-width:200px">
        <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,255,255,.05);border-radius:10px;border:1px solid rgba(255,255,255,.08)">
          <span style="font-size:1.1rem">☁️</span><span style="color:#9CA3AF;font-size:.82rem;font-weight:500">Cloud Sync</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,255,255,.05);border-radius:10px;border:1px solid rgba(255,255,255,.08)">
          <span style="font-size:1.1rem">📊</span><span style="color:#9CA3AF;font-size:.82rem;font-weight:500">Real-time Dashboard</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,255,255,.05);border-radius:10px;border:1px solid rgba(255,255,255,.08)">
          <span style="font-size:1.1rem">🛵</span><span style="color:#9CA3AF;font-size:.82rem;font-weight:500">รองรับ Delivery</span>
        </div>
      </div>
    </div>
    <!-- Right PIN panel -->
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:40px;background:#111">
      <div style="text-align:center">
        <p style="font-size:1.1rem;font-weight:700;color:#fff;margin:0 0 4px">ยินดีต้อนรับ</p>

      <div id="pin-dots" style="display:flex;gap:16px">
        <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>

      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:260px">
        <button class="np-btn" onclick="window.numpad(1)">1</button>
        <button class="np-btn" onclick="window.numpad(2)">2</button>
        <button class="np-btn" onclick="window.numpad(3)">3</button>
        <button class="np-btn" onclick="window.numpad(4)">4</button>
        <button class="np-btn" onclick="window.numpad(5)">5</button>
        <button class="np-btn" onclick="window.numpad(6)">6</button>
        <button class="np-btn" onclick="window.numpad(7)">7</button>
        <button class="np-btn" onclick="window.numpad(8)">8</button>
        <button class="np-btn" onclick="window.numpad(9)">9</button>
        <button class="np-btn np-clear" onclick="window.numpadClear()">C</button>
        <button class="np-btn" onclick="window.numpad(0)">0</button>
        <button class="np-btn np-back" onclick="window.numpadBack()">&#9003;</button>
      </div>
      <p style="color:#374151;font-size:.72rem;margin-top:-8px">Demo: Admin=1234 · Cashier=0001</p>
    </div>
  </div>
</div>

<!-- LOADING -->
<div id="loading-overlay"><div class="loader"></div><p>กำลังโหลดข้อมูล...</p></div>

<!-- RECEIPT PRINT AREA -->
<div id="rp"></div>

<!-- APP -->
<div id="app">
  <aside id="sidebar">
    <div id="sidebar-logo" style="background:var(--sidebar-bg);border-bottom:1px solid rgba(255,255,255,.06)">
      <div style="width:36px;height:36px;background:var(--gold);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;box-shadow:0 2px 8px rgba(254,94,55,.4)">🧋</div>
    </div>
    <nav id="sidebar-nav"></nav>
    <div id="sidebar-foot">
      <button class="nav-btn" title="ออกจากระบบ" onclick="window.doLogout()"
        style="color:#4B5563"
        onmouseover="this.style.color='#FE5E37';this.style.background='rgba(254,94,55,.12)'"

function fmtB(n){return '฿'+Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2})}
function fmtC(n){return '฿'+Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:4})}
function fmtDT(iso){if(!iso)return'-';var d=new Date(iso);return d.toLocaleDateString('th-TH',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})}
// Sprint 11.5: บวก packaging cost ต่อแก้วเข้าไปใน "ต้นทุน/แก้ว"

function recipeCost(lines){
  var ingCost=lines.reduce(function(s,l){
    var i=S.ings.find(function(x){return x.id===l.ingId});
    return s+(i?i.cpu*+l.qty:0);
  },0);
  return ingCost+(+S.settings.pkgCost||0);
}
function parseItems(str){if(!str)return[];return str.split(',').map(function(s){s=s.trim();var m=s.match(/^(.+?)\s*x(\d+)$/i);return m?{name:m[1].trim(),qty:+m[2]}:{name:s,qty:1}})}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function pmLabel(id){var p=PM.find(function(x){return x.id===id});return p?p.lb:'💵 เงินสด'}
function grossNow(){return S.cart.reduce(function(s,i){return s+(i.price*i.qty)},0)}
function netNow(){
  var g=grossNow();

  return Math.max(0,g-gpDed-S.adsDsc-(S.ptsUse*POINT_VAL)-S.extraDsc);
}

/* ════ DOM BUILDER ════ */
function el(tag,props){
  var e=document.createElement(tag);
  if(props)Object.keys(props).forEach(function(k){
    var v=props[k];
    if(k==='cls')e.className=v;
    else if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k==='html')e.innerHTML=v;
    else if(k==='txt')e.textContent=v;
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else try{e.setAttribute(k,v)}catch(x){}
  });
  for(var i=2;i<arguments.length;i++){
    var c=arguments[i];
    if(c==null||c===false)continue;
    e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c);
  }
  return e;
}
function mkF(label,inp,req){return el('div',{cls:'field'},el('label',{txt:label+(req?'*':'')}),inp)}
function mkI(o){
  var e=document.createElement('input');e.className='inp';
  if(o){
    if(o.type)e.type=o.type;
    if(o.pl)e.placeholder=o.pl;
    if(o.val!=null)e.value=o.val;
    if(o.st)Object.assign(e.style,o.st);
    if(o.ml)e.maxLength=o.ml;
    if(o.min!=null)e.min=o.min;
    if(o.max!=null)e.max=o.max;
    if(o.step)e.step=o.step;
  }
  return e;
}
function mkSel(opts,val,onCh){
  var e=document.createElement('select');e.className='inp';
  opts.forEach(function(o){
    var op=document.createElement('option');
    op.value=o.v!=null?o.v:o.l;op.textContent=o.l;
    if(String(o.v!=null?o.v:o.l)===String(val))op.selected=true;
    e.appendChild(op);
  });
  if(onCh)e.addEventListener('change',onCh);
  return e;
}

// คำนวณ P&L breakdown ของชุด orders ใดๆ
// สูตร: profit = gross − cogs − gpFee − adsDsc − ptsDsc − extraDsc
function dashCalc(arr){
  var g=0,c=0,gp=0,ads=0,pts=0,ext=0,net=0;
  arr.forEach(function(o){
    var oNet=+(o.net||o.total)||0;
    var oGross=+o.gross||0;
    if(oGross<=0)oGross=oNet;                       // fallback ออเดอร์เก่า
    var oCogs=+o.cogs||0;
    var oGpFee=oGross*(+o.gpPct||0)/100;
    var oPts=(+o.ptsUsed||0)*POINT_VAL;
    var oDscAmt=+o.dscAmt||0;                       // = pts + extra (รวม)
    var oExtra=Math.max(0,oDscAmt-oPts);
    // derive ads จากเอกลักษณ์ net = gross − gpFee − ads − pts − extra
    var oAds=Math.max(0,oGross-oNet-oGpFee-oPts-oExtra);
    g+=oGross; c+=oCogs; gp+=oGpFee;
    ads+=oAds; pts+=oPts; ext+=oExtra; net+=oNet;
  });
  var profit=g-c-gp-ads-pts-ext;
  var margin=g>0?profit/g*100:0;
  return{count:arr.length,gross:g,cogs:c,gpFee:gp,adsDsc:ads,
         ptsDsc:pts,extraDsc:ext,totalDsc:ads+pts+ext,
         net:net,profit:profit,margin:margin};
}

// แยกกลุ่ม orders เป็นแพลตฟอร์ม (หน้าร้าน + เดลิเวอรี่ตาม gpPct)
function dashPlatformGroups(){
  var groups=[];
  var sf=S.orders.filter(function(o){return o.type==='storefront'});
  groups.push({key:'sf',label:'หน้าร้าน',icon:'🏠',gpPct:0,
               color:'var(--gold)',bg:'var(--gold-l)',orders:sf});
  var dv=S.orders.filter(function(o){return o.type==='delivery'});
  var byGp={};
  dv.forEach(function(o){
    var k=Math.round((+o.gpPct||0)*100)/100;
    (byGp[k]=byGp[k]||[]).push(o);
  });
  Object.keys(byGp).sort(function(a,b){return +a-+b}).forEach(function(gp){
    var pctVal=+gp;
    var matched=S.platforms.filter(function(p){return Math.abs(p.gp-pctVal)<0.001});
    var name=matched.length?matched.map(function(p){return p.name}).join(' / '):'เดลิเวอรี่';
    groups.push({key:'dv_'+gp,label:name+' (GP '+pctVal+'%)',icon:'🛵',
                 gpPct:pctVal,color:'var(--green)',bg:'var(--green-bg)',orders:byGp[gp]});
  });
  return groups;
}

async function searchMember(phone){
  phone=(phone||'').trim();
  if(phone.length<6)return toast('กรุณากรอกเบอร์อย่างน้อย 6 หลัก','#e11d48');
  var r=await SB.from('members').select('*').eq('phone',phone).limit(1);
  if(r.data&&r.data.length>0){S.member=r.data[0];S.memberNotFound=false;}
  else{S.member=null;S.memberNotFound=true;}

}

/* ── Cart Actions ── */
function addCart(r,overridePrice){
  var price=overridePrice!=null?overridePrice:r.price;
  var ex=S.cart.find(function(i){return i.id===r.id});
  if(ex)S.cart=S.cart.map(function(i){return i.id===r.id?Object.assign({},i,{qty:i.qty+1,price:price}):i});
  else S.cart=S.cart.concat([Object.assign({},r,{qty:1,price:price})]);
  render();
}
function updQty(id,delta){
  S.cart=S.cart.map(function(i){return i.id===id?Object.assign({},i,{qty:Math.max(0,i.qty+delta)}):i})
              .filter(function(i){return i.qty>0});
  render();
}

/* ── CHECKOUT ── */
async function doCheckout(e,gross,net){
  if(!S.cart.length)return;
  var btn=e.currentTarget;
  btn.disabled=true;btn.textContent='กำลังบันทึก...';

  // ── 1) คำนวณ stock deduction + COGS (รวม packaging cost) ──
  var stockDed={},cogs=0,totalCups=0;
  S.cart.forEach(function(ci){
    var r=S.recipes.find(function(x){return x.id===ci.id});
    if(!r)return;
    cogs+=recipeCost(r.lines)*ci.qty;   // recipeCost รวม pkgCost แล้ว
    totalCups+=ci.qty;
    r.lines.forEach(function(l){
      stockDed[l.ingId]=(stockDed[l.ingId]||0)+(l.qty*ci.qty);
    });
  });

  try{
    var items=S.cart.map(function(i){return i.name+' x'+i.qty}).join(', ');
    var ptsEarned=S.member?Math.floor(gross/POINTS_RATE):0;
    var ptsUsed=S.member?S.ptsUse:0;

    // ── 2) Insert order (ดึง id กลับมาเพื่อ audit trail) ──
    var orderRes=await SB.from('orders').insert([{
      type:S.orderType,
      items:items,
      total:net,
      gross:gross,
      net:net,
      cogs:cogs,
      gp_percent:S.gpPct,
      ads_discount:S.adsDsc,
      payment_method:S.payMethod,
      shift_id:S.shift?S.shift.id:null,

      discount_reason:S.extraDscReason||null
    }]).select().single();
    if(orderRes.error)throw orderRes.error;
    var orderId=orderRes.data.id;

    // ── 3) Strict Inventory Ledger: bulk insert adjustments (type=Sales) ──
    // หมายเหตุ: รวมเป็น 1 request เดียวเพื่อกัน supabase ค้านช่วง rush hour
    var adjRows=Object.keys(stockDed).map(function(ingId){
      var ing=S.ings.find(function(x){return x.id===+ingId});
      return{
        ingredient_id:+ingId,

        qty:stockDed[ingId],
        unit:ing?ing.unit:'',

      };
    });
    if(adjRows.length){
      var adjRes=await SB.from('adjustments').insert(adjRows);
      if(adjRes.error)throw adjRes.error;
    }

    // ── 4) หักสต็อก: parallel updates (ลดเวลา rush hour) ──
    await Promise.all(Object.keys(stockDed).map(function(ingId){
      var ing=S.ings.find(function(x){return x.id===+ingId});
      if(!ing)return Promise.resolve();

    var snap={
      type:S.orderType,items:items,gross:gross,net:net,total:net,
      gpPct:S.gpPct,payMethod:S.payMethod,

    alert('Error: '+(err.message||err));
    btn.disabled=false;btn.textContent='✅ ยืนยันคำสั่งซื้อ';
  }
}

    // Insert order — total = netRevenue (as per SQL View using o.total)
    var r=await SB.from('orders').insert([{

// เงื่อนไข: ไม่ใช่ WIP/เบส, มีตั้งค่า minStock > 0, และ stock <= minStock
function srLowItems(){
  return S.ings.filter(function(i){
    return i.type!=='WIP/เบส'
        && i.minStock>0
        && i.stock<=i.minStock;
  });
}

// คำนวณจำนวนที่แนะนำให้สั่ง: (minStock × 2) − stock
// ทำให้สต็อกหลังรับเข้า = 2× ขั้นต่ำ = อยู่ในเกณฑ์ปลอดภัย
function srSuggestQty(ing){
  return Math.max(0,(ing.minStock*2)-ing.stock);
}

/* ── Sprint 10 Helpers: Inventory Variance & Leakage ── */

// type ที่นับว่าเป็น "ของรั่ว" (loss แน่นอน — ขาออกอย่างเดียว)
var LEAK_TYPES={'Damage/Waste':1,'Expired/Spoilage':1};

// CPU (ต้นทุน/หน่วย) ของวัตถุดิบจากชื่อ — match กับ S.ings
function _ingCpu(name){
  var ing=S.ings.find(function(i){return i.name===name});
  return ing?+ing.cpu||0:0;
}

// signed variance qty ของ 1 adjustment
//   + = ได้เพิ่ม / − = สูญหาย / 0 = ไม่นับ (Receive, Produce WIP, WIP/R&D)
function _adjSignedQty(a){
  var q=+a.qty||0;
  if(a.type==='Reconcile'){
    if(a.reason&&a.reason.indexOf('น้อยกว่า')>=0)return -q;
    if(a.reason&&a.reason.indexOf('มากกว่า')>=0)return  q;
    return 0;
  }
  if(LEAK_TYPES[a.type])return -q;
  return 0;
}

// มูลค่า Leakage (บาท) ของ adjustment — เลขลบ = ขาดทุน
function _adjLeakage(a){return _adjSignedQty(a)*_ingCpu(a.ingName)}

/* ════ PRODUCE WIP ════ */
function modalProduceWIP(forceWipId){
  var f={wipId:forceWipId||'',batches:1,actualYield:0};
  var wrap=el('div',{style:{display:'flex',flexDirection:'column',gap:'14px'}});
  var extra=el('div',{style:{display:'flex',flexDirection:'column',gap:'12px'}});

  function buildProdExtra(){
    extra.innerHTML='';
    var wipIng=S.ings.find(function(i){return i.id===+f.wipId});
    if(!wipIng)return;
    var fmls=S.wips.filter(function(fm){return fm.wipId===wipIng.id});
    if(!fmls.length){
      extra.appendChild(el('p',{txt:'⚠️ ยังไม่ได้ผูกวัตถุดิบในเบสนี้ — กรุณาไปผูกสูตรก่อน',style:{color:'var(--red)',fontWeight:700,background:'#fff1f2',padding:'12px',borderRadius:'8px'}}));
      return;
    }

    var bI=mkI({type:'number',val:'1',min:'1',st:{fontSize:'1rem'}});
    var yI=mkI({type:'number',val:String(wipIng.ypb),st:{fontSize:'1rem'}});

    function recalc(){
      var b=+bI.value||1;
      yI.value=wipIng.ypb*b;
      f.batches=b;f.actualYield=+yI.value;
      // Update preview
      fmls.forEach(function(fm,idx){
        var raw=S.ings.find(function(i){return i.id===fm.rawId});if(!raw)return;
        var useQty=fm.qty*b;
        var row=pv.children[idx+1];
        if(row){
          var span=row.querySelector('.use-qty');
          if(span)span.textContent=useQty+' '+raw.unit+' (เหลือ '+(raw.stock-useQty).toFixed(2)+')';
          if(span)span.style.color=raw.stock>=useQty?'var(--green)':'var(--red)';
        }
      });
    }
    bI.addEventListener('input',recalc);
    yI.addEventListener('input',function(e){f.actualYield=+e.target.value});

    // Preview box
    var pv=el('div',{style:{background:'#fefce8',border:'1px solid #fde68a',borderRadius:'10px',padding:'12px',display:'flex',flexDirection:'column',gap:'5px'}});
    pv.appendChild(el('p',{txt:'รายการที่จะตัดสต็อก (1 รอบ):',style:{fontWeight:800,color:'#92400e',margin:'0 0 4px'}}));
    fmls.forEach(function(fm){
      var raw=S.ings.find(function(i){return i.id===fm.rawId});if(!raw)return;
      var useQty=fm.qty*(+bI.value||1);
      pv.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'.875rem'}},
        el('span',{txt:raw.name}),
        el('span',{cls:'use-qty',txt:useQty+' '+raw.unit+' (เหลือ '+(raw.stock-useQty).toFixed(2)+')',
          style:{color:raw.stock>=useQty?'var(--green)':'var(--red)',fontWeight:700}})
      ));
    });

    extra.appendChild(el('div',{cls:'grid2'},mkF('จำนวนรอบที่ผลิต',bI,true),mkF('ปริมาณที่ได้จริง ('+wipIng.unit+')',yI,true)));
    extra.appendChild(pv);
    extra.appendChild(el('p',{txt:'*ตัดสต็อก Raw Material ตามสูตร × รอบ และคำนวณต้นทุนถัวเฉลี่ยใหม่อัตโนมัติ',style:{color:'var(--muted)',fontSize:'.78rem',margin:0}}));

    var cBtn=el('button',{cls:'btn btn-violet',txt:'✅ ยืนยันผลิตเบส',style:{width:'100%',padding:'13px',fontSize:'1rem',borderRadius:'12px'},
      onClick:async function(){
        if(f.actualYield<=0)return toast('ปริมาณที่ได้ต้องมากกว่า 0','#e11d48');
        this.disabled=true;this.textContent='กำลังตัดสต็อก...';
        try{
          var totalRawCost=0;
          for(var i2=0;i2<fmls.length;i2++){
            var fm=fmls[i2];
            var raw=S.ings.find(function(ri){return ri.id===fm.rawId});
            if(raw){
              var useQ=fm.qty*f.batches;
              totalRawCost+=(useQ*raw.cpu);
              await SB.from('ingredients').update({stock:Math.max(0,raw.stock-useQ)}).eq('id',raw.id);
            }
          }
          var newStock=wipIng.stock+f.actualYield;
          var newTotalCost=(wipIng.stock*wipIng.cpu)+totalRawCost;
          var newCPU=newStock>0?newTotalCost/newStock:0;
          await SB.from('ingredients').update({stock:newStock,cost_per_unit:newCPU}).eq('id',wipIng.id);
          await SB.from('adjustments').insert([{ingredient_id:wipIng.id,ing_name:wipIng.name,type:'Produce WIP',qty:f.actualYield,unit:wipIng.unit,reason:'ผลิต '+f.batches+' รอบ (ต้นทุน '+fmtC(totalRawCost)+')'}]);
          closeModal();toast('✓ ผลิตเบสสำเร็จ! CPUnit ใหม่: '+fmtC(newCPU));await reload();
        }catch(err){alert(err.message);this.disabled=false;this.textContent='✅ ยืนยันผลิตเบส'}
      }
    });
    extra.appendChild(cBtn);
  }

  if(forceWipId){
    var wi=S.ings.find(function(i){return i.id===forceWipId});
    if(wi)wrap.appendChild(el('p',{txt:'ผลิตเบส: '+wi.name,style:{fontWeight:900,color:'var(--txt)',fontSize:'1.05rem'}}));
    buildProdExtra();wrap.appendChild(extra);
  }else{
    var wipOpts=[{l:'-- เลือกเบส --',v:''}].concat(S.ings.filter(function(i){return i.type==='WIP/เบส'}).map(function(i){return{l:i.name,v:i.id}}));
    var ws=mkSel(wipOpts,'',function(e){f.wipId=e.target.value;buildProdExtra()});
    wrap.appendChild(mkF('เลือกเบสที่ต้องการผลิต',ws,true));
    wrap.appendChild(extra);
  }
  openModal('🍳 ผลิตเบสเข้าสต็อก',wrap,'540px');
}

    el('button',{cls:'btn btn-ghost',txt:'🖨️ ทดสอบพิมพ์',

function modalAddStaff(){
  var f={name:'',pin:'',role:'cashier'};
  var nI=mkI({pl:'ชื่อ-นามสกุล'});nI.addEventListener('input',function(e){f.name=e.target.value});
  var pI=mkI({pl:'PIN 4 หลัก',ml:'4'});pI.type='password';pI.addEventListener('input',function(e){f.pin=e.target.value});
  var rSel=mkSel([{l:'💼 แคชเชียร์',v:'cashier'},{l:'👑 แอดมิน (เห็นทุกหน้า)',v:'admin'}],'cashier',function(e){f.role=e.target.value});
  var btn=el('button',{cls:'btn btn-primary',txt:'+ เพิ่มพนักงาน',style:{width:'100%'},
    onClick:async function(){
      if(!f.name||f.pin.length!==4)return toast('กรอกชื่อและ PIN 4 หลัก','#e11d48');
      var chk=await SB.from('staff').select('id').eq('pin',f.pin).limit(1);
      if(chk.data&&chk.data.length)return toast('PIN นี้ถูกใช้แล้ว กรุณาใช้ PIN อื่น','#e11d48');
      this.disabled=true;
      await SB.from('staff').insert([{name:f.name,pin:f.pin,role:f.role}]);
      closeModal();toast('✓ เพิ่มพนักงานสำเร็จ');await reload();
    }
  });
  openModal('เพิ่มพนักงานใหม่',el('div',{style:{display:'flex',flexDirection:'column',gap:'12px'}},
    mkF('ชื่อ-นามสกุล',nI,true),mkF('PIN 4 หลัก (ใช้ Login)',pI,true),mkF('บทบาท',rSel),
    el('p',{txt:'• Admin เห็นทุกหน้า • Cashier เห็นเฉพาะ POS + รอบการขาย',style:{color:'var(--muted)',fontSize:'.78rem',margin:0,lineHeight:1.6}}),btn));
}

function modalAddPlatform(){
  var f={name:'',gp:'30'};
  var nI=mkI({pl:'เช่น Grab, LINE MAN, ShopeeFood'});nI.addEventListener('input',function(e){f.name=e.target.value});
  var gpI=mkI({type:'number',val:'30'});gpI.addEventListener('input',function(e){f.gp=e.target.value});
  var btn=el('button',{cls:'btn btn-primary',txt:'เพิ่มแพลตฟอร์ม',style:{width:'100%'},
    onClick:async function(){if(!f.name)return;this.disabled=true;
      await SB.from('platforms').insert([{name:f.name,gp_percent:+f.gp||0}]);
      closeModal();toast('✓ เพิ่มแอปเรียบร้อย');await reload();
    }
  });
  openModal('เพิ่มแพลตฟอร์มเดลิเวอรี่',el('div',{style:{display:'flex',flexDirection:'column',gap:'12px'}},mkF('ชื่อแพลตฟอร์ม',nI,true),mkF('ค่า GP (%)',gpI),btn));
}
